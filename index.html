<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AK-47 — En développement</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange: #ff3c00;
      --orange2: #ff8800;
      --discord: #5865F2;
      --green: #23a55a;
      --red: #c41e3a;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Grid animé */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(255,60,0,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,60,0,0.05) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridMove 20s linear infinite;
      pointer-events: none;
    }
    @keyframes gridMove {
      0%   { background-position: 0 0; }
      100% { background-position: 40px 40px; }
    }

    /* Orbs */
    .orb { position: fixed; border-radius: 50%; filter: blur(120px); pointer-events: none; }
    .orb-1 { width: 500px; height: 500px; background: var(--orange); top: -150px; left: -150px; opacity: 0.18; animation: pulse 6s ease-in-out infinite alternate; }
    .orb-2 { width: 400px; height: 400px; background: var(--orange2); bottom: -100px; right: -100px; opacity: 0.15; animation: pulse 8s ease-in-out infinite alternate-reverse; }
    @keyframes pulse {
      from { transform: scale(1); opacity: 0.15; }
      to   { transform: scale(1.2); opacity: 0.25; }
    }

    /* Container */
    .container {
      position: relative; z-index: 10;
      text-align: center;
      padding: 2rem 1.5rem;
      max-width: 560px; width: 100%;
    }

    /* Badge */
    .badge {
      display: inline-block;
      background: rgba(255,60,0,0.15);
      border: 1px solid rgba(255,60,0,0.4);
      color: #ff6030;
      font-size: 0.7rem; font-weight: 600;
      letter-spacing: 0.2em; text-transform: uppercase;
      padding: 0.35rem 1rem; border-radius: 999px;
      margin-bottom: 2rem;
    }

    /* Logo */
    .logo {
      font-size: 5rem; font-weight: 800;
      letter-spacing: -0.04em; line-height: 1;
      background: linear-gradient(135deg, #fff 30%, #ff6030 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; margin-bottom: 1.5rem;
    }

    h1 {
      font-size: 1.1rem; font-weight: 400;
      color: rgba(255,255,255,0.5); line-height: 1.7;
      margin-bottom: 2.5rem;
    }
    h1 strong { color: rgba(255,255,255,0.9); font-weight: 600; }

    .separator {
      width: 40px; height: 2px;
      background: linear-gradient(90deg, var(--orange), var(--orange2));
      margin: 0 auto 2.5rem; border-radius: 2px;
    }

    /* ── Stats grid ── */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }

    .stat-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 1rem 0.75rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
      position: relative;
      overflow: hidden;
      transition: border-color 0.3s, transform 0.2s;
      cursor: default;
    }
    .stat-card:hover { border-color: rgba(255,255,255,0.15); transform: translateY(-1px); }
    .stat-card::before {
      content: '';
      position: absolute; inset: 0;
      background: var(--card-glow, transparent);
      pointer-events: none;
      opacity: 0.06;
    }

    .stat-card.members  { --card-glow: linear-gradient(135deg, #5865f2, transparent); }
    .stat-card.online   { --card-glow: linear-gradient(135deg, #23a55a, transparent); }
    .stat-card.visitors { --card-glow: linear-gradient(135deg, #ff8800, transparent); }

    .stat-card:hover.members  { border-color: rgba(88,101,242,0.35); }
    .stat-card:hover.online   { border-color: rgba(35,165,90,0.35); }
    .stat-card:hover.visitors { border-color: rgba(255,136,0,0.35); }

    .stat-icon {
      font-size: 1.3rem;
      line-height: 1;
    }

    .stat-value {
      font-size: 1.55rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1;
    }
    .stat-card.members  .stat-value { background: linear-gradient(135deg,#fff 40%,#7289da); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .stat-card.online   .stat-value { background: linear-gradient(135deg,#fff 40%,#23a55a); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .stat-card.visitors .stat-value { background: linear-gradient(135deg,#fff 40%,#ff8800); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }

    .stat-label {
      font-size: 0.63rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.28);
      text-align: center;
      line-height: 1.3;
    }

    .stat-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      position: absolute;
      top: 8px; right: 8px;
    }
    .stat-card.members  .stat-dot { background: #5865f2; animation: blink 2.5s ease-in-out infinite; }
    .stat-card.online   .stat-dot { background: #23a55a; animation: blink 1.8s ease-in-out infinite; }
    .stat-card.visitors .stat-dot { background: #ff8800; animation: blink 3s ease-in-out infinite; }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }

    @keyframes countPop {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.12); }
      100% { transform: scale(1); }
    }
    .pop { animation: countPop 0.35s ease; }

    /* ── Refresh bar ── */
    .refresh-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
      font-size: 0.68rem;
      color: rgba(255,255,255,0.18);
    }
    .refresh-btn {
      background: none; border: none; cursor: pointer;
      color: rgba(255,255,255,0.2); font-size: 0.85rem;
      transition: color 0.2s; padding: 0 2px;
      line-height: 1;
    }
    .refresh-btn:hover { color: rgba(255,255,255,0.5); }
    .refresh-btn.spinning { animation: spin 0.6s linear; }
    @keyframes spin { from{transform:rotate(0)} to{transform:rotate(360deg)} }

    /* ── Status bar ── */
    .status-bar {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px; padding: 1.1rem 1.5rem;
      display: flex; align-items: center; gap: 1rem; text-align: left;
      margin-bottom: 1.5rem;
    }
    .status-dot-anim { width: 10px; height: 10px; border-radius: 50%; background: #ff8800; flex-shrink: 0; animation: blink 1.5s ease-in-out infinite; }
    .status-text { font-size: 0.85rem; color: rgba(255,255,255,0.5); }
    .status-text strong { display: block; color: rgba(255,255,255,0.85); font-weight: 600; margin-bottom: 0.1rem; }

    /* ── Discord button ── */
    .socials { display: flex; justify-content: center; gap: 0.75rem; margin-bottom: 0.5rem; }
    .social-btn {
      display: inline-flex; align-items: center; gap: 0.6rem;
      padding: 0.65rem 1.3rem; border-radius: 10px;
      font-size: 0.85rem; font-weight: 600; text-decoration: none;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      cursor: pointer;
    }
    .social-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
    .social-btn:active { transform: translateY(0); }
    .discord-btn { background: var(--discord); color: #fff; border: 1px solid rgba(255,255,255,0.1); }

    .footer { margin-top: 2.5rem; font-size: 0.72rem; color: rgba(255,255,255,0.18); letter-spacing: 0.05em; }

    /* ── Mobile ── */
    @media (max-width: 480px) {
      .orb-1 { width: 300px; height: 300px; top: -80px; left: -80px; }
      .orb-2 { width: 250px; height: 250px; bottom: -60px; right: -60px; }
      .container { padding: 2rem 1.1rem; }
      .badge { font-size: 0.65rem; margin-bottom: 1.5rem; }
      .logo { font-size: 3.5rem; margin-bottom: 1.25rem; }
      h1 { font-size: 0.98rem; margin-bottom: 2rem; }
      .separator { margin-bottom: 2rem; }
      .stat-value { font-size: 1.3rem; }
      .stat-label { font-size: 0.58rem; }
      .stats-grid { gap: 0.5rem; }
      .stat-card { padding: 0.85rem 0.5rem; }
      .status-bar { padding: 0.9rem 1.1rem; }
    }
    @media (max-width: 360px) {
      .logo { font-size: 3rem; }
      h1 { font-size: 0.92rem; }
      .stat-value { font-size: 1.15rem; }
    }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="container">
    <div class="badge">⚙&nbsp; En cours de développement</div>
    <div class="logo">AK-47</div>
    <div class="separator"></div>
    <h1>Le site est en dev.<br><strong>Revenez bientôt</strong>, quelque chose de grand arrive.</h1>

    <!-- 3 compteurs live -->
    <div class="stats-grid">
      <div class="stat-card members">
        <div class="stat-dot"></div>
        <div class="stat-icon">👥</div>
        <div class="stat-value" id="count-members">—</div>
        <div class="stat-label">Membres<br>inscrits</div>
      </div>
      <div class="stat-card online">
        <div class="stat-dot"></div>
        <div class="stat-icon">🟢</div>
        <div class="stat-value" id="count-online">—</div>
        <div class="stat-label">En ligne<br>maintenant</div>
      </div>
      <div class="stat-card visitors">
        <div class="stat-dot"></div>
        <div class="stat-icon">👁️</div>
        <div class="stat-value" id="count-visitors">—</div>
        <div class="stat-label">Visites<br>sur la page</div>
      </div>
    </div>

    <div class="refresh-bar">
      <button class="refresh-btn" id="refresh-btn" onclick="fetchStats()" title="Actualiser">↻</button>
      <span>Mise à jour toutes les 30s &nbsp;·&nbsp; <span id="last-update">—</span></span>
    </div>

    <div class="status-bar">
      <div class="status-dot-anim"></div>
      <div class="status-text">
        <strong>Travaux en cours</strong>
        Je bosse sur le site.
      </div>
    </div>

    <div class="socials">
      <a href="https://discord.gg/mH4raEhSgH" target="_blank" rel="noopener noreferrer" class="social-btn discord-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.002.022.015.043.033.055a19.875 19.875 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/>
        </svg>
        Rejoindre le Discord
      </a>
    </div>

    <div class="footer">© 2026 AK-47 &nbsp;·&nbsp; ak-47.fr</div>
  </div>

  <script>
    const BACKEND = 'https://ak47-backend.onrender.com';
    let prev = { members: null, online: null, visitors: null };

    // ── Anime un chiffre de from → to ──────────────────────────────────────
    function animateNum(el, from, to, ms = 800) {
      if (from === to) { el.textContent = to.toLocaleString('fr-FR'); return; }
      const start = performance.now();
      (function tick(now) {
        const p = Math.min((now - start) / ms, 1);
        const ease = 1 - Math.pow(1 - p, 3);
        el.textContent = Math.round(from + (to - from) * ease).toLocaleString('fr-FR');
        if (p < 1) requestAnimationFrame(tick);
        else el.textContent = to.toLocaleString('fr-FR');
      })(start);
    }

    function setCount(id, newVal, prevVal) {
      const el = document.getElementById(id);
      if (!el) return;
      const from = prevVal !== null ? prevVal : 0;
      if (prevVal !== null && prevVal !== newVal) {
        el.classList.remove('pop');
        void el.offsetWidth; // force reflow
        el.classList.add('pop');
        setTimeout(() => el.classList.remove('pop'), 400);
      }
      animateNum(el, from, newVal);
    }

    async function fetchStats() {
      const btn = document.getElementById('refresh-btn');
      btn.classList.add('spinning');

      try {
        const res = await fetch(BACKEND + '/api/stats');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const d = await res.json();

        setCount('count-members',  d.total    || 0, prev.members);
        setCount('count-online',   d.online   || 0, prev.online);
        setCount('count-visitors', d.visitors || 0, prev.visitors);

        prev.members  = d.total    || 0;
        prev.online   = d.online   || 0;
        prev.visitors = d.visitors || 0;

        const now = new Date();
        document.getElementById('last-update').textContent =
          now.getHours().toString().padStart(2,'0') + ':' +
          now.getMinutes().toString().padStart(2,'0') + ':' +
          now.getSeconds().toString().padStart(2,'0');

      } catch(e) {
        ['count-members','count-online','count-visitors'].forEach(id => {
          const el = document.getElementById(id);
          if (el && el.textContent === '—') el.textContent = '—';
        });
        document.getElementById('last-update').textContent = 'erreur';
      } finally {
        setTimeout(() => btn.classList.remove('spinning'), 500);
      }
    }

    // ── Comptabilise la visite (1 appel par session) ───────────────────────
    async function trackVisit() {
      try {
        // sessionStorage pour ne compter qu'une fois par onglet
        if (sessionStorage.getItem('ak47_visited')) return;
        await fetch(BACKEND + '/api/visitor', { method: 'POST' });
        sessionStorage.setItem('ak47_visited', '1');
      } catch(e) {}
    }

    // Init
    trackVisit();
    fetchStats();
    setInterval(fetchStats, 30000);
  </script>
</body>
</html>

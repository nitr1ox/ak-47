<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AK-47.fr — Mail</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111;
    --border: #1e1e1e;
    --accent: #c8171c;
    --accent2: #ff3a3f;
    --text: #e8e8e8;
    --muted: #555;
    --hover: #161616;
    --selected: #1a0a0a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  /* TOPBAR */
  .topbar { display: flex; align-items: center; padding: 0 24px; height: 52px; border-bottom: 1px solid var(--border); gap: 20px; flex-shrink: 0; }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 3px; color: var(--accent2); }
  .logo span { color: var(--muted); font-size: 14px; letter-spacing: 1px; font-family: 'Space Mono', monospace; margin-left: 8px; }
  .topbar-search { flex: 1; max-width: 420px; position: relative; }
  .topbar-search input { width: 100%; background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 7px 14px 7px 36px; border-radius: 4px; font-family: 'DM Sans', sans-serif; font-size: 13px; outline: none; transition: border .2s; }
  .topbar-search input:focus { border-color: var(--accent); }
  .topbar-search .icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--muted); }
  .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 14px; }
  .avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue', sans-serif; font-size: 14px; letter-spacing: 1px; cursor: pointer; }
  .badge-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent2); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.8)} }

  /* MAIN */
  .main { display: flex; flex: 1; overflow: hidden; }

  /* SIDEBAR */
  .sidebar { width: 210px; border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 16px 0; flex-shrink: 0; }
  .compose-btn { margin: 0 14px 20px; background: var(--accent); border: none; color: #fff; padding: 10px 0; border-radius: 3px; font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 2px; cursor: pointer; transition: background .2s; }
  .compose-btn:hover { background: var(--accent2); }
  .nav-section { font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 2px; color: var(--muted); padding: 0 18px; margin: 10px 0 4px; text-transform: uppercase; }
  .nav-item { display: flex; align-items: center; padding: 8px 18px; cursor: pointer; font-size: 13.5px; color: #aaa; gap: 10px; transition: background .15s, color .15s; border-left: 2px solid transparent; }
  .nav-item:hover { background: var(--hover); color: var(--text); }
  .nav-item.active { background: var(--selected); color: var(--accent2); border-left-color: var(--accent); }
  .nav-item .count { margin-left: auto; font-family: 'Space Mono', monospace; font-size: 10px; background: var(--accent); color: #fff; padding: 1px 6px; border-radius: 2px; }

  /* EMAIL LIST */
  .email-list { width: 320px; border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0; }
  .list-header { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .list-title { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 2px; }
  .list-count { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted); margin-left: auto; }
  .email-items { overflow-y: auto; flex: 1; }
  .email-items::-webkit-scrollbar { width: 4px; }
  .email-items::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .email-item { padding: 13px 16px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background .15s; position: relative; }
  .email-item:hover { background: var(--hover); }
  .email-item.active { background: var(--selected); border-left: 2px solid var(--accent); }
  .email-item.unread .ei-from { font-weight: 700; color: var(--text); }
  .ei-row1 { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .ei-from { font-size: 13px; color: #bbb; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ei-time { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted); white-space: nowrap; }
  .ei-subject { font-size: 12.5px; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px; }
  .ei-preview { font-size: 11.5px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .unread-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent2); flex-shrink: 0; }

  /* EMAIL VIEW */
  .email-view { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .view-header { padding: 20px 28px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .view-subject { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 2px; margin-bottom: 12px; line-height: 1; }
  .view-meta { display: flex; align-items: center; gap: 10px; }
  .sender-avatar { width: 36px; height: 36px; border-radius: 50%; background: #1e1e1e; display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue', sans-serif; font-size: 15px; color: var(--accent2); border: 1px solid var(--border); flex-shrink: 0; }
  .sender-info { flex: 1; }
  .sender-name { font-size: 13.5px; font-weight: 500; }
  .sender-addr { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted); margin-top: 1px; }
  .view-time { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); }
  .view-actions { display: flex; gap: 8px; margin-left: 10px; }
  .view-btn { background: var(--surface); border: 1px solid var(--border); color: #888; padding: 5px 12px; border-radius: 3px; font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 1px; cursor: pointer; text-transform: uppercase; transition: all .2s; }
  .view-btn:hover { border-color: var(--accent); color: var(--accent2); }
  .view-btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .view-btn.primary:hover { background: var(--accent2); }
  .view-body { flex: 1; overflow-y: auto; padding: 28px; line-height: 1.75; font-size: 14px; color: #ccc; }
  .view-body::-webkit-scrollbar { width: 4px; }
  .view-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .view-body p { margin-bottom: 16px; }
  .tag { display: inline-block; font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 1px; text-transform: uppercase; padding: 2px 8px; border-radius: 2px; background: #1c0a0a; color: var(--accent2); border: 1px solid #2a0a0a; margin-right: 6px; }

  /* COMPOSE MODAL */
  .compose-modal { position: fixed; bottom: 0; right: 24px; width: 480px; background: #0f0f0f; border: 1px solid var(--border); border-bottom: none; border-radius: 6px 6px 0 0; display: none; flex-direction: column; z-index: 100; box-shadow: 0 -8px 40px rgba(200,23,28,.08); }
  .compose-modal.open { display: flex; }
  .compose-header { display: flex; align-items: center; padding: 10px 16px; background: var(--accent); border-radius: 6px 6px 0 0; cursor: pointer; }
  .compose-title { font-family: 'Bebas Neue', sans-serif; letter-spacing: 2px; font-size: 15px; }
  .compose-close { margin-left: auto; background: none; border: none; color: #fff; font-size: 18px; cursor: pointer; }
  .compose-field { border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 8px 16px; gap: 10px; }
  .compose-label { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted); text-transform: uppercase; width: 34px; flex-shrink: 0; }
  .compose-field input { flex: 1; background: none; border: none; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px; outline: none; }
  .compose-body { height: 200px; resize: none; background: none; border: none; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13.5px; line-height: 1.7; padding: 14px 16px; outline: none; flex: 1; }
  .compose-footer { display: flex; align-items: center; padding: 10px 16px; border-top: 1px solid var(--border); gap: 10px; }
  .send-btn { background: var(--accent); border: none; color: #fff; padding: 8px 20px; border-radius: 3px; font-family: 'Bebas Neue', sans-serif; font-size: 15px; letter-spacing: 2px; cursor: pointer; transition: background .2s; }
  .send-btn:hover { background: var(--accent2); }
  .send-btn:disabled { opacity: .5; cursor: not-allowed; }

  /* STATES */
  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--muted); gap: 10px; }
  .empty-icon { font-size: 48px; opacity: .2; }
  .empty-text { font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 10px 20px; border-radius: 4px; font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 1px; transition: transform .3s; z-index: 200; }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: #1a4a1a; color: #4aff4a; }
  .toast.error { border-color: var(--accent); color: var(--accent2); }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #222; border-radius: 2px; }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">AK-47<span>mail</span></div>
  <div class="topbar-search">
    <span class="icon">⌕</span>
    <input type="text" placeholder="Rechercher..." id="search-input" oninput="filterEmails(this.value)">
  </div>
  <div class="topbar-right">
    <span class="badge-dot" id="unread-dot" style="display:none"></span>
    <div class="avatar" title="contact@ak-47.fr">AK</div>
  </div>
</div>

<div class="main">
  <div class="sidebar">
    <button class="compose-btn" onclick="toggleCompose()">+ RÉDIGER</button>
    <div class="nav-section">Dossiers</div>
    <div class="nav-item active" onclick="setFolder(this, 'BOÎTE DE RÉCEPTION')">
      <span>📥</span> Boîte de réception <span class="count" id="unread-count" style="display:none"></span>
    </div>
    <div class="nav-item" onclick="setFolder(this, 'ENVOYÉS')"><span>📤</span> Envoyés</div>
    <div class="nav-item" onclick="setFolder(this, 'PARAMÈTRES')"><span>⚙️</span> Paramètres</div>
    <div class="nav-section" style="margin-top:auto;padding-top:16px">Compte</div>
    <div style="padding: 8px 18px; font-family:'Space Mono',monospace; font-size:10px; color:var(--muted);">contact@ak-47.fr</div>
  </div>

  <div class="email-list">
    <div class="list-header">
      <div class="list-title" id="folder-title">BOÎTE DE RÉCEPTION</div>
      <div class="list-count" id="folder-count">—</div>
    </div>
    <div class="email-items" id="email-list">
      <div class="empty-state"><div class="empty-text">Chargement...</div></div>
    </div>
  </div>

  <div class="email-view" id="email-view">
    <div class="empty-state">
      <div class="empty-icon">✉</div>
      <div class="empty-text">Sélectionner un mail</div>
    </div>
  </div>
</div>

<!-- COMPOSE -->
<div class="compose-modal" id="compose-modal">
  <div class="compose-header" onclick="toggleCompose()">
    <span class="compose-title">Nouveau message</span>
    <button class="compose-close">✕</button>
  </div>
  <div class="compose-field">
    <span class="compose-label">À</span>
    <input type="email" id="c-to" placeholder="destinataire@exemple.com">
  </div>
  <div class="compose-field">
    <span class="compose-label">Cc</span>
    <input type="email" id="c-cc">
  </div>
  <div class="compose-field">
    <span class="compose-label">Objet</span>
    <input type="text" id="c-subject" placeholder="Sujet...">
  </div>
  <textarea class="compose-body" id="c-body" placeholder="Rédigez votre message..."></textarea>
  <div class="compose-footer">
    <button class="send-btn" id="send-btn" onclick="sendMail()">ENVOYER</button>
    <button class="view-btn" onclick="toggleCompose()">Annuler</button>
    <span id="send-status" style="font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);margin-left:auto"></span>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  let emails = [];
  let currentId = null;
  let filtered = null;

  // ── API ─────────────────────────────────────────────────────
  async function api(method, path, body) {
    const opts = { method, headers: { 'Content-Type': 'application/json' } };
    if (body) opts.body = JSON.stringify(body);
    const r = await fetch(path, opts);
    return r.json();
  }

  async function loadEmails() {
    try {
      const { emails: list } = await api('GET', '/api/emails');
      emails = list || [];
      renderList(filtered ? emails.filter(e =>
        e.subject.toLowerCase().includes(filtered) ||
        e.fromName.toLowerCase().includes(filtered)
      ) : emails);
      updateCount();
    } catch(e) {
      showToast('Erreur de connexion au serveur', 'error');
    }
  }

  async function openEmail(id) {
    currentId = id;
    renderList(emails); // update active state
    try {
      const { email } = await api('GET', `/api/emails/${id}`);
      if (!email) return;
      // Update local
      const local = emails.find(e => e.id === id);
      if (local) local.unread = false;
      updateCount();

      const initials = (email.fromName || email.from).split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2);
      const tagsHtml = (email.tags || []).map(t => `<span class="tag">${t}</span>`).join('');
      const timeStr = new Date(email.time).toLocaleString('fr-FR', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' });

      document.getElementById('email-view').innerHTML = `
        <div class="view-header">
          <div class="view-subject">${escHtml(email.subject)}</div>
          <div class="view-meta">
            <div class="sender-avatar">${initials}</div>
            <div class="sender-info">
              <div class="sender-name">${escHtml(email.fromName || email.from)} ${tagsHtml}</div>
              <div class="sender-addr">${escHtml(email.from)} → contact@ak-47.fr</div>
            </div>
            <div class="view-time">${timeStr}</div>
            <div class="view-actions">
              <button class="view-btn primary" onclick="replyTo('${escHtml(email.from)}','Re: ${escHtml(email.subject)}')">Répondre</button>
              <button class="view-btn" onclick="deleteMail(${email.id})">Suppr.</button>
            </div>
          </div>
        </div>
        <div class="view-body">${email.body}</div>
      `;
    } catch(e) {
      showToast('Impossible de charger le mail', 'error');
    }
  }

  async function deleteMail(id) {
    await api('DELETE', `/api/emails/${id}`);
    emails = emails.filter(e => e.id !== id);
    currentId = null;
    document.getElementById('email-view').innerHTML = `<div class="empty-state"><div class="empty-icon">🗑</div><div class="empty-text">Mail supprimé</div></div>`;
    renderList(emails);
    updateCount();
    showToast('Mail supprimé', 'success');
  }

  async function sendMail() {
    const to = document.getElementById('c-to').value.trim();
    const cc = document.getElementById('c-cc').value.trim();
    const subject = document.getElementById('c-subject').value.trim();
    const bodyText = document.getElementById('c-body').value.trim();

    if (!to || !subject || !bodyText) {
      showToast('Remplis tous les champs obligatoires', 'error');
      return;
    }

    const btn = document.getElementById('send-btn');
    const status = document.getElementById('send-status');
    btn.disabled = true;
    status.textContent = 'Envoi en cours...';

    const htmlBody = bodyText.split('\n').map(l => `<p>${l || '&nbsp;'}</p>`).join('');

    try {
      const res = await api('POST', '/api/send', { to, cc: cc || undefined, subject, body: htmlBody });
      if (res.success) {
        showToast('✓ Mail envoyé !', 'success');
        toggleCompose();
        document.getElementById('c-to').value = '';
        document.getElementById('c-cc').value = '';
        document.getElementById('c-subject').value = '';
        document.getElementById('c-body').value = '';
        loadEmails();
      } else {
        showToast('Erreur : ' + res.error, 'error');
      }
    } catch(e) {
      showToast('Erreur réseau', 'error');
    } finally {
      btn.disabled = false;
      status.textContent = '';
    }
  }

  // ── UI ──────────────────────────────────────────────────────
  function renderList(list) {
    const el = document.getElementById('email-list');
    if (!list || list.length === 0) {
      el.innerHTML = '<div class="empty-state"><div class="empty-text">Aucun mail</div></div>';
      return;
    }
    el.innerHTML = list.map(e => {
      const timeStr = formatTime(e.time);
      return `
        <div class="email-item ${e.unread ? 'unread' : ''} ${e.id === currentId ? 'active' : ''}" onclick="openEmail(${e.id})">
          <div class="ei-row1">
            ${e.unread ? '<span class="unread-dot"></span>' : '<span style="width:6px;display:inline-block"></span>'}
            <span class="ei-from">${escHtml(e.fromName || e.from)}</span>
            <span class="ei-time">${timeStr}</span>
          </div>
          <div class="ei-subject">${escHtml(e.subject)}</div>
          <div class="ei-preview">${escHtml(e.preview || '')}</div>
        </div>
      `;
    }).join('');
  }

  function updateCount() {
    const unread = emails.filter(e => e.unread).length;
    const countEl = document.getElementById('unread-count');
    const dotEl = document.getElementById('unread-dot');
    if (unread > 0) {
      countEl.textContent = unread;
      countEl.style.display = '';
      dotEl.style.display = '';
    } else {
      countEl.style.display = 'none';
      dotEl.style.display = 'none';
    }
    document.getElementById('folder-count').textContent = unread > 0 ? `${unread} non lu${unread > 1 ? 's' : ''}` : 'À jour ✓';
  }

  function setFolder(el, name) {
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('folder-title').textContent = name;
    document.getElementById('email-view').innerHTML = `<div class="empty-state"><div class="empty-icon">✉</div><div class="empty-text">${name}</div></div>`;
    currentId = null;
  }

  function toggleCompose() {
    document.getElementById('compose-modal').classList.toggle('open');
    if (document.getElementById('compose-modal').classList.contains('open')) {
      document.getElementById('c-to').focus();
    }
  }

  function replyTo(addr, subj) {
    document.getElementById('c-to').value = addr;
    document.getElementById('c-subject').value = subj;
    document.getElementById('compose-modal').classList.add('open');
    document.getElementById('c-body').focus();
  }

  function filterEmails(q) {
    filtered = q.toLowerCase() || null;
    const list = filtered ? emails.filter(e =>
      (e.subject || '').toLowerCase().includes(filtered) ||
      (e.fromName || '').toLowerCase().includes(filtered) ||
      (e.from || '').toLowerCase().includes(filtered)
    ) : emails;
    renderList(list);
  }

  function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast ${type} show`;
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  function formatTime(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    const now = new Date();
    if (d.toDateString() === now.toDateString()) {
      return d.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
    }
    return d.toLocaleDateString('fr-FR', { day: '2-digit', month: 'short' });
  }

  function escHtml(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Init ────────────────────────────────────────────────────
  loadEmails();
  // Rafraîchissement auto toutes les 30s
  setInterval(loadEmails, 30000);
</script>
</body>
</html>

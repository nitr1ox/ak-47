<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AK-47 — En développement</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,60,0,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,60,0,0.05) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridMove 20s linear infinite;
      pointer-events: none;
    }
    @keyframes gridMove {
      0%   { background-position: 0 0; }
      100% { background-position: 40px 40px; }
    }
    .orb { position: fixed; border-radius: 50%; filter: blur(120px); pointer-events: none; }
    .orb-1 { width: 500px; height: 500px; background: #ff3c00; top: -150px; left: -150px; opacity: 0.18; animation: pulse 6s ease-in-out infinite alternate; }
    .orb-2 { width: 400px; height: 400px; background: #ff8800; bottom: -100px; right: -100px; opacity: 0.15; animation: pulse 8s ease-in-out infinite alternate-reverse; }
    @keyframes pulse {
      from { transform: scale(1); opacity: 0.15; }
      to   { transform: scale(1.2); opacity: 0.25; }
    }
    .container {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 2rem 1.5rem;
      max-width: 560px;
      width: 100%;
    }
    .badge {
      display: inline-block;
      background: rgba(255,60,0,0.15);
      border: 1px solid rgba(255,60,0,0.4);
      color: #ff6030;
      font-size: 0.7rem; font-weight: 600;
      letter-spacing: 0.2em; text-transform: uppercase;
      padding: 0.35rem 1rem; border-radius: 999px;
      margin-bottom: 2rem;
    }
    .logo {
      font-size: 5rem; font-weight: 700;
      letter-spacing: -0.04em; line-height: 1;
      background: linear-gradient(135deg, #fff 30%, #ff6030 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; margin-bottom: 1.5rem;
    }
    h1 { font-size: 1.15rem; font-weight: 400; color: rgba(255,255,255,0.55); line-height: 1.7; margin-bottom: 2.5rem; }
    h1 strong { color: rgba(255,255,255,0.9); font-weight: 600; }
    .separator { width: 40px; height: 2px; background: linear-gradient(90deg, #ff3c00, #ff8800); margin: 0 auto 2.5rem; border-radius: 2px; }

    /* ── Member counter card ── */
    .members-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 1.2rem 1.5rem;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 1.2rem;
      text-align: left;
      position: relative;
      overflow: hidden;
      transition: border-color 0.3s;
    }
    .members-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(88,101,242,0.06), transparent);
      pointer-events: none;
    }
    .members-card:hover { border-color: rgba(88,101,242,0.3); }
    .members-icon {
      width: 44px; height: 44px;
      background: rgba(88,101,242,0.12);
      border: 1px solid rgba(88,101,242,0.25);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-size: 1.25rem;
    }
    .members-info { flex: 1; }
    .members-label {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: rgba(255,255,255,0.3);
      margin-bottom: 0.3rem;
    }
    .members-count {
      font-size: 1.65rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: #fff;
      line-height: 1;
      display: flex;
      align-items: baseline;
      gap: 0.45rem;
    }
    .count-num {
      background: linear-gradient(135deg, #fff 30%, #7289da 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .count-unit {
      font-size: 0.78rem;
      font-weight: 500;
      color: rgba(255,255,255,0.3);
      -webkit-text-fill-color: rgba(255,255,255,0.3);
    }
    .members-online {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      margin-top: 0.35rem;
      font-size: 0.73rem;
      color: rgba(255,255,255,0.35);
    }
    .online-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #23a55a;
      animation: blink 2s ease-in-out infinite;
      flex-shrink: 0;
    }
    .online-count { color: #23a55a; font-weight: 600; }

    .members-meta {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.3rem;
      flex-shrink: 0;
    }
    .refresh-icon {
      font-size: 1rem;
      color: rgba(255,255,255,0.2);
      cursor: pointer;
      transition: color 0.2s;
      user-select: none;
    }
    .refresh-icon:hover { color: rgba(255,255,255,0.5); }
    .refresh-icon.spinning { animation: spin 0.6s linear; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .refresh-time {
      font-size: 0.62rem;
      color: rgba(255,255,255,0.18);
      letter-spacing: 0.03em;
    }

    @keyframes countPop {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.1); }
      100% { transform: scale(1); }
    }
    .count-pop { animation: countPop 0.35s ease; }

    /* ── Status bar ── */
    .status-bar {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px; padding: 1.2rem 1.5rem;
      display: flex; align-items: center; gap: 1rem; text-align: left;
      margin-bottom: 1.5rem;
    }
    .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #ff8800; flex-shrink: 0; animation: blink 1.5s ease-in-out infinite; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    .status-text { font-size: 0.85rem; color: rgba(255,255,255,0.5); }
    .status-text strong { display: block; color: rgba(255,255,255,0.85); font-weight: 600; margin-bottom: 0.1rem; }

    /* ── Discord button ── */
    .socials { display: flex; justify-content: center; gap: 0.75rem; margin-bottom: 0.5rem; }
    .social-btn {
      display: inline-flex; align-items: center; gap: 0.6rem;
      padding: 0.65rem 1.25rem; border-radius: 10px;
      font-size: 0.85rem; font-weight: 600; text-decoration: none;
      transition: transform 0.2s ease, opacity 0.2s ease, box-shadow 0.2s ease;
      cursor: pointer;
    }
    .social-btn:hover { transform: translateY(-2px); opacity: 0.9; box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
    .social-btn:active { transform: translateY(0); }
    .discord-btn { background: #5865F2; color: #fff; border: 1px solid rgba(255,255,255,0.1); }

    .footer { margin-top: 2.5rem; font-size: 0.72rem; color: rgba(255,255,255,0.2); letter-spacing: 0.05em; }

    @media (max-width: 480px) {
      .orb-1 { width: 300px; height: 300px; top: -80px; left: -80px; }
      .orb-2 { width: 250px; height: 250px; bottom: -60px; right: -60px; }
      .container { padding: 2rem 1.25rem; }
      .badge { font-size: 0.65rem; letter-spacing: 0.15em; margin-bottom: 1.5rem; }
      .logo { font-size: 3.5rem; margin-bottom: 1.25rem; }
      h1 { font-size: 1rem; margin-bottom: 2rem; }
      .separator { margin-bottom: 2rem; }
      .members-card { padding: 1rem 1.25rem; gap: 0.9rem; }
      .members-count { font-size: 1.35rem; }
      .status-bar { padding: 1rem 1.25rem; gap: 0.85rem; }
      .status-text { font-size: 0.8rem; }
      .footer { margin-top: 2rem; font-size: 0.68rem; }
    }
    @media (max-width: 360px) {
      .logo { font-size: 3rem; }
      h1 { font-size: 0.95rem; }
    }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="container">

    <div class="badge">⚙&nbsp; En cours de développement</div>
    <div class="logo">AK-47</div>
    <div class="separator"></div>
    <h1>Le site est en dev.<br><strong>Revenez bientôt</strong>, quelque chose de grand arrive.</h1>

    <!-- Live member counter -->
    <div class="members-card">
      <div class="members-icon">👥</div>
      <div class="members-info">
        <div class="members-label">Membres inscrits</div>
        <div class="members-count">
          <span class="count-num" id="total-count">—</span>
          <span class="count-unit">membres</span>
        </div>
        <div class="members-online">
          <div class="online-dot"></div>
          <span class="online-count" id="online-count">—</span>&nbsp;en ligne maintenant
        </div>
      </div>
      <div class="members-meta">
        <span class="refresh-icon" id="refresh-icon" onclick="fetchMembers()" title="Actualiser">↻</span>
        <span class="refresh-time" id="refresh-time">—</span>
      </div>
    </div>

    <div class="status-bar">
      <div class="status-dot"></div>
      <div class="status-text">
        <strong>Travaux en cours</strong>
        Je bosse sur le site.
      </div>
    </div>

    <div class="socials">
      <a href="https://discord.gg/mH4raEhSgH" target="_blank" rel="noopener noreferrer" class="social-btn discord-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.002.022.015.043.033.055a19.875 19.875 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/>
        </svg>
        Rejoindre le Discord
      </a>
    </div>

    <div class="footer">© 2026 AK-47 &nbsp;·&nbsp; ak-47.fr</div>
  </div>

  <script>
    const BACKEND = 'https://ak47-backend.onrender.com';
    let previousTotal = null;

    function animateCount(el, from, to, duration = 900) {
      if (from === to) return;
      const start = performance.now();
      function update(now) {
        const elapsed = now - start;
        const progress = Math.min(elapsed / duration, 1);
        const ease = 1 - Math.pow(1 - progress, 3);
        const value = Math.round(from + (to - from) * ease);
        el.textContent = value.toLocaleString('fr-FR');
        if (progress < 1) requestAnimationFrame(update);
        else el.textContent = to.toLocaleString('fr-FR');
      }
      requestAnimationFrame(update);
    }

    async function fetchMembers() {
      const icon = document.getElementById('refresh-icon');
      icon.classList.add('spinning');
      document.getElementById('refresh-time').textContent = '…';

      try {
        const res = await fetch(BACKEND + '/api/members');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();

        const members = data.members || [];
        const total = members.length;
        const now = Date.now();
        const OFFLINE_THRESHOLD = 2 * 60 * 1000;
        const online = members.filter(m =>
          (m.status === 'online' || m.status === 'idle' || m.status === 'dnd') &&
          m.lastSeen && (now - m.lastSeen) < OFFLINE_THRESHOLD
        ).length;

        const totalEl = document.getElementById('total-count');
        const onlineEl = document.getElementById('online-count');

        if (previousTotal !== null && previousTotal !== total) {
          totalEl.closest('.members-count').classList.add('count-pop');
          setTimeout(() => totalEl.closest('.members-count').classList.remove('count-pop'), 400);
        }

        animateCount(totalEl, previousTotal !== null ? previousTotal : 0, total);
        previousTotal = total;
        onlineEl.textContent = online.toLocaleString('fr-FR');

        // Update timestamp
        const h = new Date().getHours().toString().padStart(2,'0');
        const m2 = new Date().getMinutes().toString().padStart(2,'0');
        document.getElementById('refresh-time').textContent = h + ':' + m2;

      } catch (e) {
        document.getElementById('total-count').textContent = '—';
        document.getElementById('online-count').textContent = '—';
        document.getElementById('refresh-time').textContent = 'erreur';
      } finally {
        setTimeout(() => icon.classList.remove('spinning'), 600);
      }
    }

    // Fetch on load, then every 30s
    fetchMembers();
    setInterval(fetchMembers, 30000);
  </script>
</body>
</html>

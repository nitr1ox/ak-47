<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AK-47 — Panel Admin</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange: #ff3c00;
      --orange2: #ff8800;
      --discord: #5865F2;
      --green: #23a55a;
      --red: #c41e3a;
      --bg: #0a0a0a;
      --surface: #111113;
      --surface2: #1a1a1d;
      --border: rgba(255,255,255,0.08);
      --text: #fff;
      --muted: rgba(255,255,255,0.4);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── LOGIN ── */
    #login-screen {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 1rem;
    }

    .login-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.5rem 2rem;
      max-width: 380px; width: 100%;
      text-align: center;
    }

    .login-logo {
      font-size: 2.5rem; font-weight: 800;
      background: linear-gradient(135deg, #fff 30%, #ff6030);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; margin-bottom: 0.25rem;
    }
    .login-sub { font-size: 0.8rem; color: var(--muted); margin-bottom: 2rem; letter-spacing: 0.1em; text-transform: uppercase; }

    .field { margin-bottom: 1rem; text-align: left; }
    .field label { display: block; font-size: 0.75rem; font-weight: 600; color: var(--muted); margin-bottom: 0.4rem; text-transform: uppercase; letter-spacing: 0.08em; }
    .field input {
      width: 100%; background: rgba(255,255,255,0.05);
      border: 1px solid var(--border); border-radius: 10px;
      padding: 0.75rem 1rem; color: #fff;
      font-size: 0.9rem; font-family: 'Inter', sans-serif;
      outline: none; transition: border-color 0.2s;
    }
    .field input:focus { border-color: rgba(255,100,48,0.5); }

    .btn-primary {
      width: 100%; background: linear-gradient(135deg, var(--orange), var(--orange2));
      color: #fff; border: none; border-radius: 10px;
      padding: 0.8rem; font-size: 0.95rem; font-weight: 700;
      font-family: 'Inter', sans-serif; cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      margin-top: 0.5rem;
    }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.4; cursor: default; transform: none; }

    .login-error {
      background: rgba(196,30,58,0.15); border: 1px solid rgba(196,30,58,0.3);
      border-radius: 8px; padding: 0.6rem 1rem;
      font-size: 0.82rem; color: #ff6b6b;
      margin-top: 1rem; display: none;
    }

    /* ── PANEL ── */
    #admin-panel { display: none; }

    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0.9rem 2rem;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 50;
    }
    .topbar-left { display: flex; align-items: center; gap: 0.75rem; }
    .topbar-logo { font-size: 1.3rem; font-weight: 800; background: linear-gradient(135deg, #fff 30%, #ff6030); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .topbar-tag { background: rgba(255,60,0,0.15); border: 1px solid rgba(255,60,0,0.3); color: #ff6030; font-size: 0.65rem; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; padding: 0.2rem 0.6rem; border-radius: 999px; }
    .topbar-user { font-size: 0.8rem; color: var(--muted); }
    .btn-logout { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--muted); border-radius: 8px; padding: 0.4rem 0.9rem; font-size: 0.8rem; font-family: 'Inter', sans-serif; cursor: pointer; transition: all 0.2s; }
    .btn-logout:hover { border-color: rgba(255,100,48,0.4); color: #ff6030; }

    .content { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem; }

    /* Stats row */
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 2rem; }
    .stat-box {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 1.2rem 1rem; text-align: center;
    }
    .stat-box .val { font-size: 2rem; font-weight: 800; line-height: 1; margin-bottom: 0.3rem; }
    .stat-box .lbl { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); }
    .stat-box.s-hype .val { background: linear-gradient(135deg, #fff 40%, #ff6030); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .stat-box.s-members .val { background: linear-gradient(135deg, #fff 40%, #7289da); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .stat-box.s-online .val { background: linear-gradient(135deg, #fff 40%, #23a55a); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .stat-box.s-visitors .val { background: linear-gradient(135deg, #fff 40%, #ff8800); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

    /* Sections */
    .section { margin-bottom: 2rem; }
    .section-title {
      font-size: 0.75rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.12em; color: var(--muted);
      margin-bottom: 1rem; padding-bottom: 0.6rem;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }

    /* Card */
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 1.5rem;
    }

    /* Broadcast form */
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
    .form-group { display: flex; flex-direction: column; gap: 0.4rem; }
    .form-group label { font-size: 0.72rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
    .form-group input, .form-group select, .form-group textarea {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border); border-radius: 10px;
      padding: 0.7rem 1rem; color: #fff;
      font-size: 0.88rem; font-family: 'Inter', sans-serif;
      outline: none; transition: border-color 0.2s; resize: vertical;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: rgba(255,100,48,0.5); }
    .form-group select option { background: #1a1a1d; }
    .form-group textarea { min-height: 120px; }

    .preview-box {
      background: rgba(255,255,255,0.03); border: 1px solid var(--border);
      border-radius: 10px; padding: 1rem;
      font-size: 0.85rem; color: var(--muted);
      min-height: 80px; margin-bottom: 1rem;
      max-height: 200px; overflow-y: auto;
    }

    .btn-row { display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap; }
    .btn-send {
      background: linear-gradient(135deg, var(--orange), var(--orange2));
      color: #fff; border: none; border-radius: 10px;
      padding: 0.7rem 1.5rem; font-size: 0.9rem; font-weight: 700;
      font-family: 'Inter', sans-serif; cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
    }
    .btn-send:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-send:disabled { opacity: 0.4; cursor: default; transform: none; }
    .btn-preview {
      background: rgba(255,255,255,0.06); border: 1px solid var(--border);
      color: rgba(255,255,255,0.6); border-radius: 10px;
      padding: 0.7rem 1.2rem; font-size: 0.88rem; font-weight: 600;
      font-family: 'Inter', sans-serif; cursor: pointer;
      transition: all 0.2s;
    }
    .btn-preview:hover { border-color: rgba(255,255,255,0.2); color: #fff; }

    .send-status {
      font-size: 0.82rem; padding: 0.5rem 1rem;
      border-radius: 8px; display: none;
    }
    .send-status.ok { background: rgba(35,165,90,0.15); border: 1px solid rgba(35,165,90,0.3); color: #23a55a; }
    .send-status.err { background: rgba(196,30,58,0.15); border: 1px solid rgba(196,30,58,0.3); color: #ff6b6b; }

    /* History table */
    .table { width: 100%; border-collapse: collapse; font-size: 0.83rem; }
    .table th { text-align: left; font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); padding: 0.5rem 0.75rem; border-bottom: 1px solid var(--border); }
    .table td { padding: 0.65rem 0.75rem; border-bottom: 1px solid rgba(255,255,255,0.04); vertical-align: middle; }
    .table tr:last-child td { border-bottom: none; }
    .table tr:hover td { background: rgba(255,255,255,0.02); }
    .pill { display: inline-block; border-radius: 999px; padding: 0.15rem 0.6rem; font-size: 0.68rem; font-weight: 700; }
    .pill.all { background: rgba(88,101,242,0.2); color: #7289da; }
    .pill.og  { background: rgba(255,136,0,0.2); color: #ff9933; }

    .empty-state { text-align: center; padding: 2rem; color: var(--muted); font-size: 0.85rem; }

    /* OG list */
    .og-list { display: flex; flex-direction: column; gap: 0.5rem; max-height: 300px; overflow-y: auto; }
    .og-item {
      display: flex; align-items: center; gap: 0.75rem;
      background: rgba(255,255,255,0.03); border-radius: 8px;
      padding: 0.6rem 0.9rem; font-size: 0.83rem;
    }
    .og-pos { font-size: 0.7rem; font-weight: 700; color: #ff9933; width: 28px; }
    .og-email { color: rgba(255,255,255,0.7); flex: 1; }
    .og-date { font-size: 0.7rem; color: var(--muted); }

    /* Mobile */
    @media (max-width: 600px) {
      .stats-row { grid-template-columns: 1fr 1fr; }
      .form-row { grid-template-columns: 1fr; }
      .topbar { padding: 0.75rem 1rem; }
      .content { padding: 1.25rem 1rem; }
      .topbar-user { display: none; }
    }
  </style>
</head>
<body>

<!-- ── LOGIN ── -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">AK-47</div>
    <div class="login-sub">Panel Administrateur</div>

    <div class="field">
      <label>Pseudo</label>
      <input type="text" id="login-user" placeholder="admin" autocomplete="username" />
    </div>
    <div class="field">
      <label>Mot de passe</label>
      <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password" />
    </div>

    <button class="btn-primary" id="login-btn" onclick="doLogin()">Se connecter</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- ── PANEL ── -->
<div id="admin-panel">
  <div class="topbar">
    <div class="topbar-left">
      <span class="topbar-logo">AK-47</span>
      <span class="topbar-tag">Admin</span>
    </div>
    <div style="display:flex;align-items:center;gap:1rem">
      <span class="topbar-user" id="topbar-username"></span>
      <button class="btn-logout" onclick="logout()">Déconnexion</button>
    </div>
  </div>

  <div class="content">

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-box s-hype">
        <div class="val" id="st-hype">—</div>
        <div class="lbl">Hype</div>
      </div>
      <div class="stat-box s-members">
        <div class="val" id="st-members">—</div>
        <div class="lbl">Membres</div>
      </div>
      <div class="stat-box s-online">
        <div class="val" id="st-online">—</div>
        <div class="lbl">En ligne</div>
      </div>
      <div class="stat-box s-visitors">
        <div class="val" id="st-visitors">—</div>
        <div class="lbl">Visites</div>
      </div>
    </div>

    <!-- Broadcast -->
    <div class="section">
      <div class="section-title">
        <span>📧 Envoyer un mail</span>
      </div>
      <div class="card">
        <div class="form-row">
          <div class="form-group">
            <label>Destinataires</label>
            <select id="bc-target">
              <option value="all">Tous les membres inscrits</option>
              <option value="og">OG uniquement (liste hype)</option>
            </select>
          </div>
          <div class="form-group">
            <label>Sujet</label>
            <input type="text" id="bc-subject" placeholder="ex: Le site est en ligne ! 🎉" />
          </div>
        </div>

        <div class="form-group" style="margin-bottom:1rem">
          <label>Contenu (HTML autorisé)</label>
          <textarea id="bc-html" placeholder="<p>Salut <strong>{{username}}</strong>, ...</p>&#10;&#10;Utilise {{username}} pour personnaliser le prénom."></textarea>
        </div>

        <div id="preview-area" style="display:none;margin-bottom:1rem">
          <div class="form-group">
            <label>Aperçu</label>
            <div class="preview-box" id="preview-content"></div>
          </div>
        </div>

        <div class="btn-row">
          <button class="btn-send" id="send-btn" onclick="sendBroadcast()">🚀 Envoyer</button>
          <button class="btn-preview" onclick="togglePreview()">👁 Aperçu</button>
          <div class="send-status" id="send-status"></div>
        </div>
      </div>
    </div>

    <!-- OG List -->
    <div class="section">
      <div class="section-title">
        <span>🏆 Liste OG (hype avec email)</span>
        <span id="og-count" style="font-size:0.8rem;color:var(--muted);font-weight:600"></span>
      </div>
      <div class="card">
        <div class="og-list" id="og-list">
          <div class="empty-state">Chargement…</div>
        </div>
      </div>
    </div>

    <!-- Historique broadcasts -->
    <div class="section">
      <div class="section-title">
        <span>📋 Historique des envois</span>
        <button class="btn-preview" onclick="loadHistory()" style="font-size:0.72rem;padding:0.3rem 0.8rem">↻ Refresh</button>
      </div>
      <div class="card" style="padding:0;overflow:hidden">
        <div id="history-wrap">
          <div class="empty-state" style="padding:2rem">Chargement…</div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
  const BACKEND = 'https://ak47-backend.onrender.com';
  let TOKEN = sessionStorage.getItem('ak47_admin_token') || '';
  let ADMIN_USER = sessionStorage.getItem('ak47_admin_user') || '';

  // ── LOGIN ──────────────────────────────────────────────────────────────
  async function doLogin() {
    const btn = document.getElementById('login-btn');
    const errEl = document.getElementById('login-error');
    const user = document.getElementById('login-user').value.trim();
    const pass = document.getElementById('login-pass').value;
    if (!user || !pass) return showLoginError('Remplis tous les champs.');

    btn.disabled = true; btn.textContent = 'Connexion…';
    errEl.style.display = 'none';

    try {
      const res = await fetch(BACKEND + '/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: user, password: pass })
      });
      const d = await res.json();
      if (!res.ok) return showLoginError(d.error || 'Erreur de connexion.');
      if (d.user?.role !== 'admin') return showLoginError('Accès réservé aux admins.');

      TOKEN = d.token;
      ADMIN_USER = d.user.username;
      sessionStorage.setItem('ak47_admin_token', TOKEN);
      sessionStorage.setItem('ak47_admin_user', ADMIN_USER);
      showPanel();
    } catch(e) {
      showLoginError('Impossible de joindre le serveur.');
    } finally {
      btn.disabled = false; btn.textContent = 'Se connecter';
    }
  }

  function showLoginError(msg) {
    const el = document.getElementById('login-error');
    el.textContent = msg; el.style.display = 'block';
    const btn = document.getElementById('login-btn');
    btn.disabled = false; btn.textContent = 'Se connecter';
  }

  document.getElementById('login-pass').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  function logout() {
    sessionStorage.removeItem('ak47_admin_token');
    sessionStorage.removeItem('ak47_admin_user');
    TOKEN = ''; ADMIN_USER = '';
    document.getElementById('admin-panel').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
  }

  // ── PANEL ──────────────────────────────────────────────────────────────
  function showPanel() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-panel').style.display = 'block';
    document.getElementById('topbar-username').textContent = ADMIN_USER;
    loadStats();
    loadOgList();
    loadHistory();
  }

  async function loadStats() {
    try {
      const res = await fetch(BACKEND + '/api/stats');
      const d = await res.json();
      document.getElementById('st-hype').textContent = (d.interested || 0).toLocaleString('fr-FR');
      document.getElementById('st-members').textContent = (d.total || 0).toLocaleString('fr-FR');
      document.getElementById('st-online').textContent = (d.online || 0).toLocaleString('fr-FR');
      document.getElementById('st-visitors').textContent = (d.visitors || 0).toLocaleString('fr-FR');
    } catch(e) {}
  }

  async function loadOgList() {
    const el = document.getElementById('og-list');
    try {
      const res = await fetch(BACKEND + '/api/og-emails', {
        headers: { 'Authorization': 'Bearer ' + TOKEN }
      });
      if (res.status === 401) { logout(); return; }
      const d = await res.json();
      document.getElementById('og-count').textContent = d.count + ' emails';
      if (!d.emails?.length) {
        el.innerHTML = '<div class="empty-state">Aucun email OG pour l\'instant.</div>';
        return;
      }
      el.innerHTML = d.emails.map(e => `
        <div class="og-item">
          <span class="og-pos">#${e.position}</span>
          <span class="og-email">${e.email}</span>
          <span class="og-date">${new Date(e.registeredAt).toLocaleDateString('fr-FR')}</span>
        </div>
      `).join('');
    } catch(e) {
      el.innerHTML = '<div class="empty-state">Erreur de chargement.</div>';
    }
  }

  async function loadHistory() {
    const wrap = document.getElementById('history-wrap');
    try {
      const res = await fetch(BACKEND + '/api/admin/broadcast/history', {
        headers: { 'Authorization': 'Bearer ' + TOKEN }
      });
      if (res.status === 401) { logout(); return; }
      const d = await res.json();
      if (!d.history?.length) {
        wrap.innerHTML = '<div class="empty-state">Aucun envoi pour l\'instant.</div>';
        return;
      }
      wrap.innerHTML = `
        <table class="table">
          <thead>
            <tr>
              <th>Date</th>
              <th>Sujet</th>
              <th>Cible</th>
              <th>Envoyés</th>
              <th>Erreurs</th>
              <th>Par</th>
            </tr>
          </thead>
          <tbody>
            ${d.history.map(h => `
              <tr>
                <td>${new Date(h.sentAt).toLocaleString('fr-FR')}</td>
                <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${h.subject}</td>
                <td><span class="pill ${h.target}">${h.target === 'og' ? 'OG' : 'Tous'}</span></td>
                <td style="color:#23a55a;font-weight:700">${h.sent}</td>
                <td style="color:${h.errors > 0 ? '#ff6b6b' : 'var(--muted)'}">${h.errors}</td>
                <td style="color:var(--muted)">${h.sentBy}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    } catch(e) {
      wrap.innerHTML = '<div class="empty-state">Erreur de chargement.</div>';
    }
  }

  // ── BROADCAST ──────────────────────────────────────────────────────────
  function togglePreview() {
    const area = document.getElementById('preview-area');
    const html = document.getElementById('bc-html').value;
    if (area.style.display === 'none') {
      document.getElementById('preview-content').innerHTML = html || '<em style="color:rgba(255,255,255,0.2)">Aucun contenu</em>';
      area.style.display = 'block';
    } else {
      area.style.display = 'none';
    }
  }

  async function sendBroadcast() {
    const subject = document.getElementById('bc-subject').value.trim();
    const html    = document.getElementById('bc-html').value.trim();
    const target  = document.getElementById('bc-target').value;
    const statusEl = document.getElementById('send-status');
    const btn = document.getElementById('send-btn');

    if (!subject) return showStatus('Le sujet est requis.', false);
    if (!html)    return showStatus('Le contenu est requis.', false);

    const label = target === 'og' ? 'les OG' : 'tous les membres';
    if (!confirm(`Envoyer "${subject}" à ${label} ?`)) return;

    btn.disabled = true; btn.textContent = '⏳ Envoi en cours…';
    statusEl.style.display = 'none';

    try {
      const res = await fetch(BACKEND + '/api/admin/broadcast', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + TOKEN
        },
        body: JSON.stringify({ subject, html, target })
      });
      if (res.status === 401) { logout(); return; }
      const d = await res.json();
      if (!res.ok) return showStatus(d.error || 'Erreur serveur.', false);
      showStatus(`✅ ${d.sent} mail(s) envoyé(s) sur ${d.total} — ${d.errors} erreur(s).`, true);
      loadHistory();
    } catch(e) {
      showStatus('Impossible de joindre le serveur.', false);
    } finally {
      btn.disabled = false; btn.textContent = '🚀 Envoyer';
    }
  }

  function showStatus(msg, ok) {
    const el = document.getElementById('send-status');
    el.textContent = msg;
    el.className = 'send-status ' + (ok ? 'ok' : 'err');
    el.style.display = 'block';
    setTimeout(() => { if (ok) el.style.display = 'none'; }, 6000);
  }

  // ── INIT ───────────────────────────────────────────────────────────────
  if (TOKEN) showPanel();
</script>
</body>
</html>

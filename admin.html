<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>ak-47.fr — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #000; --white: #fff;
      --gray-50: #fafafa; --gray-100: #f4f4f5; --gray-200: #e4e4e7;
      --gray-400: #a1a1aa; --gray-500: #71717a;
      --gray-700: #3f3f46; --gray-900: #18181b;
      --amber: #f59e0b; --green: #10b981; --red: #ef4444;
    }
    body {
      background: var(--gray-50); color: var(--gray-900);
      font-family: 'Inter', sans-serif; font-size: 14px;
      -webkit-font-smoothing: antialiased; min-height: 100vh;
    }
    nav {
      background: var(--white); border-bottom: 1px solid var(--gray-200);
      padding: 0 24px; height: 52px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 10;
    }
    .brand { font-size: 15px; font-weight: 700; color: var(--black); text-decoration: none; }
    .brand span { color: var(--gray-500); font-weight: 400; }
    .nav-right { display: flex; align-items: center; gap: 12px; }
    .logout { font-size: 12px; color: var(--gray-500); cursor: pointer; background: none; border: none; font-family: inherit; }
    .logout:hover { color: var(--gray-900); }
    main { max-width: 640px; margin: 0 auto; padding: 32px 24px; }
    h2 { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; margin-bottom: 4px; }
    .subtitle { font-size: 13px; color: var(--gray-500); margin-bottom: 32px; }

    /* Card maintenance */
    .card {
      background: var(--white); border: 1px solid var(--gray-200);
      border-radius: 12px; padding: 24px;
    }
    .card-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .card-title { font-size: 14px; font-weight: 600; }
    .card-desc { font-size: 13px; color: var(--gray-500); line-height: 1.6; margin-bottom: 20px; }

    /* Toggle switch */
    .toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; background: var(--gray-50); border-radius: 8px; border: 1px solid var(--gray-200); }
    .toggle-label { font-size: 13px; font-weight: 500; }
    .toggle-sub { font-size: 12px; color: var(--gray-500); margin-top: 2px; }
    .switch { position: relative; width: 44px; height: 24px; flex-shrink: 0; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; inset: 0; background: var(--gray-200);
      border-radius: 100px; cursor: pointer; transition: background .2s;
    }
    .slider::before {
      content: ''; position: absolute;
      width: 18px; height: 18px; border-radius: 50%;
      background: var(--white); top: 3px; left: 3px;
      transition: transform .2s; box-shadow: 0 1px 3px rgba(0,0,0,.15);
    }
    input:checked + .slider { background: var(--amber); }
    input:checked + .slider::before { transform: translateX(20px); }

    /* Status badge */
    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 10px; border-radius: 100px; font-size: 11px; font-weight: 500;
    }
    .badge-on  { background: #fef3c7; color: #92400e; }
    .badge-off { background: #d1fae5; color: #065f46; }
    .badge-dot { width: 6px; height: 6px; border-radius: 50%; }
    .badge-on  .badge-dot { background: var(--amber); animation: pulse 2s infinite; }
    .badge-off .badge-dot { background: var(--green); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    .save-btn {
      margin-top: 16px; width: 100%; padding: 10px;
      background: var(--black); color: var(--white);
      border: none; border-radius: 7px; font-family: inherit;
      font-size: 13px; font-weight: 500; cursor: pointer; transition: opacity .15s;
    }
    .save-btn:hover { opacity: .85; }
    .save-btn:disabled { opacity: .5; cursor: default; }
    .feedback { font-size: 12px; color: var(--green); margin-top: 10px; text-align: center; min-height: 18px; }
    .feedback.err { color: var(--red); }

    /* Auth guard */
    .auth-guard { display: none; }
    body.loading main { visibility: hidden; }
  </style>
</head>
<body class="loading">
  <nav>
    <a class="brand" href="/admin">ak-47<span>.fr</span> <span style="font-size:11px;color:var(--gray-400);font-weight:400">/ admin</span></a>
    <div class="nav-right">
      <span id="admin-name" style="font-size:12px;color:var(--gray-500)"></span>
      <button class="logout" onclick="logout()">Déconnexion</button>
    </div>
  </nav>

  <main>
    <h2>Panel Admin</h2>
    <p class="subtitle">Gestion du site ak-47.fr</p>

    <!-- Carte maintenance -->
    <div class="card">
      <div class="card-header">
        <span class="card-title">Mode maintenance</span>
        <span class="badge badge-off" id="status-badge">
          <span class="badge-dot"></span>
          <span id="status-text">En ligne</span>
        </span>
      </div>
      <p class="card-desc">Quand activé, toutes les pages du site affichent la page de maintenance. Seuls les admins connectés peuvent accéder au panel.</p>

      <div class="toggle-row">
        <div>
          <div class="toggle-label">Maintenance activée</div>
          <div class="toggle-sub" id="toggle-sub">Le site est actuellement accessible.</div>
        </div>
        <label class="switch">
          <input type="checkbox" id="maintenance-toggle" onchange="updateStatus()"/>
          <span class="slider"></span>
        </label>
      </div>

      <button class="save-btn" id="save-btn" onclick="saveMaintenanceMode()">Enregistrer</button>
      <p class="feedback" id="feedback"></p>
    </div>
  </main>

  <script>
    const API = '/api';
    let token = localStorage.getItem('token');
    let pendingState = null;

    async function refreshAccessToken() {
      const refreshToken = localStorage.getItem('refreshToken');
      const userId = localStorage.getItem('userId');
      if (!refreshToken || !userId) return null;
      try {
        const r = await fetch(`${API}/auth/refresh`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ refreshToken, userId })
        });
        if (!r.ok) return null;
        const data = await r.json();
        localStorage.setItem('token', data.token);
        localStorage.setItem('refreshToken', data.refreshToken);
        token = data.token;
        return data.token;
      } catch { return null; }
    }

    async function authFetch(url, opts = {}) {
      opts.headers = { ...opts.headers, Authorization: 'Bearer ' + token };
      let r = await fetch(url, opts);
      if (r.status === 401) {
        const newToken = await refreshAccessToken();
        if (!newToken) { redirectToLogin(); return null; }
        opts.headers.Authorization = 'Bearer ' + newToken;
        r = await fetch(url, opts);
      }
      return r;
    }

    function redirectToLogin() {
      localStorage.clear();
      window.location.href = '/maintenance-login';
    }

    function logout() {
      const refreshToken = localStorage.getItem('refreshToken');
      const userId = localStorage.getItem('userId');
      fetch(`${API}/auth/logout`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ refreshToken, userId })
      }).finally(() => { localStorage.clear(); window.location.href = '/maintenance'; });
    }

    function setBadge(on) {
      const badge = document.getElementById('status-badge');
      const text  = document.getElementById('status-text');
      const sub   = document.getElementById('toggle-sub');
      if (on) {
        badge.className = 'badge badge-on';
        text.textContent = 'Maintenance';
        sub.textContent  = 'Le site affiche la page de maintenance.';
      } else {
        badge.className = 'badge badge-off';
        text.textContent = 'En ligne';
        sub.textContent  = 'Le site est actuellement accessible.';
      }
    }

    function updateStatus() {
      const on = document.getElementById('maintenance-toggle').checked;
      setBadge(on);
      pendingState = on;
    }

    async function saveMaintenanceMode() {
      const on = document.getElementById('maintenance-toggle').checked;
      const btn = document.getElementById('save-btn');
      const fb  = document.getElementById('feedback');
      btn.disabled = true;
      btn.textContent = 'Enregistrement…';
      fb.className = 'feedback';
      fb.textContent = '';

      const r = await authFetch(`${API}/admin/maintenance`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ enabled: on })
      });

      btn.disabled = false;
      btn.textContent = 'Enregistrer';

      if (!r) return;
      if (r.ok) {
        fb.textContent = on ? '✓ Maintenance activée.' : '✓ Site remis en ligne.';
        setBadge(on);
      } else {
        fb.className = 'feedback err';
        fb.textContent = '✗ Erreur lors de la sauvegarde.';
      }
    }

    async function init() {
      if (!token) { redirectToLogin(); return; }

      // Vérifier que c'est un admin
      const check = await authFetch(`${API}/admin/stats`);
      if (!check || !check.ok) { redirectToLogin(); return; }

      // Afficher le username
      const username = localStorage.getItem('username');
      if (username) document.getElementById('admin-name').textContent = '@' + username;

      // Charger l'état maintenance actuel
      const mr = await fetch(`${API}/admin/maintenance`);
      if (mr.ok) {
        const { maintenance } = await mr.json();
        document.getElementById('maintenance-toggle').checked = maintenance;
        setBadge(maintenance);
      }

      document.body.classList.remove('loading');
    }

    init();
  </script>
</body>
</html>

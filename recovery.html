<body>
<div class="page-shell">

Conditions</h1>

Conditions d'utilisation de ak-47.fr.</p>

    <div class="field"><label>Adresse email</label><input type="email" id="email" placeholder="email@exemple.fr"/></div>

  </div>
</div>
<script>
function toggleTheme(){
  var cur=document.documentElement.getAttribute("data-theme")||"light";
  var next=cur==="dark"?"light":"dark";
  document.documentElement.setAttribute("data-theme",next);
  localStorage.setItem("theme",next);
  var btn=document.getElementById("themeToggle");
  if(btn) btn.textContent=next==="dark"?"☀️":"🌙";
}
document.addEventListener("DOMContentLoaded",function(){
  var btn=document.getElementById("themeToggle");
  if(btn){var cur=document.documentElement.getAttribute("data-theme")||"light";btn.textContent=cur==="dark"?"☀️":"🌙";}
});
</script>
</body>
</html>

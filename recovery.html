<!DOCTYPE html>
<html lang="fr">
<head><script>(function(){var t=localStorage.getItem("theme")||"light";document.documentElement.setAttribute("data-theme",t);})();</script>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>ak-47.fr</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/style.css"/>
</head>
<body>

<button id="globalThemeBtn" onclick="toggleTheme()" title="Changer le thème" aria-label="Changer le thème">🌙</button>
<div class="page-shell">
  <a href="/" class="logo-link">ak-47<span>.fr</span></a>
  <div class="card card-sm">
    <h1>Récupération
Conditions</h1>
    <p class="subtitle">Réinitialisez votre mot de passe.
Conditions d'utilisation de ak-47.fr.</p>

    <div id="alert"></div>
    <div class="field"><label>Adresse email</label><input type="email" id="email" placeholder="email@exemple.fr"/></div>
    <button class="btn btn-primary" onclick="document.getElementById(\"alert\").innerHTML=\"<div class=\\"alert alert-success\\">Si ce compte existe, un email vous a été envoyé.</div>\"">Envoyer le lien</button>
    <div class="form-footer" style="margin-top:14px;"><a href="/login">← Retour à la connexion</a></div>
  </div>
</div>
<script>
(function(){
  var btn = document.getElementById('globalThemeBtn');
  if(!btn) return;
  var t = document.documentElement.getAttribute('data-theme') || 'light';
  btn.textContent = t === 'dark' ? '☀️' : '🌙';
  btn.setAttribute('data-theme-btn', '1');
})();
function toggleTheme(){
  var cur = document.documentElement.getAttribute('data-theme') || 'light';
  var next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  var btn = document.getElementById('globalThemeBtn');
  if(btn) btn.textContent = next === 'dark' ? '☀️' : '🌙';
  var pill = document.getElementById('themeToggle');
  if(pill) pill.textContent = next === 'dark' ? '☀️' : '🌙';
}
document.addEventListener('DOMContentLoaded', function(){
  var btn = document.getElementById('globalThemeBtn');
  if(btn){var t=document.documentElement.getAttribute('data-theme')||'light'; btn.textContent=t==='dark'?'☀️':'🌙';}
});
</script>


</body>
</html>

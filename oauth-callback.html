<!DOCTYPE html>
<html lang="fr">
<head><script>(function(){var t=localStorage.getItem("theme")||"light";document.documentElement.setAttribute("data-theme",t);})();</script>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>ak-47.fr — Connexion...</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #fafafa; font-family: 'Inter', sans-serif;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 2px solid #e4e4e7; border-top-color: #000;
      border-radius: 50%; animation: spin .6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { font-size: 14px; color: #71717a; }
    .error { color: #ef4444; font-size: 14px; text-align: center; }
    a { color: #000; font-weight: 600; font-size: 13px; }
  </style>
</head>
<body>
<div style="position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:9998;"><a href="https://discord.gg/g7MysUNQXs" target="_blank" rel="noopener" class="discord-invite-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg> Discord</a></div>
<button id="globalThemeBtn" onclick="toggleTheme()" title="Changer le thème" aria-label="Changer le thème">🌙</button>
  <div class="spinner" id="spinner"></div>
  <p id="msg">Connexion en cours...</p>
  <div id="errorBox" style="display:none">
    <p class="error" id="errorMsg"></p>
    <br/>
    <a href="/login">← Retour à la connexion</a>
  </div>

  <script>
    const API = 'https://ak47-backend.onrender.com';
    const params = new URLSearchParams(window.location.search);
    const token  = params.get('token');
    const error  = params.get('error');

    function showError(msg) {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('msg').style.display = 'none';
      document.getElementById('errorMsg').textContent = msg;
      document.getElementById('errorBox').style.display = 'block';
    }

    if (error) {
      showError(decodeURIComponent(error));
    } else if (token) {

      (async () => {
        try {
          const r = await fetch(API + '/api/user/me', {
            headers: { Authorization: 'Bearer ' + token }
          });

          if (r.status === 401) { showError('Session expirée, reconnecte-toi.'); return; }
          if (!r.ok) { showError('Erreur de connexion, réessaie.'); return; }
          const data = await r.json();

          localStorage.setItem('token', token);
          localStorage.setItem('username', data.username);

          const isNew = params.get('new') === '1';
          document.getElementById('msg').textContent = 'Connecté ! Redirection...';
          setTimeout(() => window.location.href = isNew ? '/setup' : '/dashboard', 800);
        } catch {
          showError('Erreur réseau, réessaie.');
        }
      })();
    } else {
      window.location.href = '/login';
    }
  </script>
<script>
(function(){
  var btn = document.getElementById('globalThemeBtn');
  if(!btn) return;
  var t = document.documentElement.getAttribute('data-theme') || 'light';
  btn.textContent = t === 'dark' ? '☀️' : '🌙';
  btn.setAttribute('data-theme-btn', '1');
})();
function toggleTheme(){
  var cur = document.documentElement.getAttribute('data-theme') || 'light';
  var next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  var btn = document.getElementById('globalThemeBtn');
  if(btn) btn.textContent = next === 'dark' ? '☀️' : '🌙';
  var pill = document.getElementById('themeToggle');
  if(pill) pill.textContent = next === 'dark' ? '☀️' : '🌙';
}
document.addEventListener('DOMContentLoaded', function(){
  var btn = document.getElementById('globalThemeBtn');
  if(btn){var t=document.documentElement.getAttribute('data-theme')||'light'; btn.textContent=t==='dark'?'☀️':'🌙';}
});
</script>

<footer style="text-align:center;padding:20px;font-size:11px;color:var(--gray-400);border-top:1px solid var(--gray-200);margin-top:auto;">Fait par <a href="https://discord.gg/g7MysUNQXs" target="_blank" rel="noopener" style="color:var(--gray-400);font-weight:700;text-decoration:none;" onmouseover="this.style.opacity='0.7'" onmouseout="this.style.opacity='1'">nitrox</a></footer>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>ak-47.fr — S'inscrire</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/style.css"/>
  <style>
    .oauth-btn {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; padding: 10px 16px;
      border: 1px solid var(--gray-200); border-radius: var(--radius);
      background: var(--white); color: var(--gray-900);
      font-size: 13px; font-weight: 600; cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all .15s; text-decoration: none;
      margin-bottom: 8px;
    }
    .oauth-btn:hover { background: var(--gray-50); border-color: var(--gray-300); }
    .oauth-btn.discord { background: #5865F2; color: #fff; border-color: #5865F2; }
    .oauth-btn.discord:hover { background: #4752C4; border-color: #4752C4; }
    .divider-text { display: flex; align-items: center; gap: 10px; margin: 16px 0; }
    .divider-text span { font-size: 12px; color: var(--gray-400); white-space: nowrap; }
    .divider-text::before, .divider-text::after { content: ''; flex: 1; height: 1px; background: var(--gray-200); }
  </style>
</head>
<body>
<div class="page-shell">
  <a href="/" class="logo-link">ak-47<span>.fr</span></a>
  <div class="card">
    <h1>Créer un compte</h1>
    <p class="subtitle">Rejoignez 1 800 000+ utilisateurs sur ak-47.fr</p>

    <!-- OAuth buttons -->
    <a href="https://ak47-backend.onrender.com/api/auth/google" class="oauth-btn">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      S'inscrire avec Google
    </a>
    <a href="https://ak47-backend.onrender.com/api/auth/discord" class="oauth-btn discord">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
      S'inscrire avec Discord
    </a>

    <div class="divider-text"><span>ou avec un email</span></div>

    <div id="alert"></div>
    <div class="field">
      <label>Pseudo (votre URL)</label>
      <div class="input-row">
        <span class="input-prefix">ak-47.fr/</span>
        <input type="text" id="username" placeholder="votre-pseudo" autocomplete="username"/>
      </div>
    </div>
    <div class="field">
      <label>Adresse email</label>
      <input type="email" id="email" placeholder="email@exemple.fr" autocomplete="email"/>
    </div>
    <div class="field">
      <label>Mot de passe</label>
      <input type="password" id="password" placeholder="Minimum 8 caractères" autocomplete="new-password"/>
    </div>
    <button class="btn btn-primary" id="submitBtn" onclick="doRegister()">Créer mon profil</button>
    <p style="font-size:11px;color:var(--gray-400);text-align:center;margin-top:10px;line-height:1.5;">
      En créant un compte, vous acceptez nos <a href="/terms" style="color:var(--gray-700)">Conditions</a> et notre <a href="/privacy" style="color:var(--gray-700)">Politique de confidentialité</a>.
    </p>
    <div class="divider"></div>
    <div class="form-footer">Déjà un compte ? <a href="/login">Se connecter</a></div>
  </div>
</div>
<script>
  if (localStorage.getItem('token')) window.location.href = '/dashboard';
  const claim = new URLSearchParams(window.location.search).get('claim');
  if (claim) document.getElementById('username').value = claim;

  async function doRegister() {
    const btn = document.getElementById('submitBtn');
    const username = document.getElementById('username').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    if (!username || !email || !password) return showAlert('Remplissez tous les champs');
    if (password.length < 8) return showAlert('Mot de passe : 8 caractères minimum');
    btn.disabled = true; btn.innerHTML = '<span class="loading-spinner"></span>';
    try {
      const r = await fetch('https://ak47-backend.onrender.com/api/auth/register', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, email, password })
      });
      const data = await r.json();
      if (!r.ok) { showAlert(data.error || 'Erreur'); return; }
      localStorage.setItem('token', data.token);
      localStorage.setItem('username', data.username);
      window.location.href = '/dashboard';
    } catch { showAlert('Erreur réseau'); }
    finally { btn.disabled = false; btn.innerHTML = 'Créer mon profil'; }
  }

  function showAlert(msg) {
    document.getElementById('alert').innerHTML = `<div class="alert alert-error">${msg}</div>`;
  }
</script>
</body>
</html>

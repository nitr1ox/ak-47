<script>
function logError(msg, stack) {
  try {
    fetch("https://ak47-backend.onrender.com/api/log-error", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: msg, stack: stack || "", page: window.location.href, userAgent: navigator.userAgent })
    }).catch(function() {});
  } catch(e) {}
}
window.onerror = function(msg, src, line, col, err) {
  logError(msg, err ? err.stack : src + ":" + line + ":" + col);
};
window.onunhandledrejection = function(e) {
  logError("UnhandledPromise: " + (e.reason && e.reason.message || e.reason), e.reason && e.reason.stack);
};
</script>

<style>
#global-announcement {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 99999;
  padding: 10px 48px 10px 20px;
  font-size: 14px;

  animation: slideDown .3s ease;

}
@keyframes slideDown {
  from { transform: translateY(-100%); opacity: 0; }
  to   { transform: translateY(0);     opacity: 1; }
}
#global-announcement .ann-close {
  position: absolute;
  right: 14px; top: 50%;
  transform: translateY(-50%);
  background: rgba(255,255,255,.2);
  border: none; color: #fff;
  width: 24px; height: 24px;
  border-radius: 50%;
  font-size: 14px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s;
}
#global-announcement .ann-close:hover { background: rgba(255,255,255,.35); }
#global-announcement .ann-timer {
  font-size: 11px;
  font-weight: 400;
  opacity: .75;
  margin-left: 10px;
}
body.has-announcement { padding-top: 44px; }
</style>
<div id="global-announcement">
  <span id="ann-message"></span>
  <span id="ann-timer" class="ann-timer"></span>
  <button class="ann-close" onclick="dismissAnnouncement()" title="Fermer">✕</button>
</div>
<script>
(function() {
  const PAGE_TYPE = typeof ANNOUNCEMENT_PAGE_TYPE !== 'undefined' ? ANNOUNCEMENT_PAGE_TYPE : 'public';
  const API_BASE = typeof API !== 'undefined' ? API : 'https://ak47-backend.onrender.com';
  let annTimer = null;
  let annCountdown = null;

  async function loadAnnouncement() {
    try {
      const r = await fetch(API_BASE + '/api/stats/announcement');
      const d = await r.json();
      if (!d.announcement) return;
      const ann = d.announcement;
      
      if (ann.target === 'dashboard' && PAGE_TYPE !== 'dashboard') return;
      if (ann.target === 'public' && PAGE_TYPE !== 'public') return;
      showAnnouncement(ann);
    } catch {}
  }

  function showAnnouncement(ann) {
    const el = document.getElementById('global-announcement');
    const msgEl = document.getElementById('ann-message');
    const timerEl = document.getElementById('ann-timer');
    if (!el || !msgEl) return;

    const dismissed = sessionStorage.getItem('ann_dismissed');
    if (dismissed === String(ann.created_at)) return;

    el.style.background = ann.color || '#5865F2';
    el.style.display = 'block';
    msgEl.textContent = ann.message;
    document.body.classList.add('has-announcement');

    if (ann.expires_at) {
      let remaining = Math.max(0, Math.floor((ann.expires_at - Date.now()) / 1000));
      function updateTimer() {
        remaining = Math.max(0, Math.floor((ann.expires_at - Date.now()) / 1000));
        if (remaining <= 0) { hideAnnouncement(); return; }
        timerEl.textContent = `(${remaining}s)`;
      }
      updateTimer();
      annCountdown = setInterval(updateTimer, 1000);
    }
  }

  function hideAnnouncement() {
    const el = document.getElementById('global-announcement');
    if (el) el.style.display = 'none';
    document.body.classList.remove('has-announcement');
    if (annCountdown) clearInterval(annCountdown);
  }

  window.dismissAnnouncement = function() {
    
    fetch(API_BASE + '/api/stats/announcement').then(r => r.json()).then(d => {
      if (d.announcement) sessionStorage.setItem('ann_dismissed', String(d.announcement.created_at));
    }).catch(() => {});
    hideAnnouncement();
  };

  document.addEventListener('DOMContentLoaded', loadAnnouncement);
})();
</script>

<script>
const API = 'https://ak47-backend.onrender.com';
const token = localStorage.getItem('token');
const myUsername = localStorage.getItem('username');
let allTemplates = [];
let currentFilter = 'recent';
let favorites = JSON.parse(localStorage.getItem('tpl_favs') || '[]');
if (token) {
  document.getElementById('btnPublish').style.display = 'block';
  document.getElementById('filterMine').style.display = 'block';
}
function showToast(msg) {
  const t = document.getElementById('toastTp');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}
function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
}
function getFiltered() {
  const q = (document.getElementById('searchInput')?.value || '').toLowerCase();
  let list = Array.isArray(allTemplates) ? [...allTemplates] : [];
  if (currentFilter === 'popular') list.sort((a,b) => (b.uses||0)-(a.uses||0));
  if (currentFilter === 'mine') list = list.filter(t => t.username === myUsername);
  if (q) list = list.filter(t =>
    (t.name||'').toLowerCase().includes(q) ||
    (t.username||'').toLowerCase().includes(q) ||
    (t.description||'').toLowerCase().includes(q)
  );
  return list;
}
function buildPreview(config) {
  let bg = '#1a1a2e';
  if (config.bg_type === 'color' || config.bg_type === 'gradient') bg = config.bg_value || bg;
  const textColor = config.text_color || '#ffffff';
  const accent = config.accent_color || '#6366f1';
  const cardBg = config.card_bg ? hexToRgba(config.card_bg, config.card_opacity ?? 0.15) : 'rgba(255,255,255,0.12)';
  let blur = config.profile_blur > 0 ? `backdrop-filter:blur(${config.profile_blur}px);` : '';
  return `
    <div class="card-preview-inner" style="background:${bg};">
      <div class="prev-avatar" style="border-color:${accent};background:${cardBg};${blur}">👤</div>
      <div class="prev-name" style="color:${textColor}">username</div>
      <div class="prev-bio" style="color:${textColor}88">bio du profil</div>
      <div class="prev-links">
        <div class="prev-link" style="width:55px;background:${accent}99"></div>
        <div class="prev-link" style="width:35px;background:${accent}66"></div>
      </div>
    </div>`;
}
function hexToRgba(hex, alpha) {
  const h = hex.replace('#','');
  const r = parseInt(h.slice(0,2),16), g = parseInt(h.slice(2,4),16), b = parseInt(h.slice(4,6),16);
  return `rgba(${r},${g},${b},${alpha})`;
}
function toggleFav(id, btn) {
  const idx = favorites.indexOf(id);
  if (idx === -1) { favorites.push(id); btn.classList.add('active'); btn.textContent = '⭐'; }
  else { favorites.splice(idx,1); btn.classList.remove('active'); btn.textContent = '☆'; }
  localStorage.setItem('tpl_favs', JSON.stringify(favorites));
}
function fmt(n) { return n >= 1000 ? (n/1000).toFixed(1).replace('.0','')+'K' : String(n||0); }
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function renderGrid() {
  const list = getFiltered();
  const grid = document.getElementById('grid');
  if (!list.length) { grid.innerHTML = '<div class="empty">Aucun modèle pour le moment.</div>'; return; }
  grid.innerHTML = list.map((t, i) => {
    let config = {};
    try { config = JSON.parse(t.config || '{}'); } catch {}
    const isOwner = token && t.username === myUsername;
    const isTrend = (t.uses||0) > 5000;
    const isFav = favorites.includes(t.id);
    const tags = (t.tags || [t.username]).slice(0,4);
    return `
    <div class="card">
      <span class="card-num">#${String(i+1).padStart(3,'0')}</span>
      <button class="card-star ${isFav?'active':''}" onclick="toggleFav('${t.id}',this)">${isFav?'⭐':'☆'}</button>
      <div class="card-preview">${buildPreview(config)}</div>
      <div class="card-body">
        <div class="card-name">${escHtml(t.name)}</div>
        <div class="card-desc">${escHtml(t.description||'—')}</div>
        <div class="card-stats">
          <span class="card-stat">⏱ ${fmt(t.uses||0)} uses</span>
          ${isTrend?'<span class="card-stat trend">↗ Tendance</span>':''}
          <span class="card-stat">★ ${fmt(t.likes||0)}</span>
        </div>
        <div class="card-tags">${tags.map(tag=>`<span class="card-tag">${escHtml(tag)}</span>`).join('')}</div>
        <div class="card-footer">
          <a class="card-author" href="/${escHtml(t.username)}">@${escHtml(t.username)}</a>
          <button class="btn-apply" onclick="applyTemplate('${t.id}','${escHtml(t.name).replace(/'/g,"\\'")}')">
            ${token?'Utiliser':'Connexion'}
          </button>
          ${isOwner?`<button class="btn-delete" onclick="deleteTemplate('${t.id}')">🗑</button>`:''}
        </div>
      </div>
    </div>`;
  }).join('');
}
async function applyTemplate(id, name) {
  if (!token) { window.location.href = '/login'; return; }
  if (!confirm(`Appliquer "${name}" ? Ton style actuel sera remplacé.`)) return;
  try {
    const r = await fetch(`${API}/api/templates/${id}/use`, { method:'POST', headers:{ Authorization:'Bearer '+token } });
    if (!r.ok) throw new Error();
    const t = allTemplates.find(t=>t.id===id);
    if (t) t.uses = (t.uses||0)+1;
    renderGrid(); showToast(`✓ "${name}" appliqué — recharge ton profil`);
  } catch { showToast('Erreur lors de l\'application.'); }
}
async function deleteTemplate(id) {
  if (!confirm('Supprimer ce modèle ?')) return;
  try {
    const r = await fetch(`${API}/api/templates/${id}`, { method:'DELETE', headers:{ Authorization:'Bearer '+token } });
    if (!r.ok) throw new Error();
    allTemplates = allTemplates.filter(t=>t.id!==id);
    renderGrid(); showToast('Modèle supprimé.');
  } catch { showToast('Erreur.'); }
}
function openPublishModal() {
  if (!token) { window.location.href='/login'; return; }
  document.getElementById('tplName').value='';
  document.getElementById('tplDesc').value='';
  document.getElementById('publishModal').classList.add('open');
}
function closePublishModal() { document.getElementById('publishModal').classList.remove('open'); }
async function publishTemplate() {
  const name = document.getElementById('tplName').value.trim();
  if (!name) { document.getElementById('tplName').focus(); return; }
  const btn = document.getElementById('btnConfirmPublish');
  btn.disabled=true; btn.textContent='…';
  try {
    const r = await fetch(`${API}/api/templates`, {
      method:'POST',
      headers:{'Content-Type':'application/json', Authorization:'Bearer '+token},
      body:JSON.stringify({name, description:document.getElementById('tplDesc').value.trim()})
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error);
    allTemplates.unshift(data); renderGrid(); closePublishModal();
    showToast('✓ Modèle publié !');
  } catch(e) { showToast(e.message||'Erreur.'); }
  finally { btn.disabled=false; btn.textContent='Publier'; }
}
document.getElementById('publishModal').addEventListener('click', e => {
  if (e.target===document.getElementById('publishModal')) closePublishModal();
});
async function loadTemplates() {
  try {
    const r = await fetch(`${API}/api/templates`);
    if (!r.ok) throw new Error('Réponse serveur : ' + r.status);
    const data = await r.json();
    allTemplates = Array.isArray(data) ? data : [];
    renderGrid();
  } catch(e) {
    const grid = document.getElementById('grid');
    grid.innerHTML = '<div class="empty">Erreur lors du chargement des modèles.<br><small style="opacity:.6">' + (e.message||'') + '</small><br><button onclick="loadTemplates()" style="margin-top:12px;padding:8px 18px;border:1px solid #ccc;border-radius:8px;background:none;cursor:pointer;font-size:13px;">↩ Réessayer</button></div>';
  }
}
loadTemplates();
function toggleTheme(){
  const h=document.documentElement;
  const t=h.getAttribute('data-theme')==='dark'?'light':'dark';
  h.setAttribute('data-theme',t); localStorage.setItem('theme',t);
  document.getElementById('globalThemeBtn').textContent=t==='dark'?'☀️':'🌙';
}
const _th=localStorage.getItem('theme')||'light';
document.getElementById('globalThemeBtn').textContent=_th==='dark'?'☀️':'🌙';
</script>

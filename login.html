<script>
function logError(msg, stack) {
  try {
    fetch("https://ak47-backend.onrender.com/api/log-error", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: msg, stack: stack || "", page: window.location.href, userAgent: navigator.userAgent })
    }).catch(function() {});
  } catch(e) {}
}
window.onerror = function(msg, src, line, col, err) {
  logError(msg, err ? err.stack : src + ":" + line + ":" + col);
};
window.onunhandledrejection = function(e) {
  logError("UnhandledPromise: " + (e.reason && e.reason.message || e.reason), e.reason && e.reason.stack);
};
</script>

<style>
#global-announcement {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 99999;
  padding: 10px 48px 10px 20px;
  font-size: 14px;
  font-weight: 600;
  text-align: center;
  color: #fff;
  box-shadow: 0 2px 8px rgba(0,0,0,.25);
  animation: slideDown .3s ease;
  cursor: default;
  line-height: 1.4;
}
@keyframes slideDown {
  from { transform: translateY(-100%); opacity: 0; }
  to   { transform: translateY(0);     opacity: 1; }
}
#global-announcement .ann-close {
  position: absolute;
  right: 14px; top: 50%;
  transform: translateY(-50%);
  background: rgba(255,255,255,.2);
  border: none; color: #fff;
  width: 24px; height: 24px;
  border-radius: 50%;
  font-size: 14px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s;
}
#global-announcement .ann-close:hover { background: rgba(255,255,255,.35); }
#global-announcement .ann-timer {
  font-size: 11px;
  font-weight: 400;
  opacity: .75;
  margin-left: 10px;
}
body.has-announcement { padding-top: 44px; }
</style>
<div id="global-announcement">
  <span id="ann-message"></span>
  <span id="ann-timer" class="ann-timer"></span>
  <button class="ann-close" onclick="dismissAnnouncement()" title="Fermer">✕</button>
</div>
<script>
(function() {
  const PAGE_TYPE = typeof ANNOUNCEMENT_PAGE_TYPE !== 'undefined' ? ANNOUNCEMENT_PAGE_TYPE : 'public';
  const API_BASE = typeof API !== 'undefined' ? API : 'https://ak47-backend.onrender.com';
  let annTimer = null;
  let annCountdown = null;

  async function loadAnnouncement() {
    try {
      const r = await fetch(API_BASE + '/api/stats/announcement');
      const d = await r.json();
      if (!d.announcement) return;
      const ann = d.announcement;
      
      if (ann.target === 'dashboard' && PAGE_TYPE !== 'dashboard') return;
      if (ann.target === 'public' && PAGE_TYPE !== 'public') return;
      showAnnouncement(ann);
    } catch {}
  }

  function showAnnouncement(ann) {
    const el = document.getElementById('global-announcement');
    const msgEl = document.getElementById('ann-message');
    const timerEl = document.getElementById('ann-timer');
    if (!el || !msgEl) return;

    
    const dismissed = sessionStorage.getItem('ann_dismissed');
    if (dismissed === String(ann.created_at)) return;

    el.style.background = ann.color || '#5865F2';
    el.style.display = 'block';
    msgEl.textContent = ann.message;
    document.body.classList.add('has-announcement');

    
    if (ann.expires_at) {
      let remaining = Math.max(0, Math.floor((ann.expires_at - Date.now()) / 1000));
      function updateTimer() {
        remaining = Math.max(0, Math.floor((ann.expires_at - Date.now()) / 1000));
        if (remaining <= 0) { hideAnnouncement(); return; }
        timerEl.textContent = `(${remaining}s)`;
      }
      updateTimer();
      annCountdown = setInterval(updateTimer, 1000);
    }
  }

  function hideAnnouncement() {
    const el = document.getElementById('global-announcement');
    if (el) el.style.display = 'none';
    document.body.classList.remove('has-announcement');
    if (annCountdown) clearInterval(annCountdown);
  }

  window.dismissAnnouncement = function() {
    
    fetch(API_BASE + '/api/stats/announcement').then(r => r.json()).then(d => {
      if (d.announcement) sessionStorage.setItem('ann_dismissed', String(d.announcement.created_at));
    }).catch(() => {});
    hideAnnouncement();
  };

  document.addEventListener('DOMContentLoaded', loadAnnouncement);
})();
</script>

<script>
  const _redirectAfterLogin = new URLSearchParams(window.location.search).get('redirect') || '/dashboard';
  if (localStorage.getItem('token')) window.location.href = _redirectAfterLogin;

  const urlError = new URLSearchParams(window.location.search).get('error');
  if (urlError) document.getElementById('alert').innerHTML = `<div class="alert alert-error">${decodeURIComponent(urlError)}</div>`;

  let _pendingLoginEmail = null;

  function showLoginForm() {
    document.getElementById('verifyLoginStep').style.display = 'none';
    document.querySelectorAll('.field, .h-captcha, #submitBtn, .form-footer, .divider, .oauth-btn, .divider-text').forEach(el => el.style.display = '');
  }
  function showVerifyStep(email) {
    _pendingLoginEmail = email;
    document.querySelectorAll('.field, .h-captcha, #submitBtn, .form-footer, .divider, .oauth-btn, .divider-text').forEach(el => el.style.display = 'none');
    document.getElementById('alert').innerHTML = '';
    const desc = document.getElementById('verifyLoginDesc');
    if (desc) desc.textContent = `Un code a été envoyé à ${email.replace(/(.{2}).*(@.*)/, '$1***$2')}`;
    document.getElementById('verifyLoginStep').style.display = 'block';
    setTimeout(() => document.getElementById('verifyLoginCode')?.focus(), 100);
  }

  async function doLogin() {
    const btn = document.getElementById('submitBtn');
    const login = document.getElementById('login').value.trim();
    const password = document.getElementById('password').value;
    if (!login || !password) return showAlert('Remplissez tous les champs');
    btn.disabled = true;
    btn.innerHTML = '<span class="loading-spinner"></span>';
    try {
      const captchaToken = hcaptcha.getResponse();
      if (!captchaToken) { btn.disabled = false; btn.innerHTML = 'Se connecter'; return showAlert('Veuillez compléter le captcha'); }
      const r = await fetch('https://ak47-backend.onrender.com/api/auth/login', {
        method: 'POST', credentials: 'include', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ login, password, 'h-captcha-response': captchaToken })
      });
      const data = await r.json();
      if (!r.ok) { showAlert(data.error || 'Erreur'); return; }
      if (data.pending_login) { showVerifyStep(data.email); return; }
      localStorage.setItem('token', data.token);
      localStorage.setItem('refreshToken', data.refreshToken);
      localStorage.setItem('username', data.username);
      if (data.userId) localStorage.setItem('userId', data.userId);
      window.location.href = _redirectAfterLogin;
    } catch { showAlert('Erreur réseau'); }
    finally { btn.disabled = false; btn.innerHTML = 'Se connecter'; }
  }

  async function doVerifyLogin() {
    const code = document.getElementById('verifyLoginCode').value.trim();
    const btn = document.getElementById('verifyLoginBtn');
    if (!code || code.length < 6) return showVerifyAlert('Entre le code à 6 chiffres');
    btn.disabled = true; btn.textContent = '...';
    try {
      const r = await fetch('https://ak47-backend.onrender.com/api/auth/verify-login', {
        method: 'POST', credentials: 'include', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: _pendingLoginEmail, code }),
      });
      const data = await r.json();
      if (!r.ok) { showVerifyAlert(data.error || 'Erreur'); return; }
      localStorage.setItem('token', data.token);
      localStorage.setItem('refreshToken', data.refreshToken);
      localStorage.setItem('username', data.username);
      if (data.userId) localStorage.setItem('userId', data.userId);
      window.location.href = _redirectAfterLogin;
    } catch { showVerifyAlert('Erreur réseau'); }
    finally { btn.disabled = false; btn.textContent = 'Confirmer'; }
  }

  async function resendLoginCode() {
    if (!_pendingLoginEmail) return;
    try {
      await fetch('https://ak47-backend.onrender.com/api/auth/resend-code', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: _pendingLoginEmail }),
      });
      showVerifyAlert('Code renvoyé !', 'ok');
    } catch { showVerifyAlert('Erreur réseau'); }
  }

  function showAlert(msg) {
    document.getElementById('alert').innerHTML = `<div class="alert alert-error">${msg}</div>`;
  }
  function showVerifyAlert(msg, type) {
    document.getElementById('alertVerify').innerHTML = `<div class="alert alert-${type === 'ok' ? 'success' : 'error'}">${msg}</div>`;
  }
  document.addEventListener('keydown', e => { if (e.key === 'Enter') { if (_pendingLoginEmail) doVerifyLogin(); else doLogin(); } });
</script>

function toggleTheme(){
  var cur = document.documentElement.getAttribute('data-theme') || 'dark';
  var next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  var btn = document.getElementById('globalThemeBtn');
  if(btn) btn.textContent = next === 'dark' ? '☀️' : '🌙';
  var pill = document.getElementById('themeToggle');
  if(pill) pill.textContent = next === 'dark' ? '☀️' : '🌙';
}
document.addEventListener('DOMContentLoaded', function(){
  var btn = document.getElementById('globalThemeBtn');
  if(btn){var t=document.documentElement.getAttribute('data-theme')||'light'; btn.textContent=t==='dark'?'☀️':'🌙';}
});

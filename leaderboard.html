<!DOCTYPE html>
<html lang="fr">
<head>
<script src="/error-logger.js"></script><script>(function(){var t=localStorage.getItem("theme")||"light";document.documentElement.setAttribute("data-theme",t);})();</script>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>ak-47.fr — Classement</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/style.css"/>
  <style>:root{--accent:#8b5e3c;--accent-light:#c4956a;--accent-dark:#5c3a1e;--accent-glow:rgba(139,94,60,.18);}[data-theme="dark"]{--accent:#c4956a;--accent-light:#e0b88a;--accent-dark:#d4a87a;}</style>
  <style>
    body { background: var(--white); }
    .lb-nav { display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:56px;border-bottom:1px solid var(--gray-200);background:rgba(255,255,255,.9);backdrop-filter:blur(12px);position:sticky;top:0;z-index:50; }
    .lb-nav-brand { font-size:16px;font-weight:700;letter-spacing:-.3px;color:var(--black);text-decoration:none; }
    .lb-nav-brand span { color:var(--gray-400);font-weight:400; }
    .lb-nav a.back { font-size:13px;color:var(--gray-500);text-decoration:none;font-weight:500; }
    .lb-nav a.back:hover { color:var(--black); }
    .page { max-width:720px;margin:0 auto;padding:56px 24px; }
    .page-tag { font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--gray-400);margin-bottom:12px; }
    h1 { font-size:clamp(32px,5vw,52px);font-weight:700;letter-spacing:-2px;margin-bottom:8px; }
    .subtitle { font-size:14px;color:var(--gray-500);margin-bottom:48px; }
    .lb-table { border:1px solid var(--gray-200);border-radius:10px;overflow:hidden; }
    .lb-header { display:grid;grid-template-columns:48px 1fr 120px;padding:10px 16px;background:var(--gray-50);border-bottom:1px solid var(--gray-200);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--gray-400); }
    .lb-row { display:grid;grid-template-columns:48px 1fr 120px;padding:14px 16px;border-bottom:1px solid var(--gray-100);align-items:center;transition:background .1s;text-decoration:none;color:inherit;cursor:pointer; }
    .lb-row:last-child { border-bottom:none; }
    .lb-row:hover { background:var(--gray-50); }
    .lb-rank { font-size:15px;font-weight:700;color:var(--gray-400); }
    .lb-rank.gold { color:#ca8a04; }
    .lb-rank.silver { color:var(--gray-500); }
    .lb-rank.bronze { color:#92400e; }
    .lb-user { display:flex;align-items:center;gap:10px; }
    .lb-av { width:32px;height:32px;border-radius:50%;color:var(--white);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0; }
    .lb-name { font-size:13px;font-weight:600; }
    .lb-handle { font-size:11px;color:var(--gray-400); }
    .lb-views { font-size:13px;font-weight:600;color:var(--gray-700); }
    .empty { text-align:center;padding:48px 24px;color:var(--gray-400);font-size:14px; }
    .loading { text-align:center;padding:48px 24px;color:var(--gray-400);font-size:14px; }
    @media (max-width: 500px) {
      .lb-nav { padding: 0 14px; }
      .page { padding: 36px 14px; }
      h1 { font-size: 28px; letter-spacing: -1px; }
      .lb-header, .lb-row { grid-template-columns: 36px 1fr 72px; padding: 10px 12px; }
      .lb-av { width: 26px; height: 26px; font-size: 11px; }
      .lb-views { font-size: 12px; }
    }
  </style>
  <style>
    .lb-table { border-radius: 16px; box-shadow: 0 1px 2px rgba(0,0,0,.03), 0 20px 50px -16px rgba(0,0,0,.08); }
    .lb-row { transition: background .15s, transform .1s; }
    .lb-row:hover { background: var(--gray-50); }
    .lb-av { box-shadow: 0 2px 6px rgba(0,0,0,.12); }
  </style>

  <style id="fluid-global">

    a, button, input, textarea, select,
    [role="button"], [tabindex] {
      transition: opacity .2s ease, color .2s ease, background .2s ease,
                  border-color .2s ease, box-shadow .2s ease,
                  transform .2s cubic-bezier(.34,1.56,.64,1) !important;
    }

    html { scroll-behavior: smooth; }

    button:active, [role="button"]:active {
      transform: scale(.96) !important;
      transition-duration: .08s !important;
    }

    input:focus, textarea:focus, select:focus {
      outline: none;
      box-shadow: 0 0 0 3px rgba(0,0,0,.08) !important;
      border-color: #000 !important;
      transition: box-shadow .2s ease, border-color .2s ease !important;
    }

    .section-card, .mblock, .profile-card {
      transition: box-shadow .25s ease, transform .25s cubic-bezier(.22,1,.36,1) !important;
    }
    .section-card:hover, .mblock:hover {
      box-shadow: 0 4px 20px rgba(0,0,0,.08) !important;
      transform: translateY(-1px) !important;
    }

    .tab {
      transition: color .2s ease, border-color .2s ease !important;
    }

    .icon-picker-overlay {
      transition: opacity .25s ease !important;
    }
    .icon-picker-modal {
      transition: transform .3s cubic-bezier(.34,1.56,.64,1), opacity .25s ease !important;
    }

    .mdrop {
      transition: border-color .2s ease, background .2s ease, box-shadow .2s ease !important;
    }
    .mdrop:hover {
      box-shadow: 0 2px 12px rgba(0,0,0,.06) !important;
    }

    .toast {
      transition: opacity .25s ease, transform .25s cubic-bezier(.34,1.56,.64,1) !important;
    }

    .mob-nav-btn {
      transition: color .15s ease, transform .15s cubic-bezier(.34,1.56,.64,1) !important;
    }
    .mob-nav-btn:active { transform: scale(.9) !important; }
    .mob-nav-btn.active { transform: scale(1.05) !important; }

    .badge {
      transition: transform .2s cubic-bezier(.34,1.56,.64,1), box-shadow .2s ease !important;
    }
    .badge:hover { transform: scale(1.06) !important; }

    .copy-btn:hover, .save-bar-btn:hover {
      transform: translateY(-1px) !important;
      box-shadow: 0 4px 12px rgba(0,0,0,.12) !important;
    }

    .ipick-btn {
      transition: transform .2s cubic-bezier(.34,1.56,.64,1), border-color .15s, background .15s, box-shadow .2s !important;
    }
    .ipick-btn:hover { transform: translateY(-3px) scale(1.04) !important; }

    .mblock-chevron {
      transition: transform .25s cubic-bezier(.34,1.56,.64,1) !important;
    }

    .audio-src-tab {
      transition: all .2s cubic-bezier(.34,1.56,.64,1) !important;
    }
    .audio-src-tab:hover { transform: translateY(-1px) !important; }

    nav a, .nav-link {
      transition: color .2s ease, opacity .2s ease !important;
    }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(0,0,0,.15); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,.3); }
  </style>
<script>
function logError(msg, stack) {
  try {
    fetch("https://ak47-backend.onrender.com/api/log-error", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: msg, stack: stack || "", page: window.location.href, userAgent: navigator.userAgent })
    }).catch(function() {});
  } catch(e) {}
}
window.onerror = function(msg, src, line, col, err) {
  logError(msg, err ? err.stack : src + ":" + line + ":" + col);
};
window.onunhandledrejection = function(e) {
  logError("UnhandledPromise: " + (e.reason && e.reason.message || e.reason), e.reason && e.reason.stack);
};
</script>
</head>
<body>
<button id="globalThemeBtn" onclick="toggleTheme()" title="Changer le thème" aria-label="Changer le thème">🌙</button>

<nav class="lb-nav">
  <a href="/" class="lb-nav-brand" style="display:inline-flex;align-items:center;"><img src="/logo.png" alt="ak-47.fr" style="height:22px;width:22px;object-fit:contain;margin-right:6px;vertical-align:middle;filter:var(--logo-filter,none);">ak-47<span>.fr</span></a>
  <a href="/" class="back">← Retour</a>
</nav>
<div class="page">
  <div class="page-tag">Classement</div>
  <h1>Top profils</h1>
  <p class="subtitle">Les profils les plus visités sur ak-47.fr.</p>
  <div class="lb-table">
    <div class="lb-header">
      <span>#</span><span>Utilisateur</span><span>Vues</span>
    </div>
    <div id="lbBody"><div class="loading">Chargement…</div></div>
  </div>
</div>
<script>
  const rankClass = r => r===1?'gold':r===2?'silver':r===3?'bronze':'';
  const rankIcon  = r => r===1?'🥇':r===2?'🥈':r===3?'🥉':r;

  function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
  fetch('https://ak47-backend.onrender.com/api/leaderboard')
    .then(r => r.json())
    .then(users => {
      if (!users.length) {
        document.getElementById('lbBody').innerHTML = '<div class="empty">Aucun profil pour le moment. Sois le premier !</div>';
        return;
      }
      document.getElementById('lbBody').innerHTML = users.map((u, i) => {
        const rank = i + 1;
        const initials = esc((u.display_name || u.username).slice(0,2).toUpperCase());
        const color = /^#[0-9a-fA-F]{3,6}$/.test(u.avatar_color||'') ? u.avatar_color : '#18181b';
        return `<a href="/${u.username}" class="lb-row">
          <div class="lb-rank ${rankClass(rank)}">${rankIcon(rank)}</div>
          <div class="lb-user">
            <div class="lb-av" style="background:${color}">${initials}</div>
            <div>
              <div class="lb-name" title="ID : #${u.uid || '—'}">${esc(u.display_name || u.username)}</div>
              <div class="lb-handle">ak-47.fr/${esc(u.username)}</div>
            </div>
          </div>
          <div class="lb-views">${u.total_views.toLocaleString('fr-FR')}</div>
        </a>`;
      }).join('');
    })
    .catch(() => {
      document.getElementById('lbBody').innerHTML = '<div class="empty">Impossible de charger le classement.</div>';
    });
</script>

<script>
(function(){
  var btn = document.getElementById('globalThemeBtn');
  if(!btn) return;
  var t = document.documentElement.getAttribute('data-theme') || 'light';
  btn.textContent = t === 'dark' ? '☀️' : '🌙';
  btn.setAttribute('data-theme-btn', '1');
})();
function toggleTheme(){
  var cur = document.documentElement.getAttribute('data-theme') || 'light';
  var next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  var btn = document.getElementById('globalThemeBtn');
  if(btn) btn.textContent = next === 'dark' ? '☀️' : '🌙';
  var pill = document.getElementById('themeToggle');
  if(pill) pill.textContent = next === 'dark' ? '☀️' : '🌙';
}
document.addEventListener('DOMContentLoaded', function(){
  var btn = document.getElementById('globalThemeBtn');
  if(btn){var t=document.documentElement.getAttribute('data-theme')||'light'; btn.textContent=t==='dark'?'☀️':'🌙';}
});
</script>
</body>
</html>

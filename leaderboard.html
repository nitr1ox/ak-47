<!DOCTYPE html>
<html lang="fr">
<head><script>(function(){var t=localStorage.getItem("theme")||"light";document.documentElement.setAttribute("data-theme",t);})();</script>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>ak-47.fr — Classement</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/style.css"/>
  <style>
    body { background: var(--white); }
    .lb-nav { display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:56px;border-bottom:1px solid var(--gray-200);background:rgba(255,255,255,.9);backdrop-filter:blur(12px);position:sticky;top:0;z-index:50; }
    .lb-nav-brand { font-size:16px;font-weight:700;letter-spacing:-.3px;color:var(--black);text-decoration:none; }
    .lb-nav-brand span { color:var(--gray-400);font-weight:400; }
    .lb-nav a.back { font-size:13px;color:var(--gray-500);text-decoration:none;font-weight:500; }
    .lb-nav a.back:hover { color:var(--black); }
    .page { max-width:720px;margin:0 auto;padding:56px 24px; }
    .page-tag { font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--gray-400);margin-bottom:12px; }
    h1 { font-size:clamp(32px,5vw,52px);font-weight:700;letter-spacing:-2px;margin-bottom:8px; }
    .subtitle { font-size:14px;color:var(--gray-500);margin-bottom:48px; }
    .lb-table { border:1px solid var(--gray-200);border-radius:10px;overflow:hidden; }
    .lb-header { display:grid;grid-template-columns:48px 1fr 120px;padding:10px 16px;background:var(--gray-50);border-bottom:1px solid var(--gray-200);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--gray-400); }
    .lb-row { display:grid;grid-template-columns:48px 1fr 120px;padding:14px 16px;border-bottom:1px solid var(--gray-100);align-items:center;transition:background .1s;text-decoration:none;color:inherit;cursor:pointer; }
    .lb-row:last-child { border-bottom:none; }
    .lb-row:hover { background:var(--gray-50); }
    .lb-rank { font-size:15px;font-weight:700;color:var(--gray-400); }
    .lb-rank.gold { color:#ca8a04; }
    .lb-rank.silver { color:var(--gray-500); }
    .lb-rank.bronze { color:#92400e; }
    .lb-user { display:flex;align-items:center;gap:10px; }
    .lb-av { width:32px;height:32px;border-radius:50%;color:var(--white);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0; }
    .lb-name { font-size:13px;font-weight:600; }
    .lb-handle { font-size:11px;color:var(--gray-400); }
    .lb-views { font-size:13px;font-weight:600;color:var(--gray-700); }
    .empty { text-align:center;padding:48px 24px;color:var(--gray-400);font-size:14px; }
    .loading { text-align:center;padding:48px 24px;color:var(--gray-400);font-size:14px; }
  </style>
</head>
<body>
<button id="globalThemeBtn" onclick="toggleTheme()" title="Changer le thème" aria-label="Changer le thème">🌙</button>
<nav class="lb-nav">
  <a href="/" class="lb-nav-brand">ak-47<span>.fr</span></a>
  <a href="/" class="back">← Retour</a>
<a href="https://discord.gg/g7MysUNQXs" target="_blank" rel="noopener" class="discord-invite-btn" title="Rejoindre le Discord">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
    Discord
  </a>
</nav>
<div class="page">
  <div class="page-tag">Classement</div>
  <h1>Top profils</h1>
  <p class="subtitle">Les profils les plus visités sur ak-47.fr.</p>
  <div class="lb-table">
    <div class="lb-header">
      <span>#</span><span>Utilisateur</span><span>Vues</span>
    </div>
    <div id="lbBody"><div class="loading">Chargement…</div></div>
  </div>
</div>
<script>
  const rankClass = r => r===1?'gold':r===2?'silver':r===3?'bronze':'';
  const rankIcon  = r => r===1?'🥇':r===2?'🥈':r===3?'🥉':r;

  fetch('https://ak47-backend.onrender.com/api/leaderboard')
    .then(r => r.json())
    .then(users => {
      if (!users.length) {
        document.getElementById('lbBody').innerHTML = '<div class="empty">Aucun profil pour le moment. Sois le premier !</div>';
        return;
      }
      document.getElementById('lbBody').innerHTML = users.map((u, i) => {
        const rank = i + 1;
        const initials = (u.display_name || u.username).slice(0,2).toUpperCase();
        const color = u.avatar_color || '#18181b';
        return `<a href="/${u.username}" class="lb-row">
          <div class="lb-rank ${rankClass(rank)}">${rankIcon(rank)}</div>
          <div class="lb-user">
            <div class="lb-av" style="background:${color}">${initials}</div>
            <div>
              <div class="lb-name">${u.display_name || u.username}</div>
              <div class="lb-handle">ak-47.fr/${u.username}</div>
            </div>
          </div>
          <div class="lb-views">${u.total_views.toLocaleString('fr-FR')}</div>
        </a>`;
      }).join('');
    })
    .catch(() => {
      document.getElementById('lbBody').innerHTML = '<div class="empty">Impossible de charger le classement.</div>';
    });
</script>
<script>
(function(){
  var btn = document.getElementById('globalThemeBtn');
  if(!btn) return;
  var t = document.documentElement.getAttribute('data-theme') || 'light';
  btn.textContent = t === 'dark' ? '☀️' : '🌙';
  btn.setAttribute('data-theme-btn', '1');
})();
function toggleTheme(){
  var cur = document.documentElement.getAttribute('data-theme') || 'light';
  var next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  var btn = document.getElementById('globalThemeBtn');
  if(btn) btn.textContent = next === 'dark' ? '☀️' : '🌙';
  var pill = document.getElementById('themeToggle');
  if(pill) pill.textContent = next === 'dark' ? '☀️' : '🌙';
}
document.addEventListener('DOMContentLoaded', function(){
  var btn = document.getElementById('globalThemeBtn');
  if(btn){var t=document.documentElement.getAttribute('data-theme')||'light'; btn.textContent=t==='dark'?'☀️':'🌙';}
});
</script>

<footer style="text-align:center;padding:20px;font-size:11px;color:var(--gray-400);border-top:1px solid var(--gray-200);margin-top:auto;">Fait par <a href="https://discord.gg/g7MysUNQXs" target="_blank" rel="noopener" style="color:var(--gray-400);font-weight:700;text-decoration:none;" onmouseover="this.style.opacity='0.7'" onmouseout="this.style.opacity='1'">nitrox</a></footer>
</body>
</html>

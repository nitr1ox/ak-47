<script>
function logError(msg, stack) {
  try {
    fetch("https://ak47-backend.onrender.com/api/log-error", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: msg, stack: stack || "", page: window.location.href, userAgent: navigator.userAgent })
    }).catch(function() {});
  } catch(e) {}
}
window.onerror = function(msg, src, line, col, err) {
  logError(msg, err ? err.stack : src + ":" + line + ":" + col);
};
window.onunhandledrejection = function(e) {
  logError("UnhandledPromise: " + (e.reason && e.reason.message || e.reason), e.reason && e.reason.stack);
};
</script>

<script>
(function() {
  const CURRENT_PAGE = typeof MAINTENANCE_EXEMPT !== 'undefined' ? MAINTENANCE_EXEMPT : false;
  if (CURRENT_PAGE) return; 
  const API_BASE = typeof API !== 'undefined' ? API : 'https://ak47-backend.onrender.com';
  
  const token = localStorage.getItem('auth_token') || localStorage.getItem('token');
  fetch(API_BASE + '/api/stats/maintenance')

        redirect();

    if (window.location.pathname !== '/maintenance' && window.location.pathname !== '/maintenance.html') {
      window.location.href = '/maintenance';
    }

<style>
#global-announcement {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 99999;
  padding: 10px 48px 10px 20px;
  font-size: 14px;
  font-weight: 600;
  text-align: center;
  color: #fff;
  box-shadow: 0 2px 8px rgba(0,0,0,.25);
  animation: slideDown .3s ease;
  cursor: default;
  line-height: 1.4;
}
@keyframes slideDown {
  from { transform: translateY(-100%); opacity: 0; }
  to   { transform: translateY(0);     opacity: 1; }
}
#global-announcement .ann-close {
  position: absolute;
  right: 14px; top: 50%;
  transform: translateY(-50%);
  background: rgba(255,255,255,.2);
  border: none; color: #fff;
  width: 24px; height: 24px;
  border-radius: 50%;
  font-size: 14px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s;
}
#global-announcement .ann-close:hover { background: rgba(255,255,255,.35); }
#global-announcement .ann-timer {
  font-size: 11px;
  font-weight: 400;
  opacity: .75;
  margin-left: 10px;
}
body.has-announcement { padding-top: 44px; }
</style>
<div id="global-announcement">
  <span id="ann-message"></span>
  <span id="ann-timer" class="ann-timer"></span>
  <button class="ann-close" onclick="dismissAnnouncement()" title="Fermer">✕</button>
</div>
<script>
(function() {
  const PAGE_TYPE = typeof ANNOUNCEMENT_PAGE_TYPE !== 'undefined' ? ANNOUNCEMENT_PAGE_TYPE : 'public';
  const API_BASE = typeof API !== 'undefined' ? API : 'https://ak47-backend.onrender.com';
  let annTimer = null;
  let annCountdown = null;

  async function loadAnnouncement() {
    try {
      const r = await fetch(API_BASE + '/api/stats/announcement');
      const d = await r.json();
      if (!d.announcement) return;
      const ann = d.announcement;
      
      if (ann.target === 'dashboard' && PAGE_TYPE !== 'dashboard') return;
      if (ann.target === 'public' && PAGE_TYPE !== 'public') return;
      showAnnouncement(ann);
    } catch {}
  }

  function showAnnouncement(ann) {
    const el = document.getElementById('global-announcement');
    const msgEl = document.getElementById('ann-message');
    const timerEl = document.getElementById('ann-timer');
    if (!el || !msgEl) return;

    
    const dismissed = sessionStorage.getItem('ann_dismissed');
    if (dismissed === String(ann.created_at)) return;

    el.style.background = ann.color || '#5865F2';
    el.style.display = 'block';
    msgEl.textContent = ann.message;
    document.body.classList.add('has-announcement');

    
    if (ann.expires_at) {
      let remaining = Math.max(0, Math.floor((ann.expires_at - Date.now()) / 1000));
      function updateTimer() {
        remaining = Math.max(0, Math.floor((ann.expires_at - Date.now()) / 1000));
        if (remaining <= 0) { hideAnnouncement(); return; }
        timerEl.textContent = `(${remaining}s)`;
      }
      updateTimer();
      annCountdown = setInterval(updateTimer, 1000);
    }
  }

  function hideAnnouncement() {
    const el = document.getElementById('global-announcement');
    if (el) el.style.display = 'none';
    document.body.classList.remove('has-announcement');
    if (annCountdown) clearInterval(annCountdown);
  }

  window.dismissAnnouncement = function() {
    
    fetch(API_BASE + '/api/stats/announcement').then(r => r.json()).then(d => {
      if (d.announcement) sessionStorage.setItem('ann_dismissed', String(d.announcement.created_at));
    }).catch(() => {});
    hideAnnouncement();
  };

  document.addEventListener('DOMContentLoaded', loadAnnouncement);
})();
</script>

</div>
<script>
  const rankClass = r => r===1?'gold':r===2?'silver':r===3?'bronze':'';
  const rankIcon  = r => r===1?'🥇':r===2?'🥈':r===3?'🥉':r;
  function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

  const ROLES_DEF = [
    { id:'owner',   label:'Owner',      emoji:'👑' },
    { id:'staff',   label:'Staff',      emoji:'🛡️' },
    { id:'helper',  label:'Helper',     emoji:'🤝' },
    { id:'verified',label:'Vérifié',    emoji:'✅' },
    { id:'premium', label:'Premium',    emoji:'⭐' },
    { id:'donor',   label:'Donor',      emoji:'💜' },
    { id:'booster', label:'Booster',    emoji:'🚀' },
    { id:'partner', label:'Partenaire', emoji:'🤜' },
  ];

  let allUsers = [];
  let activeRole = null;

  function showTab(name, btn) {
    document.getElementById('tab-leaderboard').style.display = name === 'leaderboard' ? '' : 'none';
    document.getElementById('tab-list').style.display = name === 'list' ? '' : 'none';
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if (name === 'list' && allUsers.length) renderList(activeRole);
  }

  function buildRoleFilters() {
    const container = document.getElementById('roleFilters');
    container.innerHTML = '';
    ROLES_DEF.forEach(r => {
      const hasUsers = allUsers.some(u => { try { return JSON.parse(u.roles||'[]').includes(r.id); } catch { return false; } });
      if (!hasUsers) return;
      const btn = document.createElement('button');
      btn.className = 'role-btn' + (activeRole === r.id ? ' active' : '');
      btn.innerHTML = `${r.emoji} ${r.label}`;
      btn.onclick = () => {
        activeRole = activeRole === r.id ? null : r.id;
        document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
        if (activeRole) btn.classList.add('active');
        renderList(activeRole);
      };
      container.appendChild(btn);
    });
  }

  function renderList(roleFilter) {
    const body = document.getElementById('listBody');
    const rolesToShow = roleFilter ? ROLES_DEF.filter(r => r.id === roleFilter) : ROLES_DEF;
    body.innerHTML = '';
    rolesToShow.forEach(r => {
      const users = allUsers.filter(u => { try { return JSON.parse(u.roles||'[]').includes(r.id); } catch { return false; } });
      if (!users.length) return;
      const section = document.createElement('div');
      section.className = 'role-section';
      section.dataset.role = r.id;
      section.dataset.shown = '10';
      section.dataset.total = users.length;
      section.innerHTML = `<div class="role-section-title"><span>${r.emoji}</span>${r.label} <span style="color:var(--gray-300);font-weight:400">(${users.length})</span></div><div class="role-users" id="ru-${r.id}"></div><div id="rm-${r.id}"></div>`;
      body.appendChild(section);
      renderRoleUsers(r.id, users, 10);
    });
    if (!body.innerHTML) body.innerHTML = '<div class="role-empty">Aucun membre avec ce rôle.</div>';
  }

  function renderRoleUsers(roleId, users, shown) {
    const container = document.getElementById('ru-' + roleId);
    const moreWrap  = document.getElementById('rm-' + roleId);
    container.innerHTML = users.slice(0, shown).map(u => {
      const initials = esc((u.display_name || u.username).slice(0,2).toUpperCase());
      const color = /^#[0-9a-fA-F]{3,6}$/.test(u.avatar_color||'') ? u.avatar_color : '#18181b';
      return `<a href="/${esc(u.username)}" class="role-user-row">
        <div class="role-user-av" style="background:${color}">${initials}</div>
        <div>
          <div class="role-user-name">${esc(u.display_name || u.username)}</div>
          <div class="role-user-handle">ak-47.fr/${esc(u.username)}</div>
        </div>
      </a>`;
    }).join('');

    moreWrap.innerHTML = '';
    if (shown < users.length) {
      const next = shown < 100 ? 100 : shown + 100;
      const label = next >= users.length ? `Voir tous (${users.length})` : `Voir plus (${Math.min(next, users.length)} / ${users.length})`;
      const btn = document.createElement('button');
      btn.className = 'see-more-btn';
      btn.textContent = label;
      btn.onclick = () => renderRoleUsers(roleId, users, Math.min(next, users.length));
      moreWrap.appendChild(btn);
    }
  }

  fetch('https://ak47-backend.onrender.com/api/leaderboard')
    .then(r => r.json())
    .then(users => {
      allUsers = users;
      if (!users.length) {
        document.getElementById('lbBody').innerHTML = '<div class="empty">Aucun profil pour le moment. Sois le premier !</div>';
        return;
      }
      document.getElementById('lbBody').innerHTML = users.map((u, i) => {
        const rank = i + 1;
        const initials = esc((u.display_name || u.username).slice(0,2).toUpperCase());
        const color = /^#[0-9a-fA-F]{3,6}$/.test(u.avatar_color||'') ? u.avatar_color : '#18181b';
        return `<a href="/${u.username}" class="lb-row">
          <div class="lb-rank ${rankClass(rank)}">${rankIcon(rank)}</div>
          <div class="lb-user">
            <div class="lb-av" style="background:${color}">${initials}</div>
            <div>
              <div class="lb-name" title="ID : #${u.uid || '—'}">${esc(u.display_name || u.username)}</div>
              <div class="lb-handle">ak-47.fr/${esc(u.username)}</div>
            </div>
          </div>
          <div class="lb-views">${u.total_views.toLocaleString('fr-FR')}</div>
        </a>`;
      }).join('');
      buildRoleFilters();
    })
    .catch(() => {
      document.getElementById('lbBody').innerHTML = '<div class="empty">Impossible de charger le classement.</div>';
    });
</script>

<script>

})();
function toggleTheme(){
  var cur = document.documentElement.getAttribute('data-theme') || 'dark';
  var next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  var btn = document.getElementById('globalThemeBtn');
  if(btn) btn.textContent = next === 'dark' ? '☀️' : '🌙';
  var pill = document.getElementById('themeToggle');
  if(pill) pill.textContent = next === 'dark' ? '☀️' : '🌙';
}
document.addEventListener('DOMContentLoaded', function(){
  var btn = document.getElementById('globalThemeBtn');
  if(btn){var t=document.documentElement.getAttribute('data-theme')||'light'; btn.textContent=t==='dark'?'☀️':'🌙';}
});
</script>
</body>

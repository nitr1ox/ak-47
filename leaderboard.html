<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>ak-47.fr — Classement</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/style.css"/>
  <style>
    body { background: var(--white); }
    .lb-nav { display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:56px;border-bottom:1px solid var(--gray-200);background:rgba(255,255,255,.9);backdrop-filter:blur(12px);position:sticky;top:0;z-index:50; }
    .lb-nav-brand { font-size:16px;font-weight:700;letter-spacing:-.3px;color:var(--black);text-decoration:none; }
    .lb-nav-brand span { color:var(--gray-400);font-weight:400; }
    .lb-nav a { font-size:13px;color:var(--gray-500);text-decoration:none;font-weight:500; }
    .lb-nav a:hover { color:var(--black); }
    .page { max-width:720px;margin:0 auto;padding:56px 24px; }
    .page-tag { font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--gray-400);margin-bottom:12px; }
    h1 { font-size:clamp(32px,5vw,52px);font-weight:700;letter-spacing:-2px;margin-bottom:8px; }
    .subtitle { font-size:14px;color:var(--gray-500);margin-bottom:48px; }
    .lb-table { border:1px solid var(--gray-200);border-radius:10px;overflow:hidden; }
    .lb-header { display:grid;grid-template-columns:48px 1fr 120px 100px;padding:10px 16px;background:var(--gray-50);border-bottom:1px solid var(--gray-200);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--gray-400); }
    .lb-row { display:grid;grid-template-columns:48px 1fr 120px 100px;padding:14px 16px;border-bottom:1px solid var(--gray-100);align-items:center;transition:background .1s; }
    .lb-row:last-child { border-bottom:none; }
    .lb-row:hover { background:var(--gray-50); }
    .lb-rank { font-size:15px;font-weight:700;color:var(--gray-400); }
    .lb-rank.gold { color:#ca8a04; }
    .lb-rank.silver { color:var(--gray-500); }
    .lb-rank.bronze { color:#92400e; }
    .lb-user { display:flex;align-items:center;gap:10px; }
    .lb-av { width:32px;height:32px;border-radius:50%;background:var(--gray-900);color:var(--white);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0; }
    .lb-name { font-size:13px;font-weight:600; }
    .lb-handle { font-size:11px;color:var(--gray-400); }
    .lb-views { font-size:13px;font-weight:600;color:var(--gray-700); }
    .lb-badge { font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.5px; }
    .lb-badge.premium { background:var(--black);color:var(--white); }
    .lb-badge.free { background:var(--gray-100);color:var(--gray-500);border:1px solid var(--gray-200); }
  </style>
</head>
<body>
<nav class="lb-nav">
  <a href="/" class="lb-nav-brand">ak-47<span>.fr</span></a>
  <a href="/">← Retour</a>
</nav>
<div class="page">
  <div class="page-tag">Classement</div>
  <h1>Top profils</h1>
  <p class="subtitle">Les profils les plus visités sur ak-47.fr ce mois-ci.</p>
  <div class="lb-table">
    <div class="lb-header">
      <span>#</span><span>Utilisateur</span><span>Vues</span><span>Plan</span>
    </div>
    <div id="lbBody"></div>
  </div>
</div>
<script>
  const users = [
    {rank:1,init:'NK',name:'N1GHTK1LL',handle:'n1ghtk1ll',views:'412 088',premium:true},
    {rank:2,init:'SR',name:'ShadowRX',handle:'shadowrx',views:'284 921',premium:true},
    {rank:3,init:'VX',name:'VoidX',handle:'voidx',views:'198 340',premium:false},
    {rank:4,init:'CR',name:'Cr1msonX',handle:'crimsonx',views:'187 204',premium:true},
    {rank:5,init:'GH',name:'GhostByte',handle:'ghostbyte',views:'152 018',premium:true},
    {rank:6,init:'ZR',name:'ZeroRaid',handle:'zeroraid',views:'143 877',premium:false},
    {rank:7,init:'PX',name:'PhantomXL',handle:'phantomxl',views:'138 420',premium:true},
    {rank:8,init:'DK',name:'DarkKnight99',handle:'darkknight',views:'121 655',premium:false},
    {rank:9,init:'NX',name:'NxXxLight',handle:'nxxlight',views:'114 002',premium:true},
    {rank:10,init:'SK',name:'SkullCrack',handle:'skullcrack',views:'99 871',premium:false},
  ];
  const rankClass = r => r===1?'gold':r===2?'silver':r===3?'bronze':'';
  const rankIcon = r => r===1?'🥇':r===2?'🥈':r===3?'🥉':r;
  document.getElementById('lbBody').innerHTML = users.map(u => `
    <div class="lb-row">
      <div class="lb-rank ${rankClass(u.rank)}">${rankIcon(u.rank)}</div>
      <div class="lb-user">
        <div class="lb-av">${u.init}</div>
        <div><div class="lb-name">${u.name}</div><div class="lb-handle">ak-47.fr/${u.handle}</div></div>
      </div>
      <div class="lb-views">${u.views}</div>
      <div><span class="lb-badge ${u.premium?'premium':'free'}">${u.premium?'✦ Premium':'Gratuit'}</span></div>
    </div>`).join('');
</script>
</body>
</html>

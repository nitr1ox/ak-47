<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>ak-47.fr — Maintenance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #000; --white: #fff;
      --gray-100: #f4f4f5; --gray-200: #e4e4e7;
      --gray-400: #a1a1aa; --gray-500: #71717a;
      --gray-700: #3f3f46; --gray-900: #18181b;
    }
    html, body { height: 100%; }
    body {
      background: var(--white); color: var(--gray-900);
      font-family: 'Inter', sans-serif; font-size: 15px; line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 100vh; padding: 32px 24px;
    }
    .container { max-width: 480px; width: 100%; text-align: center; }
    .brand { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; color: var(--black); text-decoration: none; display: inline-block; margin-bottom: 48px; }
    .brand span { color: var(--gray-500); font-weight: 400; }
    .icon { width: 48px; height: 48px; background: var(--gray-100); border-radius: 12px; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; }
    .icon svg { width: 22px; height: 22px; stroke: var(--gray-700); fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
    h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.4px; color: var(--gray-900); margin-bottom: 12px; }
    p { font-size: 14px; color: var(--gray-500); line-height: 1.7; margin-bottom: 40px; }
    .divider { width: 40px; height: 1px; background: var(--gray-200); margin: 0 auto 32px; }
    .status { display: inline-flex; align-items: center; gap: 8px; background: var(--gray-100); border: 1px solid var(--gray-200); border-radius: 100px; padding: 6px 14px; font-size: 12px; font-weight: 500; color: var(--gray-700); }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #f59e0b; animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    footer { position: fixed; bottom: 24px; font-size: 12px; color: var(--gray-400); display: flex; gap: 16px; align-items: center; }
    .admin-link { font-size: 11px; color: var(--gray-400); text-decoration: none; opacity: 0.5; transition: opacity .2s; }
    .admin-link:hover { opacity: 1; }
    .icon { box-shadow: 0 6px 18px rgba(0,0,0,.06); }
    .status { box-shadow: 0 1px 2px rgba(0,0,0,.02); }
  </style>
<script>const MAINTENANCE_EXEMPT = true;</script>
</head>
<body>
  <div class="container">
    <a class="brand" href="#">ak-47<span>.fr</span></a>
    <div class="icon">
      <svg viewBox="0 0 24 24"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
    </div>
    <h1>Maintenance en cours</h1>
    <p>Le site est temporairement indisponible. On revient très bientôt.</p>
    <div class="divider"></div>
    <div class="status"><span class="status-dot"></span>Retour imminent</div>
  </div>
  <footer>
    <span>© 2026 ak-47.fr</span>
    <a class="admin-link" href="/maintenance-login">Admin</a>
  </footer>

  <script>
    const API = 'https://ak47-backend.onrender.com';
    
    fetch(API + '/api/stats/maintenance')
      .then(r => r.json())
      .then(d => {
        if (d.maintenance && d.maintenance.message) {
          const p = document.querySelector('p');
          if (p) p.textContent = d.maintenance.message;
        }
        
        if (!d.maintenance || !d.maintenance.enabled) {
          window.location.href = '/';
        }
      }).catch(() => {});

    
    const token = localStorage.getItem('auth_token') || localStorage.getItem('token');
    if (token) {
      fetch(API + '/api/admin/maintenance', { headers: { Authorization: 'Bearer ' + token } })
        .then(r => { if (r.ok) window.location.href = '/admin'; })
        .catch(() => {});
    }
  </script>
</body>
</html>

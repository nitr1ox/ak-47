<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>ak-47.fr — Statut</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/style.css"/>
  <style>
    body { background: var(--white); }
    .snav { display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:56px;border-bottom:1px solid var(--gray-200); }
    .snav-brand { font-size:16px;font-weight:700;letter-spacing:-.3px;color:var(--black);text-decoration:none; }
    .snav-brand span { color:var(--gray-400);font-weight:400; }
    .snav a.back { font-size:13px;color:var(--gray-500);text-decoration:none; }
    .page { max-width:640px;margin:0 auto;padding:56px 24px; }
    h1 { font-size:clamp(28px,4vw,44px);font-weight:700;letter-spacing:-1.5px;margin-bottom:8px; }
    .overall { display:inline-flex;align-items:center;gap:8px;background:#f0fdf4;border:1px solid #bbf7d0;color:#15803d;border-radius:30px;padding:8px 18px;font-size:13px;font-weight:600;margin-bottom:36px; }
    .overall-dot { width:7px;height:7px;border-radius:50%;background:#22c55e;animation:pulse 1.5s ease infinite; }
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.3)}}
    .services { border:1px solid var(--gray-200);border-radius:10px;overflow:hidden; }
    .srv-row { display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--gray-100); }
    .srv-row:last-child { border-bottom:none; }
    .srv-name { font-size:13px;font-weight:500; }
    .srv-uptime { font-size:11px;color:var(--gray-400);margin-top:2px; }
    .badge-up { background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600; }
  </style>
</head>
<body>
<nav class="snav"><a href="/" class="snav-brand">ak-47<span>.fr</span></a><a href="/" class="back">← Retour</a></nav>
<div class="page">
  <h1>Statut des systèmes</h1>
  <div class="overall"><span class="overall-dot"></span>Tous les systèmes opérationnels</div>
  <div class="services">
    <div class="srv-row"><div><div class="srv-name">Profils & Pages</div><div class="srv-uptime">99.98% uptime</div></div><span class="badge-up">Opérationnel</span></div>
    <div class="srv-row"><div><div class="srv-name">API</div><div class="srv-uptime">99.99% uptime</div></div><span class="badge-up">Opérationnel</span></div>
    <div class="srv-row"><div><div class="srv-name">Authentification</div><div class="srv-uptime">99.97% uptime</div></div><span class="badge-up">Opérationnel</span></div>
    <div class="srv-row"><div><div class="srv-name">Analytics</div><div class="srv-uptime">99.91% uptime</div></div><span class="badge-up">Opérationnel</span></div>
    <div class="srv-row"><div><div class="srv-name">Hébergement de fichiers</div><div class="srv-uptime">99.95% uptime</div></div><span class="badge-up">Opérationnel</span></div>
  </div>
</div>
</body>
</html>

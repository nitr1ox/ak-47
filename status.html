<!DOCTYPE html>
<html lang="fr">
<head>
<script src="/error-logger.js"></script><script>(function(){var t=localStorage.getItem("theme")||"light";document.documentElement.setAttribute("data-theme",t);})();</script>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>ak-47.fr — Statut</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/style.css"/>
  <style>:root{--accent:#8b5e3c;--accent-light:#c4956a;--accent-dark:#5c3a1e;--accent-glow:rgba(139,94,60,.18);}[data-theme="dark"]{--accent:#c4956a;--accent-light:#e0b88a;--accent-dark:#d4a87a;}</style>
  <style>
    body { background: var(--gray-50); }
    .page-shell { background: radial-gradient(circle at 50% 0%, var(--gray-100), var(--gray-50) 60%); }
    .card {
      border-radius: 18px; border-color: var(--gray-100);
      box-shadow: 0 1px 2px rgba(0,0,0,.03), 0 24px 60px -12px rgba(0,0,0,.10);
    }
    .logo-link { font-size: 19px; margin-bottom: 32px; }
    input, textarea, .input-row { border-radius: 11px; }
    .btn { border-radius: 11px; letter-spacing: -.1px; }
    .btn-primary { box-shadow: 0 6px 16px -4px rgba(0,0,0,.18); transition: transform .15s, box-shadow .15s, background .15s; }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 10px 22px -4px rgba(0,0,0,.22); }
    .btn-secondary { border-radius: 11px; }
    .alert { border-radius: 10px; }
    [data-theme="dark"] .card { box-shadow: 0 1px 2px rgba(0,0,0,.2), 0 24px 60px -12px rgba(0,0,0,.4); }
  </style>
  <style>
    body { background: var(--white); }
    .snav { display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:56px;border-bottom:1px solid var(--gray-200); }
    .snav-brand { font-size:16px;font-weight:700;letter-spacing:-.3px;color:var(--black);text-decoration:none; }
    .snav-brand span { color:var(--gray-400);font-weight:400; }
    .snav a.back { font-size:13px;color:var(--gray-500);text-decoration:none; }
    .snav a.back:hover { color:var(--black); }
    .page { max-width:640px;margin:0 auto;padding:56px 24px; }
    h1 { font-size:clamp(28px,4vw,44px);font-weight:700;letter-spacing:-1.5px;margin-bottom:8px; }
    .overall { display:inline-flex;align-items:center;gap:8px;border-radius:30px;padding:8px 18px;font-size:13px;font-weight:600;margin-bottom:36px; }
    .overall.ok { background:#f0fdf4;border:1px solid #bbf7d0;color:#15803d; }
    .overall.checking { background:var(--gray-100);border:1px solid var(--gray-200);color:var(--gray-500); }
    .overall-dot { width:7px;height:7px;border-radius:50%; }
    .overall.ok .overall-dot { background:#22c55e;animation:pulse 1.5s ease infinite; }
    .overall.checking .overall-dot { background:var(--gray-400); }
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.3)}}
    .services { border:1px solid var(--gray-200);border-radius:10px;overflow:hidden;margin-bottom:32px; }
    .srv-row { display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--gray-100); }
    .srv-row:last-child { border-bottom:none; }
    .srv-name { font-size:13px;font-weight:500; }
    .srv-sub { font-size:11px;color:var(--gray-400);margin-top:2px; }
    .badge-up { background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600; }
    .badge-checking { background:var(--gray-100);color:var(--gray-500);border:1px solid var(--gray-200);padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600; }
    .badge-down { background:#fef2f2;color:#dc2626;border:1px solid #fecaca;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600; }
    .last-check { font-size:12px;color:var(--gray-400);text-align:right; }
    @media (max-width: 480px) {
      .snav { padding: 0 14px; }
      .page { padding: 36px 14px; }
      .srv-row { flex-direction: column; align-items: flex-start; gap: 8px; }
    }
  </style>

  <style id="fluid-global">

    a, button, input, textarea, select,
    [role="button"], [tabindex] {
      transition: opacity .2s ease, color .2s ease, background .2s ease,
                  border-color .2s ease, box-shadow .2s ease,
                  transform .2s cubic-bezier(.34,1.56,.64,1) !important;
    }

    html { scroll-behavior: smooth; }

    button:active, [role="button"]:active {
      transform: scale(.96) !important;
      transition-duration: .08s !important;
    }

    input:focus, textarea:focus, select:focus {
      outline: none;
      box-shadow: 0 0 0 3px rgba(0,0,0,.08) !important;
      border-color: #000 !important;
      transition: box-shadow .2s ease, border-color .2s ease !important;
    }

    .section-card, .mblock, .profile-card {
      transition: box-shadow .25s ease, transform .25s cubic-bezier(.22,1,.36,1) !important;
    }
    .section-card:hover, .mblock:hover {
      box-shadow: 0 4px 20px rgba(0,0,0,.08) !important;
      transform: translateY(-1px) !important;
    }

    .tab {
      transition: color .2s ease, border-color .2s ease !important;
    }

    .icon-picker-overlay {
      transition: opacity .25s ease !important;
    }
    .icon-picker-modal {
      transition: transform .3s cubic-bezier(.34,1.56,.64,1), opacity .25s ease !important;
    }

    .mdrop {
      transition: border-color .2s ease, background .2s ease, box-shadow .2s ease !important;
    }
    .mdrop:hover {
      box-shadow: 0 2px 12px rgba(0,0,0,.06) !important;
    }

    .toast {
      transition: opacity .25s ease, transform .25s cubic-bezier(.34,1.56,.64,1) !important;
    }

    .mob-nav-btn {
      transition: color .15s ease, transform .15s cubic-bezier(.34,1.56,.64,1) !important;
    }
    .mob-nav-btn:active { transform: scale(.9) !important; }
    .mob-nav-btn.active { transform: scale(1.05) !important; }

    .badge {
      transition: transform .2s cubic-bezier(.34,1.56,.64,1), box-shadow .2s ease !important;
    }
    .badge:hover { transform: scale(1.06) !important; }

    .copy-btn:hover, .save-bar-btn:hover {
      transform: translateY(-1px) !important;
      box-shadow: 0 4px 12px rgba(0,0,0,.12) !important;
    }

    .ipick-btn {
      transition: transform .2s cubic-bezier(.34,1.56,.64,1), border-color .15s, background .15s, box-shadow .2s !important;
    }
    .ipick-btn:hover { transform: translateY(-3px) scale(1.04) !important; }

    .mblock-chevron {
      transition: transform .25s cubic-bezier(.34,1.56,.64,1) !important;
    }

    .audio-src-tab {
      transition: all .2s cubic-bezier(.34,1.56,.64,1) !important;
    }
    .audio-src-tab:hover { transform: translateY(-1px) !important; }

    nav a, .nav-link {
      transition: color .2s ease, opacity .2s ease !important;
    }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(0,0,0,.15); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,.3); }
  </style>
<script>
function logError(msg, stack) {
  try {
    fetch("https://ak47-backend.onrender.com/api/log-error", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: msg, stack: stack || "", page: window.location.href, userAgent: navigator.userAgent })
    }).catch(function() {});
  } catch(e) {}
}
window.onerror = function(msg, src, line, col, err) {
  logError(msg, err ? err.stack : src + ":" + line + ":" + col);
};
window.onunhandledrejection = function(e) {
  logError("UnhandledPromise: " + (e.reason && e.reason.message || e.reason), e.reason && e.reason.stack);
};
</script>
</head>
<body>
<button id="globalThemeBtn" onclick="toggleTheme()" title="Changer le thème" aria-label="Changer le thème">🌙</button>

<nav class="snav">
  <a href="/" class="snav-brand">ak-47<span>.fr</span></a>
  <a href="/" class="back">← Retour</a>
</nav>
<div class="page">
  <h1>Statut des systèmes</h1>
  <div class="overall checking" id="overall"><span class="overall-dot"></span><span id="overall-text">Vérification…</span></div>
  <div class="services">
    <div class="srv-row">
      <div><div class="srv-name">API</div><div class="srv-sub" id="api-sub">Vérification en cours…</div></div>
      <span class="badge-checking" id="api-badge">…</span>
    </div>
    <div class="srv-row">
      <div><div class="srv-name">Profils & Pages</div><div class="srv-sub">Serving frontend statique</div></div>
      <span class="badge-up">Opérationnel</span>
    </div>
    <div class="srv-row">
      <div><div class="srv-name">Base de données (Firebase)</div><div class="srv-sub" id="db-sub">Vérification en cours…</div></div>
      <span class="badge-checking" id="db-badge">…</span>
    </div>
    <div class="srv-row">
      <div><div class="srv-name">Authentification (JWT)</div><div class="srv-sub">Tokens 30 jours</div></div>
      <span class="badge-up">Opérationnel</span>
    </div>
  </div>
  <p class="last-check" id="last-check"></p>
</div>
<script>
  async function checkStatus() {
    const now = new Date().toLocaleTimeString('fr-FR');
    document.getElementById('last-check').textContent = 'Dernière vérification : ' + now;

    try {
      const t0 = Date.now();
      const r = await fetch('https://ak47-backend.onrender.com/api/health');
      const ms = Date.now() - t0;
      if (r.ok) {
        document.getElementById('api-badge').className = 'badge-up';
        document.getElementById('api-badge').textContent = 'Opérationnel';
        document.getElementById('api-sub').textContent = 'Réponse en ' + ms + ' ms';
      } else {
        throw new Error('non-ok');
      }
    } catch {
      document.getElementById('api-badge').className = 'badge-down';
      document.getElementById('api-badge').textContent = 'Indisponible';
      document.getElementById('api-sub').textContent = 'Aucune réponse';
    }

    try {
      const t0 = Date.now();
      const r = await fetch('https://ak47-backend.onrender.com/api/stats');
      const ms = Date.now() - t0;
      if (r.ok) {
        document.getElementById('db-badge').className = 'badge-up';
        document.getElementById('db-badge').textContent = 'Opérationnel';
        document.getElementById('db-sub').textContent = 'Réponse en ' + ms + ' ms';
      } else {
        throw new Error('non-ok');
      }
    } catch {
      document.getElementById('db-badge').className = 'badge-down';
      document.getElementById('db-badge').textContent = 'Indisponible';
      document.getElementById('db-sub').textContent = 'Aucune réponse';
    }

    const allUp = ['api-badge', 'db-badge'].every(id =>
      document.getElementById(id).className === 'badge-up'
    );
    const overall = document.getElementById('overall');
    if (allUp) {
      overall.className = 'overall ok';
      document.getElementById('overall-text').textContent = 'Tous les systèmes sont opérationnels';
    } else {
      overall.className = 'overall checking';
      document.getElementById('overall-text').textContent = 'Certains systèmes sont indisponibles';
    }
  }

  checkStatus();
  setInterval(checkStatus, 30000);
</script>

<script>
(function(){
  var btn = document.getElementById('globalThemeBtn');
  if(!btn) return;
  var t = document.documentElement.getAttribute('data-theme') || 'light';
  btn.textContent = t === 'dark' ? '☀️' : '🌙';
  btn.setAttribute('data-theme-btn', '1');
})();
function toggleTheme(){
  var cur = document.documentElement.getAttribute('data-theme') || 'light';
  var next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  var btn = document.getElementById('globalThemeBtn');
  if(btn) btn.textContent = next === 'dark' ? '☀️' : '🌙';
  var pill = document.getElementById('themeToggle');
  if(pill) pill.textContent = next === 'dark' ? '☀️' : '🌙';
}
document.addEventListener('DOMContentLoaded', function(){
  var btn = document.getElementById('globalThemeBtn');
  if(btn){var t=document.documentElement.getAttribute('data-theme')||'light'; btn.textContent=t==='dark'?'☀️':'🌙';}
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>ak-47.fr</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --black:#000; --white:#fff; --gray-50:#fafafa; --gray-100:#f4f4f5; --gray-200:#e4e4e7; --gray-400:#a1a1aa; --gray-500:#71717a; --gray-900:#18181b; }
    body { background: var(--gray-50); font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; flex-direction: column; -webkit-font-smoothing: antialiased; }

    #loading { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .spinner { width: 28px; height: 28px; border: 2px solid var(--gray-200); border-top-color: var(--black); border-radius: 50%; animation: spin .6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    #notFound { display: none; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 24px; }
    #notFound h1 { font-size: 48px; font-weight: 700; letter-spacing: -2px; margin-bottom: 8px; }
    #notFound p { color: var(--gray-500); margin-bottom: 24px; }
    #notFound a { color: var(--black); font-weight: 600; text-decoration: none; font-size: 14px; }

    #profile { display: none; flex-direction: column; align-items: center; padding: 48px 20px 80px; min-height: 100vh; }

    .profile-card { width: 100%; max-width: 480px; }

    .profile-top { text-align: center; margin-bottom: 28px; }
    .profile-avatar {
      width: 80px; height: 80px; border-radius: 50%;
      margin: 0 auto 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 30px; font-weight: 700;
      border: 2px solid var(--gray-200);
    }
    .profile-name { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 6px; }
    .profile-bio { font-size: 14px; color: var(--gray-500); line-height: 1.5; max-width: 320px; margin: 0 auto; }
    .profile-handle { font-size: 12px; color: var(--gray-400); margin-top: 6px; }
    /* plan-badge removed — platform is fully free */

    .profile-links { display: flex; flex-direction: column; gap: 10px; }
    .profile-link {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--white); border: 1px solid var(--gray-200);
      border-radius: 10px; padding: 14px 18px;
      text-decoration: none; color: var(--black);
      font-size: 14px; font-weight: 500;
      transition: all .15s;
      box-shadow: 0 1px 2px rgba(0,0,0,.04);
    }
    .profile-link:hover { background: var(--gray-50); border-color: var(--gray-300); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,0,0,.08); }
    .profile-link-arrow { color: var(--gray-400); font-size: 16px; }

    .profile-footer { margin-top: 36px; text-align: center; }
    .profile-footer a { font-size: 12px; color: var(--gray-400); text-decoration: none; font-weight: 500; transition: color .15s; }
    .profile-footer a:hover { color: var(--black); }
  </style>
</head>
<body>

<div id="loading"><div class="spinner"></div></div>

<div id="notFound">
  <h1>404</h1>
  <p>Ce profil n'existe pas sur ak-47.fr.</p>
  <a href="/">← Retour à l'accueil</a>
</div>

<div id="profile">
  <div class="profile-card">
    <div class="profile-top">
      <div class="profile-avatar" id="pAvatar"></div>
      <div class="profile-name" id="pName"></div>
      <div class="profile-bio" id="pBio"></div>
      <div class="profile-handle" id="pHandle"></div>
      <div id="pBadge"></div>
    </div>
    <div class="profile-links" id="pLinks"></div>
    <div class="profile-footer"><a href="/">Créez votre profil sur ak-47.fr →</a></div>
  </div>
</div>

<script>
const API = '';
const path = window.location.pathname;
const parts = path.split('/').filter(Boolean);
const username = parts[0];

// Static pages — let server handle
const STATIC = ['login','register','dashboard','leaderboard','status','terms','privacy','recovery'];
if (!username || STATIC.includes(username)) {
  document.getElementById('loading').style.display = 'none';
}

async function loadProfile() {
  if (!username || STATIC.includes(username)) return;

  try {
    // Record view
    fetch(API + '/api/analytics/profile/' + username).catch(() => {});

    const r = await fetch(API + '/api/profile/' + username);
    document.getElementById('loading').style.display = 'none';

    if (!r.ok) {
      document.getElementById('notFound').style.display = 'flex';
      document.title = 'Profil introuvable — ak-47.fr';
      return;
    }

    const user = await r.json();
    document.title = (user.display_name || user.username) + ' — ak-47.fr';

    const color = user.avatar_color || '#000000';
    const isLight = (() => { const r=parseInt(color.slice(1,3),16),g=parseInt(color.slice(3,5),16),b=parseInt(color.slice(5,7),16); return (0.299*r+0.587*g+0.114*b)>128; })();

    const av = document.getElementById('pAvatar');
    av.style.background = color;
    av.style.color = isLight ? '#000' : '#fff';
    av.textContent = (user.display_name || user.username).charAt(0).toUpperCase();

    document.getElementById('pName').textContent = user.display_name || user.username;
    document.getElementById('pBio').textContent = user.bio || '';
    document.getElementById('pHandle').textContent = 'ak-47.fr/' + user.username;

    const links = user.links || [];
    const linksContainer = document.getElementById('pLinks');
    if (links.length) {
      linksContainer.innerHTML = links.map(l => `
        <a class="profile-link" href="${escAttr(l.url)}" target="_blank" rel="noopener"
          onclick="trackClick(${JSON.stringify(user.username)}, ${JSON.stringify(l.url)}, ${JSON.stringify(l.title)})">
          ${escHtml(l.title)}
          <span class="profile-link-arrow">↗</span>
        </a>`).join('');
    } else {
      linksContainer.innerHTML = '<p style="text-align:center;color:var(--gray-400);font-size:13px;padding:20px;">Aucun lien pour l\'instant.</p>';
    }

    document.getElementById('profile').style.display = 'flex';
  } catch {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('notFound').style.display = 'flex';
  }
}

function trackClick(username, url, title) {
  fetch(API + '/api/analytics/click', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username, link_url: url, link_title: title })
  }).catch(() => {});
}

function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s) { return String(s).replace(/"/g,'&quot;'); }

loadProfile();
</script>
</body>
</html>

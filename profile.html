<!DOCTYPE html>
<html lang="fr">
<head><script>(function(){var t=localStorage.getItem("theme")||"light";document.documentElement.setAttribute("data-theme",t);})();</script>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>ak-47.fr</title>
  <link id="profileFont" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black:#000; --white:#fff; --gray-50:#fafafa; --gray-100:#f4f4f5;
      --gray-200:#e4e4e7; --gray-400:#a1a1aa; --gray-500:#71717a; --gray-900:#18181b;
      --link-bg: var(--white); --link-color: var(--black);
      --link-border: var(--gray-200); --link-radius: 10px;
      --profile-text-color: var(--gray-900);
      --card-bg: transparent;
    }
    body { background: var(--gray-50); font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; flex-direction: column; -webkit-font-smoothing: antialiased; }

    #loading { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; min-height: 100vh; }
    .spinner { width: 28px; height: 28px; border: 2px solid var(--gray-200); border-top-color: var(--black); border-radius: 50%; animation: spin .6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loadingMsg { font-size: 13px; color: var(--gray-400); }

    #notFound { display: none; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 24px; }
    #notFound h1 { font-size: 48px; font-weight: 700; letter-spacing: -2px; margin-bottom: 8px; }
    #notFound p { color: var(--gray-500); margin-bottom: 24px; }
    #notFound a { color: var(--black); font-weight: 600; text-decoration: none; font-size: 14px; }

    #profileBanner {
      display: none; width: 100%; max-width: 480px;
      height: 120px; object-fit: cover;
      border-radius: 14px 14px 0 0; margin-bottom: -40px;
    }

    #profile { display: none; flex-direction: column; align-items: center; padding: 0 20px 80px; min-height: 100vh; }
    .profile-card { width: 100%; max-width: 480px; background: var(--card-bg); border-radius: 16px; padding: 8px; }

    .profile-top { text-align: center; margin-bottom: 28px; padding-top: 20px; }

    .profile-avatar {
      width: 80px; height: 80px; border-radius: 50%;
      margin: 0 auto 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 30px; font-weight: 700;
      border: 3px solid var(--white);
      box-shadow: 0 2px 8px rgba(0,0,0,.12);
    }
    .profile-avatar.shape-rounded { border-radius: 20px; }
    .profile-avatar.shape-square   { border-radius: 6px; }
    .profile-avatar-img { width: 100%; height: 100%; object-fit: cover; border-radius: inherit; display: block; }

    .profile-name { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 6px; color: var(--profile-text-color); }
    .profile-bio  { font-size: 14px; color: var(--profile-text-color); opacity: 0.7; line-height: 1.5; max-width: 320px; margin: 0 auto; }
    .profile-handle { font-size: 12px; color: var(--gray-400); margin-top: 6px; }
    .profile-views  { font-size: 11px; color: var(--gray-400); margin-top: 8px; display: flex; align-items: center; justify-content: center; gap: 4px; }
    .profile-views svg { width: 12px; height: 12px; stroke: var(--gray-400); fill: none; flex-shrink: 0; }

    .social-row {
      display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
      margin: 12px 0 4px;
    }
    .social-icon-link {
      display: flex; align-items: center; justify-content: center;
      width: 34px; height: 34px; border-radius: 50%;
      background: rgba(0,0,0,.06); text-decoration: none;
      transition: transform .15s, background .15s;
      font-size: 18px;
    }
    .social-icon-link:hover { transform: translateY(-2px); background: rgba(0,0,0,.12); }
    .social-icon-link img { width: 18px; height: 18px; border-radius: 3px; }

    .spotify-widget {
      display: none; align-items: center; gap: 10px;
      background: #1DB954; border-radius: 12px;
      padding: 10px 14px; margin: 12px auto 0;
      max-width: 300px; cursor: pointer; text-decoration: none;
      color: #fff; font-size: 12px; font-weight: 600;
      transition: opacity .15s;
    }
    .spotify-widget:hover { opacity: .9; }
    .spotify-widget.visible { display: flex; }
    .spotify-widget svg { width: 20px; height: 20px; fill: #fff; flex-shrink: 0; }
    .spotify-widget-text { overflow: hidden; }
    .spotify-widget-label { font-size: 10px; opacity: .8; }
    .spotify-widget-name  { font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .profile-links { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }

    .profile-link {
      position: relative;
      display: flex; align-items: center; justify-content: center;
      width: 48px; height: 48px;
      background: var(--link-bg); border: 1px solid var(--link-border);
      border-radius: 12px;
      text-decoration: none; color: var(--link-color);
      transition: all .15s;
      box-shadow: 0 1px 2px rgba(0,0,0,.06);
    }
    .profile-link:hover { transform: translateY(-3px); box-shadow: 0 6px 16px rgba(0,0,0,.12); }
    
    .profile-link-arrow { display: none; }
    .profile-link-icon { width: 24px; height: 24px; border-radius: 4px; object-fit: contain; }
    .profile-link-left { display: flex; align-items: center; justify-content: center; }
    .profile-link-fallback { font-size: 20px; }
    
    

    .profile-links.layout-grid { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
    .profile-links.layout-buttons { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }

    .profile-footer { margin-top: 36px; text-align: center; }
    .profile-footer a { font-size: 12px; color: var(--gray-400); text-decoration: none; font-weight: 500; transition: color .15s; }
    .profile-footer a:hover { color: var(--black); }

    #profileBg {
      position: fixed; inset: 0; z-index: -1;
      background-size: cover; background-position: center;
      background-repeat: no-repeat;
      opacity: 1; pointer-events: none;
    }

    #audioPlayer { display: none; }

    
    #enterOverlay {
      position: fixed; inset: 0; z-index: 99999;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: rgba(0,0,0,.45);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      transition: opacity .6s ease, visibility .6s ease;
    }
    #enterOverlay.hidden {
      opacity: 0; visibility: hidden; pointer-events: none;
    }
    #enterOverlay .enter-bg { display: none; }
    #enterOverlay .enter-particles {
      position: absolute; inset: 0; overflow: hidden; pointer-events: none;
    }
    #enterOverlay .enter-particles span {
      position: absolute; width: 2px; height: 2px;
      background: rgba(255,255,255,.4); border-radius: 50%;
      animation: floatUp linear infinite;
    }
    @keyframes floatUp {
      0%   { transform: translateY(0) scale(1);   opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { transform: translateY(-100vh) scale(0); opacity: 0; }
    }
    #enterOverlay .enter-content {
      position: relative; z-index: 2;
      display: flex; flex-direction: column;
      align-items: center; gap: 32px;
      text-align: center; padding: 32px;
    }
    #enterOverlay .enter-logo {
      font-size: 13px; font-weight: 600; letter-spacing: 3px;
      text-transform: uppercase; color: rgba(255,255,255,.3);
    }
    #enterOverlay .enter-pulse {
      width: 80px; height: 80px; position: relative;
      display: flex; align-items: center; justify-content: center;
    }
    #enterOverlay .enter-pulse::before,
    #enterOverlay .enter-pulse::after {
      content: ''; position: absolute; inset: 0;
      border-radius: 50%; border: 1px solid rgba(255,255,255,.2);
      animation: pulseRing 2s ease-out infinite;
    }
    #enterOverlay .enter-pulse::after { animation-delay: 1s; }
    @keyframes pulseRing {
      0%   { transform: scale(.8); opacity: 1; }
      100% { transform: scale(2.2); opacity: 0; }
    }
    #enterOverlay .enter-icon {
      width: 80px; height: 80px; border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,.15);
      display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,.05);
      font-size: 28px;
      position: relative; z-index: 1;
    }
    #enterBtn {
      background: none; border: none; cursor: pointer;
      font-size: 12px; font-weight: 500; letter-spacing: 3px;
      text-transform: uppercase; color: rgba(255,255,255,.5);
      font-family: inherit;
      animation: blink 2.5s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:.3} 50%{opacity:1} }

    
    .music-player {
      display: none;
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(80px);
      width: calc(100% - 32px); max-width: 420px;
      background: rgba(15,15,15,.82);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 20px;
      padding: 12px 14px 10px;
      color: #fff; user-select: none;
      z-index: 9999;
      box-shadow: 0 8px 40px rgba(0,0,0,.45), 0 2px 8px rgba(0,0,0,.3);
      transition: transform .4s cubic-bezier(.34,1.56,.64,1), opacity .3s ease;
      opacity: 0;
    }
    .music-player.visible {
      display: block;
    }
    .music-player.shown {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    
    .mp-top {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 10px;
    }
    .mp-thumb {
      width: 44px; height: 44px; border-radius: 10px;
      background: #2a2a2a; flex-shrink: 0; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,.4);
    }
    .mp-thumb img { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; display: block; }
    .mp-thumb-placeholder { font-size: 20px; opacity: .4; }

    .mp-info { flex: 1; min-width: 0; }
    .mp-label { font-size: 10px; color: rgba(255,255,255,.45); letter-spacing: .06em; text-transform: uppercase; margin-bottom: 2px; }
    .mp-title { font-size: 13px; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .mp-play-btn {
      width: 38px; height: 38px; border-radius: 50%; flex-shrink: 0;
      background: #fff; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,.35);
      transition: transform .15s ease, background .15s;
    }
    .mp-play-btn:hover { transform: scale(1.08); background: #e8e8e8; }
    .mp-play-btn:active { transform: scale(.95); }
    .mp-play-btn svg { width: 16px; height: 16px; fill: #000; flex-shrink: 0; }

    
    .mp-progress-row {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 8px;
    }
    .mp-time { font-size: 10px; color: rgba(255,255,255,.4); min-width: 30px; }
    .mp-time.right { text-align: right; }
    .mp-progress {
      flex: 1; height: 3px; background: rgba(255,255,255,.15);
      border-radius: 2px; cursor: pointer; position: relative;
    }
    .mp-progress:hover { height: 5px; margin: -1px 0; }
    .mp-progress-fill {
      height: 100%; background: #fff; border-radius: 2px;
      width: 0%; pointer-events: none; transition: width .1s linear;
      position: relative;
    }
    .mp-progress-fill::after {
      content: ''; position: absolute; right: -4px; top: 50%;
      width: 8px; height: 8px; border-radius: 50%;
      background: #fff; transform: translateY(-50%) scale(0);
      transition: transform .15s;
    }
    .mp-progress:hover .mp-progress-fill::after { transform: translateY(-50%) scale(1); }

    
    .mp-bottom {
      display: flex; align-items: center; justify-content: space-between;
    }
    .mp-seek-group { display: flex; align-items: center; gap: 4px; }
    .mp-btn {
      background: none; border: none; color: rgba(255,255,255,.55); cursor: pointer;
      padding: 4px; display: flex; align-items: center; justify-content: center;
      border-radius: 6px; transition: color .15s, background .15s;
    }
    .mp-btn:hover { color: #fff; background: rgba(255,255,255,.08); }
    .mp-btn svg { width: 15px; height: 15px; fill: currentColor; }

    
    .mp-vol-group { display: flex; align-items: center; gap: 6px; }
    .mp-vol-icon { color: rgba(255,255,255,.5); display: flex; align-items: center; cursor: pointer; }
    .mp-vol-icon svg { width: 14px; height: 14px; fill: currentColor; }
    .mp-vol-slider {
      -webkit-appearance: none; appearance: none;
      width: 70px; height: 3px;
      background: linear-gradient(to right, rgba(255,255,255,.8) 0%, rgba(255,255,255,.8) 70%, rgba(255,255,255,.2) 70%);
      border-radius: 2px; cursor: pointer; outline: none; border: none;
    }
    .mp-vol-slider::-webkit-slider-thumb {
      -webkit-appearance: none; width: 10px; height: 10px;
      border-radius: 50%; background: #fff; cursor: pointer;
      box-shadow: 0 1px 4px rgba(0,0,0,.4);
    }
    .mp-vol-slider::-moz-range-thumb {
      width: 10px; height: 10px; border-radius: 50%;
      background: #fff; cursor: pointer; border: none;
    }

    .badges-row { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin: 10px 0 4px; }
    .badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; border: 1px solid rgba(0,0,0,.08); }
    .badge-discord { background: #5865F2; color: #fff; border-color: #5865F2; }
    .badge-nitro   { background: linear-gradient(135deg,#f47fff,#7289da); color: #fff; border-color: transparent; }
    .badge-server  { background: #000; color: #fff; border-color: #000; }
    .badge-server.vip { background: linear-gradient(135deg,#f6c90e,#e6a817); color: #000; border-color: transparent; }
    .badge-server.mod { background: #e74c3c; color: #fff; border-color: transparent; }

    
    .discord-card {
      display: none;
      align-items: center; gap: 12px;
      background: #1a1a1e; border-radius: 14px;
      padding: 12px 16px; margin: 16px auto 0;
      max-width: 360px; width: 100%;
      border: 1px solid rgba(255,255,255,.06);
    }
    .discord-card.visible { display: flex; }
    .dc-avatar-wrap { position: relative; flex-shrink: 0; }
    .dc-avatar {
      width: 46px; height: 46px; border-radius: 50%;
      object-fit: cover; display: block;
      background: #333;
    }
    .dc-avatar-letter {
      width: 46px; height: 46px; border-radius: 50%;
      background: #5865F2; color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 700;
    }
    .dc-status-dot {
      position: absolute; bottom: 1px; right: 1px;
      width: 12px; height: 12px; border-radius: 50%;
      border: 2px solid #1a1a1e;
    }
    .dc-status-dot.online  { background: #23a559; }
    .dc-status-dot.idle    { background: #f0b232; }
    .dc-status-dot.dnd     { background: #f23f43; }
    .dc-status-dot.offline { background: #80848e; }
    .dc-body { flex: 1; min-width: 0; }
    .dc-name-row { display: flex; align-items: center; gap: 6px; }
    .dc-name { font-size: 15px; font-weight: 700; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .dc-badges { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
    .dc-badge {
      width: 20px; height: 20px;
      border-radius: 5px; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; cursor: default; position: relative;
      transition: transform 0.15s ease;
    }
    .dc-badge:hover { transform: scale(1.25); }

    /* Variables accent */
    :root { --accent: #6366f1; }

    /* Effet glow générique via classe */
    .glow-avatar   { box-shadow: 0 0 12px var(--accent), 0 0 30px var(--accent,#6366f1)55 !important; }
    .glow-card     { box-shadow: 0 0 12px var(--accent), 0 0 30px var(--accent,#6366f1)55 !important; }

    /* Décoration avatar — reset position pour ::before */
    .profile-avatar { position: relative; }

    .dc-badge:hover::after {
      content: attr(title);
      position: absolute; bottom: 120%; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,.85); color: #fff; font-size: 10px; white-space: nowrap;
      padding: 2px 6px; border-radius: 4px; pointer-events: none; z-index: 10;
    }
    .dc-badge svg { width: 16px; height: 16px; }
    .dc-badge-verified { background: transparent; }
    .dc-username { font-size: 11px; color: #5865F2; margin-top: 1px; font-weight: 500; opacity: .85; }
    .dc-last-seen { font-size: 12px; color: #878a8f; margin-top: 2px; }
  
    .profile-name-wrap {
      display: inline-flex; align-items: center; justify-content: center;
      gap: 6px; position: relative; cursor: default;
    }
    .profile-name-wrap.has-link { cursor: pointer; }
    .profile-name-link-icon {
      opacity: 0; width: 14px; height: 14px;
      transition: opacity .2s;
      display: inline-flex; align-items: center;
      flex-shrink: 0;
    }
    .profile-name-wrap.has-link:hover .profile-name-link-icon { opacity: 0.5; }
    .profile-name-wrap.has-link:hover { opacity: 0.85; }

  </style>
</head>

<button id="globalThemeBtn" onclick="toggleTheme()" title="Changer le thème" aria-label="Changer le thème">🌙</button>

</div>

<div id="profileBg"></div>
<audio id="audioPlayer" loop></audio>

  <span id="loadingMsg"></span>
</div>

  <h1>404</h1>
  <p id="notFoundMsg">Ce profil n'existe pas sur ak-47.fr.</p>

        <div class="spotify-widget-text">

async function loadProfile() {
  if (!username || STATIC.includes(username)) return;

  const controller = new AbortController();
  let timedOut = false;
  const slowTimer = setTimeout(() => {
    document.getElementById('loadingMsg').textContent = 'Le serveur démarre, patiente quelques secondes…';
  }, 5000);
  const hardTimer = setTimeout(() => { timedOut = true; controller.abort(); }, 20000);

  try {
    fetch(API + '/api/analytics/profile/' + username).catch(() => {});

    const r = await fetch(API + '/api/profile/' + username, { signal: controller.signal });
    clearTimeout(slowTimer); clearTimeout(hardTimer);
    document.getElementById('loading').style.display = 'none';

    if (!r.ok) {
      document.getElementById('notFound').style.display = 'flex';
      document.title = 'Profil introuvable — ak-47.fr';
      return;
    }

    const user = await r.json();
    document.title = (user.display_name || user.username) + ' — ak-47.fr';

    const font = user.profile_font || 'Inter';
    if (font !== 'Inter') {
      const link = document.getElementById('profileFont');
      link.href = `https://fonts.googleapis.com/css2?family=${encodeURIComponent(font)}:wght@400;500;600;700&display=swap`;
      document.body.style.fontFamily = `'${font}', sans-serif`;
    }

    const bgType  = user.bg_type  || 'color';
    const bgValue = user.bg_value || '#fafafa';
    const bgOpacity = user.bg_opacity !== undefined ? user.bg_opacity : 1;
    if (bgType === 'color') {
      document.body.style.background = bgValue;
      document.body.style.opacity = '';
      
      const bgDiv = document.getElementById('profileBg');
      bgDiv.style.background = bgValue;
      bgDiv.style.opacity = bgOpacity;
      bgDiv.style.backgroundImage = '';
      document.body.style.background = bgValue;
      
      if (bgOpacity < 1) {
        
        const hex = bgValue.replace('#','');
        const r = parseInt(hex.slice(0,2),16), g = parseInt(hex.slice(2,4),16), b = parseInt(hex.slice(4,6),16);
        document.body.style.background = `rgba(${r},${g},${b},${bgOpacity})`;
      } else {
        document.body.style.background = bgValue;
      }
    } else if (bgType === 'gradient') {
      if (bgOpacity < 1) {
        const bgDiv = document.getElementById('profileBg');
        bgDiv.style.background = bgValue;
        bgDiv.style.opacity = bgOpacity;
        bgDiv.style.backgroundImage = '';
        document.body.style.background = 'transparent';
      } else {
        document.body.style.background = bgValue;
      }
    } else if (bgType === 'image' && user.bg_url) {
      const bg = document.getElementById('profileBg');
      bg.style.backgroundImage = `url(${JSON.stringify(user.bg_url)})`;
      bg.style.opacity = bgOpacity;
    }

    
    if (user.text_color) {
      document.documentElement.style.setProperty('--profile-text-color', user.text_color);
    }

    
    if (user.card_bg || user.card_opacity !== undefined) {
      const cardBg = user.card_bg || '#ffffff';
      const cardOpacity = user.card_opacity !== undefined ? user.card_opacity : 1;
      const hex = cardBg.replace('#','');
      const r = parseInt(hex.slice(0,2),16), g = parseInt(hex.slice(2,4),16), b = parseInt(hex.slice(4,6),16);
      document.documentElement.style.setProperty('--card-bg', `rgba(${r},${g},${b},${cardOpacity})`);
    }

    if (user.banner_url) {
      const banner = document.getElementById('profileBanner');
      banner.src = user.banner_url;
      banner.style.display = 'block';
      document.getElementById('profile').style.paddingTop = '0';
    }

    const avContainer = document.getElementById('pAvatar');
    const shape = user.avatar_shape || 'circle';
    if (shape === 'rounded') avContainer.classList.add('shape-rounded');
    if (shape === 'square')  avContainer.classList.add('shape-square');

    const color = user.avatar_color || '#000000';
    const isLight = (() => {
      const rv = parseInt(color.slice(1,3),16), g = parseInt(color.slice(3,5),16), b = parseInt(color.slice(5,7),16);
      return (0.299*rv + 0.587*g + 0.114*b) > 128;
    })();

    if (user.avatar_url) {
      const img = document.createElement('img');
      img.src = user.avatar_url;
      img.className = 'profile-avatar-img';
      img.alt = user.display_name || user.username;
      avContainer.style.background = 'none';
      avContainer.innerHTML = '';
      avContainer.appendChild(img);
    } else {
      avContainer.style.background = color;
      avContainer.style.color = isLight ? '#000' : '#fff';
      avContainer.textContent = (user.display_name || user.username).charAt(0).toUpperCase();
    }

    if (user.cursor_url) {
      document.body.style.cursor = `url(${JSON.stringify(user.cursor_url)}), auto`;
    }

    if (user.audio_url) {
      const player = document.getElementById('audioPlayer');
      player.src = user.audio_url;
      player.volume = 0.7;
      const bar = document.getElementById('audioBar');
      bar.classList.add('visible');

      
      try {
        const customName = user.audio_name && user.audio_name.trim();
        document.getElementById('mpTitle').textContent = customName || 'Musique';
      } catch {}

      
      const coverUrl = user.audio_cover_url || user.avatar_url;
      if (coverUrl) {
        document.getElementById('mpThumb').innerHTML = `<img src="${coverUrl}" alt="cover"/>`;
      }

      
      player.addEventListener('timeupdate', () => {
        if (!player.duration) return;
        const pct = (player.currentTime / player.duration) * 100;
        document.getElementById('mpFill').style.width = pct + '%';
        document.getElementById('mpCur').textContent = fmtTime(player.currentTime);
      });
      player.addEventListener('loadedmetadata', () => {
        document.getElementById('mpTotal').textContent = fmtTime(player.duration);
      });
      document.getElementById('mpProgress').addEventListener('click', (e) => {
        const rect = e.currentTarget.getBoundingClientRect();
        player.currentTime = ((e.clientX - rect.left) / rect.width) * player.duration;
      });

      
      _profileReady = true;
      if (_enterDone) {
        startMusicNow();
      }
      
    }

    const pNameEl = document.getElementById('pName');
    const firstLink = (user.links && user.links.length) ? user.links[0] : null;

      pNameEl.innerHTML = `<a class="profile-name-wrap has-link" href="${escAttr(firstLink.url)}" target="_blank" rel="noopener" onclick="trackClick(${JSON.stringify(user.username)}, ${JSON.stringify(firstLink.url)}, ${JSON.stringify(firstLink.title || '')})">${escHtml(user.display_name || user.username)}<svg class="profile-name-link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg></a>`;
      pNameEl.style.cursor = 'default';
    } else {
      pNameEl.textContent = user.display_name || user.username;
    }
    document.getElementById('pBio').textContent  = user.bio || '';

    const badgesRow = document.getElementById('pBadges');
    let badges = []; try { badges = JSON.parse(user.discord_badges || '[]'); } catch {}
    let hidden = []; try { hidden = JSON.parse(user.hidden_badges  || '[]'); } catch {}
    badges = badges.filter((_, i) => !hidden.includes(i));
    badgesRow.innerHTML = '';
    badges.forEach(b => {
      const span = document.createElement('span');
      let cls = 'badge';
      if (b.type === 'nitro')  cls += ' badge-nitro';
      else if (b.type === 'discord') cls += ' badge-discord';
      else if (b.type === 'server') {
        cls += ' badge-server';
        if (b.label === 'VIP') cls += ' vip';
        if (b.label === 'Modérateur') cls += ' mod';
      }
      span.className = cls;
      span.textContent = b.emoji + ' ' + b.label;
      badgesRow.appendChild(span);
    });

    const pHandleEl = document.getElementById('pHandle');
    pHandleEl.textContent = 'ak-47.fr/' + user.username;

    
    (function buildDiscordCard() {

        : (user.avatar_url || null);

        bug_hunter: { title: 'Bug Hunter', svg: `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="11" r="4" fill="#3ba55d"/><path d="M8.5 7.5C9.5 5.5 12 5 12 5s2.5.5 3.5 2.5" stroke="#3ba55d" stroke-width="1.5" fill="none" stroke-linecap="round"/><path d="M7 9l-3-2M17 9l3-2M7 12l-3 1M17 12l3 1M7 15l-2 2M17 15l2 2" stroke="#3ba55d" stroke-width="1.5" stroke-linecap="round"/><ellipse cx="12" cy="11" rx="2" ry="3" fill="#57f287"/></svg>` },

        
        bug_hunter_level_2: { title: 'Bug Hunter Gold', svg: `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="11" r="4" fill="#c27c0e"/><path d="M8.5 7.5C9.5 5.5 12 5 12 5s2.5.5 3.5 2.5" stroke="#c27c0e" stroke-width="1.5" fill="none" stroke-linecap="round"/><path d="M7 9l-3-2M17 9l3-2M7 12l-3 1M17 12l3 1M7 15l-2 2M17 15l2 2" stroke="#c27c0e" stroke-width="1.5" stroke-linecap="round"/><ellipse cx="12" cy="11" rx="2" ry="3" fill="#f0b132"/></svg>` },

        
        active_developer: { title: 'Active Developer', svg: `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M13 2L4 14h7l-2 8 11-12h-7l2-8z" fill="#23a55a"/></svg>` },

        
        verified_developer: { title: 'Verified Bot Developer', svg: `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2L3 6v6c0 5.25 3.9 10.15 9 11.35C17.1 22.15 21 17.25 21 12V6L12 2z" fill="#5865F2"/><path d="M9 12l2 2 4-4" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>` },

        partner: { title: 'Discord Partner', svg: `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="12" r="10" fill="#5865F2"/><path d="M7 12l3 3 7-7" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>` },

        
        server: { title: 'Membre du serveur', svg: `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="12" r="10" fill="#23a55a"/><path d="M7 12l3 3 7-7" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>` },
      };

      
      if (discordOauth || user.discord_id) {
        const dcIcon = document.createElement('span');
        dcIcon.className = 'dc-badge dc-badge-verified';
        dcIcon.title = 'Connecté via Discord';
        dcIcon.innerHTML = DISCORD_BADGE_SVGS.discord.svg;
        dcBadgesEl.appendChild(dcIcon);
      }

      
      badges.forEach(b => {
        const meta = DISCORD_BADGE_SVGS[b.type];
        if (!meta) return;
        const el = document.createElement('span');
        el.className = 'dc-badge';
        el.title = b.label || meta.title;
        el.innerHTML = meta.svg;
        dcBadgesEl.appendChild(el);
      });

      
      const updatedAt = user.updated_at || user.created_at;
      if (updatedAt) {
        const diff = Math.floor(Date.now() / 1000) - updatedAt;
        let label;
        if (diff < 60)           label = 'vu à l\'instant';
        else if (diff < 3600)    label = `vu il y a ${Math.floor(diff/60)} min`;
        else if (diff < 86400)   label = `vu il y a ${Math.floor(diff/3600)}h`;
        else if (diff < 172800)  label = 'vu hier';
        else                     label = `vu il y a ${Math.floor(diff/86400)} jours`;
        document.getElementById('dcLastSeen').textContent = label;

        
        const dot = document.getElementById('dcStatusDot');
        if (diff < 300)       { dot.className = 'dc-status-dot online'; }
        else if (diff < 3600) { dot.className = 'dc-status-dot idle'; }
        else                  { dot.className = 'dc-status-dot offline'; }
      }
    })();
    if (user.total_views > 0) {
      const views = user.total_views;
      const formatted = views >= 1000 ? (views/1000).toFixed(1).replace('.0','')+'K' : String(views);
      document.getElementById('pViewsCount').textContent = formatted + ' vue' + (views > 1 ? 's' : '');
      document.getElementById('pViews').style.display = 'flex';
    }

    let socials = {}; try { socials = JSON.parse(user.social_links || '{}'); } catch {}
    const socialsRow = document.getElementById('pSocials');
    Object.entries(socials).forEach(([key, value]) => {
      if (!value) return;
      const meta = SOCIAL_META[key];
      if (!meta) return;
      const url = value.startsWith('http') ? value : meta.base + value;
      const a = document.createElement('a');
      a.href = url; a.target = '_blank'; a.rel = 'noopener';
      a.className = 'social-icon-link';
      a.title = meta.label;
      a.textContent = meta.emoji;
      socialsRow.appendChild(a);
    });

    if (user.spotify_url) {
      const w = document.getElementById('spotifyWidget');
      w.href = user.spotify_url;
      w.classList.add('visible');
    }

    let btnStyle = {}; try { btnStyle = JSON.parse(user.link_btn_style || '{}'); } catch {}
    if (btnStyle.bg)           document.documentElement.style.setProperty('--link-bg',     btnStyle.bg);
    if (btnStyle.color)        document.documentElement.style.setProperty('--link-color',  btnStyle.color);
    if (btnStyle.border)       document.documentElement.style.setProperty('--link-border', btnStyle.border);
    if (btnStyle.borderRadius) document.documentElement.style.setProperty('--link-radius', btnStyle.borderRadius);

    const layout = user.link_layout || 'list';
    const linksContainer = document.getElementById('pLinks');
    if (layout === 'grid')    linksContainer.classList.add('layout-grid');
    if (layout === 'buttons') linksContainer.classList.add('layout-buttons');

    const links = user.links || [];
    if (links.length) {
      linksContainer.innerHTML = links.map(l => {
        const icon = getLinkIcon(l.url);
        const iconHtml = icon
          ? `<img class="profile-link-icon" src="${icon}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/><span class="profile-link-fallback" style="display:none">${escHtml(l.title.charAt(0))}</span>`
          : `<span class="profile-link-fallback">${escHtml(l.title.charAt(0))}</span>`;
        return `
        <a class="profile-link" href="${escAttr(l.url)}" target="_blank" rel="noopener"
          onclick="trackClick(${JSON.stringify(user.username)}, ${JSON.stringify(l.url)}, ${JSON.stringify(l.title)})">
          <span class="profile-link-left">${iconHtml}</span>
        </a>`;
      }).join('');
    } else {
      linksContainer.innerHTML = '<p style="text-align:center;color:var(--gray-400);font-size:13px;padding:20px;">Aucun lien pour l\'instant.</p>';
    }


    // ══════════════════════════════════════════════
    // PARAMÈTRES AVANCÉS DE PERSONNALISATION
    // ══════════════════════════════════════════════

    // 1. LOCALISATION
    if (user.location) {
      const locEl = document.createElement('div');
      locEl.style.cssText = 'font-size:12px;color:var(--profile-text-color);opacity:0.5;margin-top:4px;';
      locEl.textContent = '📍 ' + user.location;
      document.getElementById('pHandle').insertAdjacentElement('afterend', locEl);
    }

    // 2. COULEUR D'ACCENT — variable CSS globale
    const accentColor = user.accent_color || '#6366f1';
    document.documentElement.style.setProperty('--accent', accentColor);

    // 3. COULEUR DES ICÔNES SOCIAUX
    if (user.icon_color) {
      document.querySelectorAll('.social-icon-link').forEach(el => {
        el.style.background = user.icon_color + '22';
      });
    }

    // 4. ICÔNES MONOCHROME
    if (user.monochrome_icons) {
      document.querySelectorAll('.social-icon-link img, .profile-link-icon').forEach(img => {
        img.style.filter = 'grayscale(1)';
      });
    }

    // 5. FLOU DE LA CARD
    if (user.profile_blur && user.profile_blur > 0) {
      document.querySelector('.profile-card').style.backdropFilter = `blur(${user.profile_blur}px)`;
      document.querySelector('.profile-card').style.webkitBackdropFilter = `blur(${user.profile_blur}px)`;
    }

    // 6. INVERSER LES BLOCS
    if (user.invert_blocks) {
      document.querySelector('.profile-card').style.filter = 'invert(1) hue-rotate(180deg)';
    }

    // 7. TITRE ANIMÉ (onglet navigateur)
    if (user.animated_title) {
      const baseTitle = document.title;
      const frames = [baseTitle, '✨ ' + baseTitle, '⭐ ' + baseTitle, '🌟 ' + baseTitle];
      let fi = 0;
      setInterval(() => { document.title = frames[fi++ % frames.length]; }, 800);
    }

    // 8. EFFET SUR LE PSEUDO
    const nameEl = document.getElementById('pName');
    const usernameEffect = user.username_effect || 'none';
    if (usernameEffect !== 'none' && nameEl) {
      const styleTag = document.createElement('style');
      if (usernameEffect === 'gradient') {
        styleTag.textContent = `#pName, #pName a { background: linear-gradient(90deg, ${accentColor}, #f472b6, ${accentColor}); background-size: 200%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; animation: gradShift 3s linear infinite; }
        @keyframes gradShift { 0%{background-position:0%} 100%{background-position:200%} }`;
      } else if (usernameEffect === 'glow') {
        styleTag.textContent = `#pName, #pName a { text-shadow: 0 0 8px ${accentColor}, 0 0 20px ${accentColor}88; -webkit-text-fill-color: unset; color: var(--profile-text-color); }`;
      } else if (usernameEffect === 'rainbow') {
        styleTag.textContent = `#pName, #pName a { background: linear-gradient(90deg,#f00,#ff0,#0f0,#0ff,#00f,#f0f,#f00); background-size:300%; -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; animation:rainbow 4s linear infinite; }
        @keyframes rainbow { 0%{background-position:0%} 100%{background-position:300%} }`;
      } else if (usernameEffect === 'typewriter') {
        const txt = nameEl.textContent.trim();
        nameEl.textContent = '';
        let i = 0;
        styleTag.textContent = `#pName::after{content:'|';animation:blink .7s infinite;}@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}`;
        const tw = setInterval(() => { nameEl.textContent = txt.slice(0,++i); if(i>=txt.length) clearInterval(tw); }, 80);
      } else if (usernameEffect === 'shake') {
        styleTag.textContent = `#pName{animation:shake 0.5s infinite;}@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-2px)}75%{transform:translateX(2px)}}`;
      }
      document.head.appendChild(styleTag);
    }

    // 9. GLOW TARGETS
    const glowTargets = [];
    try { glowTargets.push(...(user.glow_targets || '').split(',').map(s=>s.trim()).filter(Boolean)); } catch {}
    if (glowTargets.length) {
      const glowStyle = document.createElement('style');
      const glowVal = `0 0 10px ${accentColor}99, 0 0 25px ${accentColor}55`;
      const glowFilter = `drop-shadow(0 0 6px ${accentColor}99)`;
      let css = '';
      if (glowTargets.includes('avatar'))   css += `.profile-avatar { box-shadow: ${glowVal}; }`;
      if (glowTargets.includes('username')) css += `#pName { text-shadow: 0 0 8px ${accentColor}, 0 0 20px ${accentColor}88; }`;
      if (glowTargets.includes('networks')) css += `.social-icon-link { filter: ${glowFilter}; }`;
      if (glowTargets.includes('badges'))   css += `.badge { box-shadow: ${glowVal}; }`;
      if (glowTargets.includes('card'))     css += `.profile-card { box-shadow: ${glowVal}; }`;
      if (glowTargets.includes('links'))    css += `.profile-link { box-shadow: ${glowVal}; }`;
      glowStyle.textContent = css;
      document.head.appendChild(glowStyle);
    }

    // 10. DÉCORATION D'AVATAR
    const avatarDeco = user.avatar_decoration || 'none';
    if (avatarDeco !== 'none') {
      const decoStyle = document.createElement('style');
      const av = accentColor;
      if (avatarDeco === 'ring') {
        decoStyle.textContent = `.profile-avatar { outline: 3px solid ${av}; outline-offset: 3px; }`;
      } else if (avatarDeco === 'ring_accent') {
        decoStyle.textContent = `.profile-avatar { outline: 3px solid ${av}; outline-offset: 3px; box-shadow: 0 0 0 6px ${av}33; }`;
      } else if (avatarDeco === 'ring_rainbow') {
        decoStyle.textContent = `
          .profile-avatar { padding: 3px; background: linear-gradient(#fff,#fff) padding-box, linear-gradient(90deg,#f00,#ff0,#0f0,#0ff,#00f,#f0f,#f00) border-box; border: 3px solid transparent; background-size: 200%; animation: rainbowBorder 3s linear infinite; }
          @keyframes rainbowBorder { 0%{background-position:0%} 100%{background-position:200%} }`;
      } else if (avatarDeco === 'ring_glow') {
        decoStyle.textContent = `.profile-avatar { outline: 3px solid ${av}; outline-offset: 3px; box-shadow: 0 0 12px ${av}, 0 0 30px ${av}88; animation: glowPulse 2s ease-in-out infinite; }
          @keyframes glowPulse { 0%,100%{box-shadow:0 0 12px ${av},0 0 30px ${av}88} 50%{box-shadow:0 0 20px ${av},0 0 50px ${av}66} }`;
      } else if (avatarDeco === 'double_ring') {
        decoStyle.textContent = `.profile-avatar { outline: 2px solid ${av}; outline-offset: 3px; box-shadow: 0 0 0 7px ${av}44, 0 0 0 10px ${av}22; }`;
      } else if (avatarDeco === 'dots') {
        decoStyle.textContent = `.profile-avatar::before { content:''; position:absolute; inset:-8px; border-radius:50%; background: radial-gradient(circle at 50% 0%, ${av} 3px, transparent 3px) 0 0 / 20% 20%; pointer-events:none; }
          .profile-avatar { position:relative; }`;
      } else if (avatarDeco === 'hexagon') {
        decoStyle.textContent = `.profile-avatar { clip-path: polygon(50% 0%,93% 25%,93% 75%,50% 100%,7% 75%,7% 25%); }`;
      }
      document.head.appendChild(decoStyle);
    }

    // 11. EFFET DE FOND (particules / neige / confettis / bulles / étoiles)
    const bgEffect = user.bg_effect || 'none';
    const bgEffectColor = user.bg_effect_color || '#ffffff';
    if (bgEffect !== 'none') {
      const canvas = document.createElement('canvas');
      canvas.style.cssText = 'position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:0;';
      document.body.appendChild(canvas);
      const ctx = canvas.getContext('2d');

      function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
      resizeCanvas();
      window.addEventListener('resize', resizeCanvas);

      const COUNT = bgEffect === 'confetti' ? 80 : 60;
      const particles = Array.from({length: COUNT}, () => ({
        x: Math.random() * window.innerWidth,
        y: Math.random() * window.innerHeight,
        r: bgEffect === 'bubbles' ? Math.random()*12+4 : Math.random()*3+1,
        vx: (Math.random()-0.5) * (bgEffect==='particles'?1.2:0.4),
        vy: bgEffect==='snow' ? Math.random()*1+0.3 : bgEffect==='bubbles' ? -(Math.random()*0.8+0.3) : (Math.random()-0.5)*0.8,
        alpha: Math.random()*0.6+0.2,
        hue: Math.random()*360,
        shape: bgEffect==='confetti' ? ['rect','circle','triangle'][Math.floor(Math.random()*3)] : 'circle',
        w: Math.random()*8+4, h: Math.random()*4+2,
        rot: Math.random()*Math.PI*2, rotV: (Math.random()-0.5)*0.1,
      }));

      function hexToRgb(hex) {
        const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
        return `${r},${g},${b}`;
      }
      const rgb = hexToRgb(bgEffectColor);

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => {
          ctx.save();
          ctx.globalAlpha = p.alpha;
          if (bgEffect === 'confetti') {
            ctx.fillStyle = `hsl(${p.hue},80%,60%)`;
            ctx.translate(p.x, p.y);
            ctx.rotate(p.rot);
            if (p.shape==='rect') ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
            else if (p.shape==='circle') { ctx.beginPath(); ctx.arc(0,0,p.r,0,Math.PI*2); ctx.fill(); }
            else { ctx.beginPath(); ctx.moveTo(0,-p.r); ctx.lineTo(p.r,p.r); ctx.lineTo(-p.r,p.r); ctx.closePath(); ctx.fill(); }
          } else if (bgEffect === 'bubbles') {
            ctx.strokeStyle = `rgba(${rgb},${p.alpha})`;
            ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.stroke();
            ctx.fillStyle = `rgba(${rgb},0.05)`; ctx.fill();
          } else if (bgEffect === 'stars') {
            ctx.fillStyle = `rgba(${rgb},${p.alpha})`;
            ctx.beginPath();
            for(let i=0;i<5;i++){
              ctx.lineTo(Math.cos((18+i*72)*Math.PI/180)*p.r+p.x, Math.sin((18+i*72)*Math.PI/180)*p.r+p.y);
              ctx.lineTo(Math.cos((54+i*72)*Math.PI/180)*p.r*0.4+p.x, Math.sin((54+i*72)*Math.PI/180)*p.r*0.4+p.y);
            }
            ctx.closePath(); ctx.fill();
          } else {
            ctx.fillStyle = `rgba(${rgb},${p.alpha})`;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
          }
          ctx.restore();

          p.x += p.vx; p.y += p.vy;
          if (bgEffect === 'confetti') p.rot += p.rotV;
          if (p.y > canvas.height + 10) p.y = -10;
          if (p.y < -10) p.y = canvas.height + 10;
          if (p.x > canvas.width + 10) p.x = -10;
          if (p.x < -10) p.x = canvas.width + 10;
        });
        requestAnimationFrame(draw);
      }
      draw();
    }

    document.getElementById('profile').style.display = 'flex';
  } catch(e) {
    clearTimeout(slowTimer); clearTimeout(hardTimer);
    document.getElementById('loading').style.display = 'none';
    if (timedOut || e.name === 'AbortError') {
      document.getElementById('notFoundMsg').textContent = 'Le serveur met trop de temps à répondre. Réessaie dans quelques secondes.';
    }
    document.getElementById('notFound').style.display = 'flex';
  }
}

let audioPlaying = false;
let audioMuted = false;
let lastVolume = 0.7;

function fmtTime(s) {
  if (isNaN(s) || !isFinite(s)) return '0:00';
  const m = Math.floor(s / 60), sec = Math.floor(s % 60);
  return m + ':' + String(sec).padStart(2, '0');
}

function updateVolSlider(val) {
  const slider = document.getElementById('mpVolSlider');
  if (!slider) return;
  slider.value = val;
  const pct = val * 100;
  slider.style.background = `linear-gradient(to right, rgba(255,255,255,.8) 0%, rgba(255,255,255,.8) ${pct}%, rgba(255,255,255,.2) ${pct}%)`;
}

function setVolume(val) {
  const player = document.getElementById('audioPlayer');
  val = parseFloat(val);
  player.volume = val;
  lastVolume = val > 0 ? val : lastVolume;
  audioMuted = val === 0;
  updateVolSvg();
  updateVolSlider(val);
}

function updateVolSvg() {
  const svg = document.getElementById('mpVolSvg');
  if (!svg) return;
  if (audioMuted || parseFloat(document.getElementById('mpVolSlider').value) === 0) {
    svg.innerHTML = '<path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>';
  } else {
    svg.innerHTML = '<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>';
  }
}

function toggleMute() {
  const player = document.getElementById('audioPlayer');
  if (audioMuted || player.volume === 0) {
    const v = lastVolume || 0.7;
    player.volume = v;
    audioMuted = false;
    updateVolSlider(v);
  } else {
    lastVolume = player.volume;
    player.volume = 0;
    audioMuted = true;
    updateVolSlider(0);
  }
  updateVolSvg();
}

function toggleAudio() {
  const player = document.getElementById('audioPlayer');
  const icon   = document.getElementById('mpPlayIcon');
  if (player.paused) {
    player.play();
    icon.innerHTML = '<path d="M6 19h4V5H6zm8-14v14h4V5z"/>';
    audioPlaying = true;
  } else {
    player.pause();
    icon.innerHTML = '<path d="M8 5v14l11-7z"/>';
    audioPlaying = false;
  }
}
function seekBack()    { const p = document.getElementById('audioPlayer'); p.currentTime = Math.max(0, p.currentTime - 10); }
function seekForward() { const p = document.getElementById('audioPlayer'); p.currentTime = Math.min(p.duration || 0, p.currentTime + 10); }

function trackClick(username, url, title) {
  fetch(API + '/api/analytics/click', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username, link_url: url, link_title: title })
  }).catch(() => {});
}

function escHtml(s)  { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s)  { return String(s).replace(/"/g,'&quot;'); }

(function initEnterOverlay() {
  
  const container = document.getElementById('enterParticles');
  for (let i = 0; i < 35; i++) {
    const s = document.createElement('span');
    s.style.left  = Math.random() * 100 + '%';
    s.style.bottom = '-4px';
    s.style.width  = (Math.random() * 2 + 1) + 'px';
    s.style.height = s.style.width;
    s.style.animationDuration  = (Math.random() * 8 + 6) + 's';
    s.style.animationDelay     = (Math.random() * 8) + 's';
    s.style.opacity = Math.random() * 0.5 + 0.1;
    container.appendChild(s);
  }
})();

let _profileReady = false;
let _enterDone    = false;

function enterSite() {
  const overlay = document.getElementById('enterOverlay');
  overlay.classList.add('hidden');
  _enterDone = true;
  
  if (_profileReady) startMusicNow();
}

function startMusicNow() {
  const player = document.getElementById('audioPlayer');
  if (!player || !player.src) return;
  player.play().then(() => {
    const icon = document.getElementById('mpPlayIcon');
    if (icon) icon.innerHTML = '<path d="M6 19h4V5H6zm8-14v14h4V5z"/>';
    audioPlaying = true;
  }).catch(() => { audioPlaying = false; });
  const bar = document.getElementById('audioBar');
  if (bar) setTimeout(() => bar.classList.add('shown'), 600);
}

loadProfile();
</script>
<script>
(function(){
  var btn = document.getElementById('globalThemeBtn');
  if(!btn) return;
  var t = document.documentElement.getAttribute('data-theme') || 'light';
  btn.textContent = t === 'dark' ? '☀️' : '🌙';
  btn.setAttribute('data-theme-btn', '1');
})();
function toggleTheme(){
  var cur = document.documentElement.getAttribute('data-theme') || 'light';
  var next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  var btn = document.getElementById('globalThemeBtn');
  if(btn) btn.textContent = next === 'dark' ? '☀️' : '🌙';
  var pill = document.getElementById('themeToggle');
  if(pill) pill.textContent = next === 'dark' ? '☀️' : '🌙';
}
document.addEventListener('DOMContentLoaded', function(){
  var btn = document.getElementById('globalThemeBtn');
  if(btn){var t=document.documentElement.getAttribute('data-theme')||'light'; btn.textContent=t==='dark'?'☀️':'🌙';}
});
</script>

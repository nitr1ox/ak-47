<!DOCTYPE html>
<html lang="fr">
<head>
<script src="/error-logger.js"></script><script>(function(){var t=localStorage.getItem("theme")||"dark";document.documentElement.setAttribute("data-theme",t);})();</script>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>ak-47.fr</title>
  <link id="profileFont" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black:#000; --white:#fff; --gray-50:#fafafa; --gray-100:#f4f4f5;
      --gray-200:#e4e4e7; --gray-400:#a1a1aa; --gray-500:#71717a; --gray-900:#18181b;
      --link-bg: var(--white); --link-color: var(--black);
      --link-border: var(--gray-200); --link-radius: 10px;
      --profile-text-color: var(--gray-900);
      --card-bg: transparent;
    }
    body { background: var(--gray-50); font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; flex-direction: column; -webkit-font-smoothing: antialiased; }

    #loading { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; min-height: 100vh; }
    .spinner { width: 28px; height: 28px; border: 2px solid var(--gray-200); border-top-color: var(--black); border-radius: 50%; animation: spin .6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loadingMsg { font-size: 13px; color: var(--gray-400); }

    #notFound { display: none; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 24px; }
    #notFound h1 { font-size: 48px; font-weight: 700; letter-spacing: -2px; margin-bottom: 8px; }
    #notFound p { color: var(--gray-500); margin-bottom: 24px; }
    #notFound a { color: var(--black); font-weight: 600; text-decoration: none; font-size: 14px; }

    #profileBanner {
      display: none; width: 100%; max-width: 480px;
      height: 120px; object-fit: cover;
      border-radius: 14px 14px 0 0; margin-bottom: -40px;
    }

    #profile { display: none; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px 80px; min-height: 100vh; }
    .profile-card { width: 100%; max-width: 480px; background: var(--card-bg); border-radius: 16px; padding: 8px; isolation: isolate; position: relative; }
    .profile-card.entrance { animation: profileEntrance .6s cubic-bezier(.22,1,.36,1) both; }
    @keyframes profileEntrance { from { opacity:0; transform:translateY(24px) scale(.97); } to { opacity:1; transform:none; } }

    .anim-fade { opacity: 0; transform: translateY(14px); transition: opacity .55s cubic-bezier(.22,1,.36,1), transform .55s cubic-bezier(.22,1,.36,1); }
    .anim-fade.visible { opacity: 1; transform: none; }

    .profile-link { transition: transform .25s cubic-bezier(.34,1.56,.64,1), box-shadow .25s ease, background .2s ease !important; }
    .profile-link:hover { transform: translateY(-5px) scale(1.04) !important; box-shadow: 0 10px 28px rgba(0,0,0,.16) !important; }
    .profile-link:active { transform: translateY(-2px) scale(1.01) !important; transition-duration: .1s !important; }

    .social-icon-link { transition: transform .25s cubic-bezier(.34,1.56,.64,1), background .2s ease, box-shadow .2s ease !important; }
    .social-icon-link:hover { transform: translateY(-4px) scale(1.1) !important; box-shadow: 0 6px 20px rgba(0,0,0,.2) !important; }
    .social-icon-link:active { transform: scale(.95) !important; }

    .profile-avatar { transition: transform .3s cubic-bezier(.34,1.56,.64,1), box-shadow .3s ease !important; }
    .profile-avatar:hover { transform: scale(1.07) !important; box-shadow: 0 8px 30px rgba(0,0,0,.2) !important; }

    .spotify-widget { transition: transform .25s cubic-bezier(.34,1.56,.64,1), opacity .2s ease !important; }
    .spotify-widget:hover { transform: translateY(-3px) scale(1.02) !important; opacity: 1 !important; }

    .discord-card { transition: transform .25s cubic-bezier(.34,1.56,.64,1), box-shadow .25s ease !important; }
    .discord-card:hover { transform: translateY(-3px) !important; box-shadow: 0 8px 24px rgba(0,0,0,.12) !important; }

    #profileBg { transition: background .8s ease; }
    .profile-avatar.shine { position:relative; overflow:hidden; }
    .profile-avatar.shine::after { content:''; position:absolute; inset:0; background:linear-gradient(135deg,transparent 30%,rgba(255,255,255,.45) 50%,transparent 70%); transform:translateX(-100%); transition:transform .4s; border-radius:inherit; }
    .profile-avatar.shine:hover::after { transform:translateX(100%); }
    .social-icon-link.sq { border-radius:10px !important; }
    .social-icon-link.pill { border-radius:999px !important; width:auto !important; padding:0 14px !important; gap:6px; font-size:12px; font-weight:600; }
    .social-icon-link.ghost { background:transparent !important; border:2px solid rgba(255,255,255,0.4) !important; }

    .profile-top { text-align: center; margin-bottom: 28px; padding-top: 20px; }

    .profile-avatar {
      width: 80px; height: 80px; border-radius: 50%;
      margin: 0 auto 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 30px; font-weight: 700;
      box-shadow: 0 2px 8px rgba(0,0,0,.12);
    }
    .profile-avatar.shape-rounded { border-radius: 20px; }
    .profile-avatar.shape-square   { border-radius: 6px; }
    .profile-avatar-img { width: 100%; height: 100%; object-fit: cover; border-radius: inherit; display: block; }
    .dc-server-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-left: 6px;
      padding: 1px 6px 1px 4px;
      background: rgba(128,132,142,0.3);
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .02em;
      vertical-align: middle;
    }
    .dc-server-tag img { width: 12px; height: 12px; border-radius: 2px; }

    .profile-name { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 6px; color: var(--profile-text-color); position: relative; display: inline-block; }

    
    #uid-floating-tooltip {
      position: fixed;
      background: rgba(10,10,10,0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 7px 13px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.18s ease, transform 0.18s ease;
      z-index: 9999;
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
      transform: translateY(4px);
    }
    #uid-floating-tooltip.visible {
      opacity: 1;
      transform: translateY(0);
    }
    #uid-floating-tooltip::after {
      content: '';
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border: 5px solid transparent;
      border-top-color: rgba(10,10,10,0.92);
    }
    .uid-tooltip-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
      display: block;
      line-height: 1;
      margin-bottom: 3px;
    }
    .uid-tooltip-value {
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.02em;
      display: block;
      line-height: 1;
    }
    .profile-bio  { font-size: 14px; color: var(--profile-text-color); opacity: 0.7; line-height: 1.5; max-width: 320px; margin: 0 auto; }
    .profile-handle { font-size: 12px; color: var(--gray-400); margin-top: 6px; }
    .profile-views  {
      position: absolute; bottom: 10px; left: 14px;
      font-size: 11px; color: var(--gray-400);
      display: flex; align-items: center; gap: 4px;
      pointer-events: none;
    }
    .profile-views svg { width: 12px; height: 12px; stroke: var(--gray-400); fill: none; flex-shrink: 0; }

    .social-row {
      display: flex; flex-wrap: wrap; gap: 10px;
      justify-content: center; align-items: center;
      margin: 16px auto 4px; max-width: 260px;
    }
    .social-icon-link {
      display: flex; align-items: center; justify-content: center;
      width: 40px; height: 40px; border-radius: 12px;
      background: rgba(255,255,255,0.13);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.18);
      text-decoration: none;
      transition: transform .18s, background .18s, box-shadow .18s;
      font-size: 20px; flex-shrink: 0;
    }
    .social-icon-link:hover {
      transform: translateY(-3px);
      background: rgba(255,255,255,0.22);
      box-shadow: 0 4px 16px rgba(0,0,0,0.18);
    }
    .social-icon-link img { width: 20px; height: 20px; border-radius: 4px; }

    .spotify-widget {
      display: none; align-items: center; gap: 10px;
      background: #1DB954; border-radius: 12px;
      padding: 10px 14px; margin: 12px auto 0;
      max-width: 300px; cursor: pointer; text-decoration: none;
      color: #fff; font-size: 12px; font-weight: 600;
      transition: opacity .15s;
    }
    .spotify-widget:hover { opacity: .9; }
    .spotify-widget.visible { display: flex; }
    .spotify-widget svg { width: 20px; height: 20px; fill: #fff; flex-shrink: 0; }
    .spotify-widget-text { overflow: hidden; }
    .spotify-widget-label { font-size: 10px; opacity: .8; }
    .spotify-widget-name  { font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .profile-links { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }

    .profile-link {
      position: relative;
      display: flex; align-items: center; justify-content: center;
      width: 48px; height: 48px;
      background: var(--link-bg); border: 1px solid var(--link-border);
      border-radius: 12px;
      text-decoration: none; color: var(--link-color);
      transition: all .15s;
      box-shadow: 0 1px 2px rgba(0,0,0,.06);
    }
    .profile-link:hover { transform: translateY(-3px); box-shadow: 0 6px 16px rgba(0,0,0,.12); }

    .profile-link-arrow { display: none; }
    .profile-link-icon { width: 24px; height: 24px; border-radius: 4px; object-fit: contain; }
    .profile-link-left { display: flex; align-items: center; justify-content: center; }
    .profile-link-fallback { font-size: 20px; }

    .profile-links.layout-grid { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
    .profile-links.layout-buttons { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }

    .profile-footer { margin-top: 36px; text-align: center; }
    .profile-footer a { font-size: 12px; color: var(--gray-400); text-decoration: none; font-weight: 500; transition: color .15s; }
    .profile-footer a:hover { color: var(--black); }

    #profileBg {
      position: fixed; inset: 0; z-index: -1;
      background-size: cover; background-position: center;
      background-repeat: no-repeat;
      opacity: 1; pointer-events: none;
    }

    #audioPlayer { display: none; }

    #enterOverlay {
      position: fixed; inset: 0; z-index: 99999;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: rgba(0,0,0,.45);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      transition: opacity .6s ease, visibility .6s ease;
    }
    #enterOverlay.hidden {
      opacity: 0; visibility: hidden; pointer-events: none;
    }
    #enterOverlay .enter-bg { display: none; }
    #enterOverlay .enter-particles {
      position: absolute; inset: 0; overflow: hidden; pointer-events: none;
    }
    #enterOverlay .enter-particles span {
      position: absolute; width: 2px; height: 2px;
      background: rgba(255,255,255,.4); border-radius: 50%;
      animation: floatUp linear infinite;
    }
    @keyframes floatUp {
      0%   { transform: translateY(0) scale(1);   opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { transform: translateY(-100vh) scale(0); opacity: 0; }
    }
    #enterOverlay .enter-content {
      position: relative; z-index: 2;
      display: flex; flex-direction: column;
      align-items: center; gap: 32px;
      text-align: center; padding: 32px;
    }
    #enterOverlay .enter-logo {
      font-size: 13px; font-weight: 600; letter-spacing: 3px;
      text-transform: uppercase; color: rgba(255,255,255,.3);
    }
    #enterOverlay .enter-pulse {
      width: 80px; height: 80px; position: relative;
      display: flex; align-items: center; justify-content: center;
    }
    #enterOverlay .enter-pulse::before,
    #enterOverlay .enter-pulse::after {
      content: ''; position: absolute; inset: 0;
      border-radius: 50%; border: 1px solid rgba(255,255,255,.2);
      animation: pulseRing 2s ease-out infinite;
    }
    #enterOverlay .enter-pulse::after { animation-delay: 1s; }
    @keyframes pulseRing {
      0%   { transform: scale(.8); opacity: 1; }
      100% { transform: scale(2.2); opacity: 0; }
    }
    #enterOverlay .enter-icon {
      width: 80px; height: 80px; border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,.15);
      display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,.05);
      font-size: 28px;
      position: relative; z-index: 1;
    }
    #enterBtn {
      background: none; border: none; cursor: pointer;
      font-size: 12px; font-weight: 500; letter-spacing: 3px;
      text-transform: uppercase; color: rgba(255,255,255,.5);
      font-family: inherit;
      animation: blink 2.5s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:.3} 50%{opacity:1} }

    .music-player {
      display: none;
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(80px);
      width: calc(100% - 32px); max-width: 420px;
      background: rgba(15,15,15,.82);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 20px;
      padding: 12px 14px 10px;
      color: #fff; user-select: none;
      z-index: 9999;
      box-shadow: 0 8px 40px rgba(0,0,0,.45), 0 2px 8px rgba(0,0,0,.3);
      transition: transform .4s cubic-bezier(.34,1.56,.64,1), opacity .3s ease;
      opacity: 0;
    }
    .music-player.visible {
      display: block;
    }
    .music-player.shown {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    .mp-top {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 10px;
    }
    .mp-thumb {
      width: 44px; height: 44px; border-radius: 10px;
      background: #2a2a2a; flex-shrink: 0; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,.4);
    }
    .mp-thumb img { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; display: block; }
    .mp-thumb-placeholder { font-size: 20px; opacity: .4; }

    .mp-info { flex: 1; min-width: 0; }
    .mp-label { font-size: 10px; color: rgba(255,255,255,.45); letter-spacing: .06em; text-transform: uppercase; margin-bottom: 2px; }
    .mp-title { font-size: 13px; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .mp-play-btn {
      width: 38px; height: 38px; border-radius: 50%; flex-shrink: 0;
      background: #fff; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,.35);
      transition: transform .15s ease, background .15s;
    }
    .mp-play-btn:hover { transform: scale(1.08); background: #e8e8e8; }
    .mp-play-btn:active { transform: scale(.95); }
    .mp-play-btn svg { width: 16px; height: 16px; fill: #000; flex-shrink: 0; }

    .mp-progress-row {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 8px;
    }
    .mp-time { font-size: 10px; color: rgba(255,255,255,.4); min-width: 30px; }
    .mp-time.right { text-align: right; }
    .mp-progress {
      flex: 1; height: 3px; background: rgba(255,255,255,.15);
      border-radius: 2px; cursor: pointer; position: relative;
    }
    .mp-progress:hover { height: 5px; margin: -1px 0; }
    .mp-progress-fill {
      height: 100%; background: #fff; border-radius: 2px;
      width: 0%; pointer-events: none; transition: width .1s linear;
      position: relative;
    }
    .mp-progress-fill::after {
      content: ''; position: absolute; right: -4px; top: 50%;
      width: 8px; height: 8px; border-radius: 50%;
      background: #fff; transform: translateY(-50%) scale(0);
      transition: transform .15s;
    }
    .mp-progress:hover .mp-progress-fill::after { transform: translateY(-50%) scale(1); }

    .mp-bottom {
      display: flex; align-items: center; justify-content: space-between;
    }
    .mp-seek-group { display: flex; align-items: center; gap: 4px; }
    .mp-btn {
      background: none; border: none; color: rgba(255,255,255,.55); cursor: pointer;
      padding: 4px; display: flex; align-items: center; justify-content: center;
      border-radius: 6px; transition: color .15s, background .15s;
    }
    .mp-btn:hover { color: #fff; background: rgba(255,255,255,.08); }
    .mp-btn svg { width: 15px; height: 15px; fill: currentColor; }

    .mp-vol-group { display: flex; align-items: center; gap: 6px; }
    .mp-vol-icon { color: rgba(255,255,255,.5); display: flex; align-items: center; cursor: pointer; }
    .mp-vol-icon svg { width: 14px; height: 14px; fill: currentColor; }
    .mp-vol-slider {
      -webkit-appearance: none; appearance: none;
      width: 70px; height: 3px;
      background: linear-gradient(to right, rgba(255,255,255,.8) 0%, rgba(255,255,255,.8) 70%, rgba(255,255,255,.2) 70%);
      border-radius: 2px; cursor: pointer; outline: none; border: none;
    }
    .mp-vol-slider::-webkit-slider-thumb {
      -webkit-appearance: none; width: 10px; height: 10px;
      border-radius: 50%; background: #fff; cursor: pointer;
      box-shadow: 0 1px 4px rgba(0,0,0,.4);
    }
    .mp-vol-slider::-moz-range-thumb {
      width: 10px; height: 10px; border-radius: 50%;
      background: #fff; cursor: pointer; border: none;
    }

    .badges-row { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin: 10px 0 4px; }
    .badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; border: 1px solid rgba(0,0,0,.08); cursor: default; transition: transform .15s, box-shadow .15s; position: relative; }
    .badge:hover { transform: translateY(-1px); }

    
    .badge-discord  { background: #5865F2; color: #fff; border-color: #5865F2; }
    .badge-nitro    { background: linear-gradient(135deg,#f47fff,#7289da); color: #fff; border-color: transparent; }
    .badge-server   { background: #000; color: #fff; border-color: #000; }
    .badge-owner    { background: linear-gradient(135deg,#FFD700,#FF8C00); color: #000; border-color: transparent; font-weight: 700; box-shadow: 0 0 8px rgba(255,165,0,0.5); }
    .badge-staff    { background: linear-gradient(135deg,#5865F2,#3b4fd8); color: #fff; border-color: transparent; }
    .badge-og       { background: linear-gradient(135deg,#00c9a7,#007cf0); color: #fff; border-color: transparent; }
    .badge-vip      { background: linear-gradient(135deg,#f6c90e,#e6a817); color: #000; border-color: transparent; }

    
    .ak-badges-row {
      display: flex; flex-wrap: wrap; gap: 5px;
      justify-content: center; margin: 8px 0 2px;
    }
    .ak-badge {
      width: 34px; height: 34px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; cursor: default; position: relative;
      border-radius: 7px;
      background: transparent;
      transition: transform .18s cubic-bezier(.34,1.56,.64,1);
    }
    .ak-badge img {
      width: 32px; height: 32px; object-fit: contain; display: block;
    }
    .ak-badge:hover { transform: scale(1.35) translateY(-1px); z-index: 5; }
    .ak-badge:hover::after {
      content: attr(data-tip);
      position: absolute; bottom: 130%; left: 50%; transform: translateX(-50%);
      background: rgba(15,15,18,.95); color: #fff; font-size: 10.5px; font-weight: 500;
      white-space: nowrap; padding: 4px 9px; border-radius: 6px; pointer-events: none; z-index: 10;
      box-shadow: 0 4px 12px rgba(0,0,0,.4); border: 1px solid rgba(255,255,255,.08);
      animation: akTooltipIn .15s ease;
    }
    @keyframes akTooltipIn { from { opacity: 0; transform: translateX(-50%) translateY(3px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

    .discord-card {
      display: none;
      align-items: center; gap: 14px;
      --dc-accent: #6b6e76;
      --dc-bg-opacity: 1;
      background: transparent;
      border-radius: 16px;
      padding: 14px 18px; margin: 16px auto 0;
      max-width: 360px; width: 100%;
      border: 1px solid rgba(255,255,255,.08);
      box-shadow: 0 4px 24px rgba(0,0,0,.25), inset 0 1px 0 rgba(255,255,255,.04);
      position: relative; overflow: hidden;
      animation: dcCardIn .35s cubic-bezier(.22,1,.36,1);
    }
    @keyframes dcCardIn {
      from { opacity: 0; transform: translateY(6px) scale(.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    
    .discord-card::after {
      content: ''; position: absolute; inset: 0; z-index: -2;
      border-radius: 16px;
      background:
        radial-gradient(120% 140% at 0% 0%, color-mix(in srgb, var(--dc-accent) 22%, transparent), transparent 60%),
        linear-gradient(160deg, #1f1f24 0%, #17171a 100%);
      opacity: var(--dc-bg-opacity);
    }
    .discord-card::before {
      content: ''; position: absolute; inset: 0; border-radius: 16px;
      z-index: -1;
      background: linear-gradient(135deg, color-mix(in srgb, var(--dc-accent) 50%, transparent), transparent 40%, transparent 60%, color-mix(in srgb, var(--dc-accent) 25%, transparent));
      opacity: calc(.25 * var(--dc-bg-opacity)); pointer-events: none; mix-blend-mode: screen;
    }
    .discord-card.visible { display: flex; }
    .dc-avatar-wrap { position: relative; flex-shrink: 0; }
    .dc-avatar-wrap::after {

function logError(msg, stack) {
  try {
    fetch("https://ak47-backend.onrender.com/api/log-error", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: msg, stack: stack || "", page: window.location.href, userAgent: navigator.userAgent })
    }).catch(function() {});
  } catch(e) {}
}
window.onerror = function(msg, src, line, col, err) {
  logError(msg, err ? err.stack : src + ":" + line + ":" + col);
};
window.onunhandledrejection = function(e) {
  logError("UnhandledPromise: " + (e.reason && e.reason.message || e.reason), e.reason && e.reason.stack);
};

<script>
(function() {
  const PAGE_TYPE = typeof ANNOUNCEMENT_PAGE_TYPE !== 'undefined' ? ANNOUNCEMENT_PAGE_TYPE : 'public';
  const API_BASE = typeof API !== 'undefined' ? API : 'https://ak47-backend.onrender.com';
  let annTimer = null;
  let annCountdown = null;

  async function loadAnnouncement() {
    try {
      const r = await fetch(API_BASE + '/api/stats/announcement');
      const d = await r.json();
      if (!d.announcement) return;
      const ann = d.announcement;
      
      if (ann.target === 'dashboard' && PAGE_TYPE !== 'dashboard') return;
      if (ann.target === 'public' && PAGE_TYPE !== 'public') return;
      showAnnouncement(ann);
    } catch {}
  }

  function showAnnouncement(ann) {
    const el = document.getElementById('global-announcement');
    const track = document.getElementById('ann-track');
    if (!el || !track) return;

    const dismissed = sessionStorage.getItem('ann_dismissed');
    if (dismissed === String(ann.created_at)) return;

    // Construire le ticker : répéter le message plusieurs fois
    track.innerHTML = '';
    const repeat = 6;
    for (let i = 0; i < repeat; i++) {
      const item = document.createElement('span');
      item.className = 'ann-item';
      item.textContent = ann.message;
      track.appendChild(item);
      if (i < repeat - 1) {
        const sep = document.createElement('span');
        sep.className = 'ann-sep';
        sep.textContent = '|';
        track.appendChild(sep);
      }
    }

    el.style.display = 'block';
    document.body.classList.add('has-announcement');

    if (ann.expires_at) {
      annCountdown = setInterval(() => {
        const remaining = Math.max(0, Math.floor((ann.expires_at - Date.now()) / 1000));
        if (remaining <= 0) { hideAnnouncement(); }
      }, 1000);
    }
  }

  function hideAnnouncement() {
    const el = document.getElementById('global-announcement');
    if (el) el.style.display = 'none';
    document.body.classList.remove('has-announcement');
    if (annCountdown) clearInterval(annCountdown);
  }

  window.dismissAnnouncement = function() {
    
    fetch(API_BASE + '/api/stats/announcement').then(r => r.json()).then(d => {
      if (d.announcement) sessionStorage.setItem('ann_dismissed', String(d.announcement.created_at));
    }).catch(() => {});
    hideAnnouncement();
  };

  document.addEventListener('DOMContentLoaded', loadAnnouncement);
})();
</script>

async function loadProfile() {
  if (!username || STATIC.includes(username)) return;

  const controller = new AbortController();
  let timedOut = false;
  const slowTimer = setTimeout(() => {
    document.getElementById('loadingMsg').textContent = 'Le serveur démarre, patiente quelques secondes…';
  }, 5000);
  const hardTimer = setTimeout(() => { timedOut = true; controller.abort(); }, 20000);

  try {
    fetch(API + '/api/analytics/profile/' + username).catch(() => {});

    const r = await fetch(API + '/api/profile/' + username, { signal: controller.signal });
    clearTimeout(slowTimer); clearTimeout(hardTimer);
    document.getElementById('loading').style.display = 'none';

    if (!r.ok) {
      document.getElementById('loading').style.display = 'none';
      if (r.status === 429) {
        document.getElementById('notFoundMsg').textContent = 'Trop de rechargements rapides. Attends quelques secondes et réessaie.';
        document.title = 'Trop de requêtes — ak-47.fr';
      } else if (r.status >= 500) {
        document.getElementById('notFoundMsg').textContent = 'Le serveur a un souci temporaire. Réessaie dans quelques secondes.';
        document.title = 'Erreur serveur — ak-47.fr';
      } else {
        document.getElementById('notFoundMsg').textContent = 'Ce profil n\'existe pas sur ak-47.fr.';
        document.title = 'Profil introuvable — ak-47.fr';
      }
      document.getElementById('notFound').style.display = 'flex';
      return;
    }

    const user = await r.json();

    
    if (user.banned) {
      document.title = user.username + ' — Banni';
      document.getElementById('bannedUsername').textContent = user.username + ' est banni';
      document.getElementById('bannedReason').textContent = user.ban_reason || 'Aucune raison précisée';
      document.getElementById('bannedPage').style.display = 'flex';
      return;
    }

    document.title = (user.display_name || user.username) + ' — ak-47.fr';

    const font = user.profile_font || 'Inter';
    if (font !== 'Inter') {
      const link = document.getElementById('profileFont');
      link.href = `https://fonts.googleapis.com/css2?family=${encodeURIComponent(font)}:wght@400;500;600;700&display=swap`;

      link.onload = () => {
        document.body.style.fontFamily = `'${font}', sans-serif`;
      };

      document.fonts.ready.then(() => {
        document.body.style.fontFamily = `'${font}', sans-serif`;
      });
    }

    const bgType  = user.bg_type  || 'color';
    const bgValue = user.bg_value || '#fafafa';
    const bgOpacity = user.bg_opacity !== undefined ? user.bg_opacity : 1;
    if (bgType === 'color') {
      document.body.style.background = bgValue;
      document.body.style.opacity = '';

      const bgDiv = document.getElementById('profileBg');
      bgDiv.style.background = bgValue;
      bgDiv.style.opacity = bgOpacity;
      bgDiv.style.backgroundImage = '';
      document.body.style.background = bgValue;

      if (bgOpacity < 1) {

        const hex = bgValue.replace('#','');
        const r = parseInt(hex.slice(0,2),16), g = parseInt(hex.slice(2,4),16), b = parseInt(hex.slice(4,6),16);
        document.body.style.background = `rgba(${r},${g},${b},${bgOpacity})`;
      } else {
        document.body.style.background = bgValue;
      }
    } else if (bgType === 'gradient') {
      if (bgOpacity < 1) {
        const bgDiv = document.getElementById('profileBg');
        bgDiv.style.background = bgValue;
        bgDiv.style.opacity = bgOpacity;
        bgDiv.style.backgroundImage = '';
        document.body.style.background = 'transparent';
      } else {
        document.body.style.background = bgValue;
      }
    } else if ((bgType === 'image' || bgType === 'video' || bgType === 'upload') && user.bg_url) {
      const isVideo = bgType === 'video' || user.bg_url.startsWith('data:video') || user.bg_url.endsWith('.mp4');
      if (isVideo) {
        const vid = document.getElementById('profileBgVideo');
        vid.src = user.bg_url;
        vid.style.opacity = bgOpacity;
        vid.style.display = 'block';
        if (user.audio_url) {
          
          vid.muted = true;
          vid.volume = 0;
          vid.play().catch(() => {});
        } else {
          
          vid.volume = parseFloat(document.getElementById('bgVideoVolSlider').value) || 0.8;
          vid.muted = false;
          vid.play().then(() => {
            _updateBgVideoIcon(false);
          }).catch(() => {
            vid.muted = true;
            _updateBgVideoIcon(true);
            vid.play().catch(() => {});
            const autoUnmute = () => {
              if (vid.muted) {
                vid.muted = false;
                vid.volume = parseFloat(document.getElementById('bgVideoVolSlider').value) || 0.8;
                _updateBgVideoIcon(false);
              }
            };
            document.addEventListener('click', autoUnmute, { once: true });
            document.addEventListener('keydown', autoUnmute, { once: true });
          });
          const bar = document.getElementById('bgVideoSoundBar');
          bar.style.display = 'flex';
        }
        const bg = document.getElementById('profileBg');
        bg.style.backgroundImage = '';
      } else {
        const bg = document.getElementById('profileBg');
        bg.style.backgroundImage = `url(${JSON.stringify(user.bg_url)})`;
        bg.style.opacity = bgOpacity;
      }
    }

    if (user.text_color) {
      document.documentElement.style.setProperty('--profile-text-color', user.text_color);
    }

    if (user.card_bg || user.card_opacity !== undefined) {
      const cardBg = user.card_bg || '#ffffff';
      const cardOpacity = user.card_opacity !== undefined ? user.card_opacity : 1;
      const hex = cardBg.replace('#','');
      const r = parseInt(hex.slice(0,2),16), g = parseInt(hex.slice(2,4),16), b = parseInt(hex.slice(4,6),16);
      document.documentElement.style.setProperty('--card-bg', `rgba(${r},${g},${b},${cardOpacity})`);
    }

    if (user.banner_url) {
      const banner = document.getElementById('profileBanner');
      banner.src = user.banner_url;
      banner.style.display = 'block';
      document.getElementById('profile').style.paddingTop = '0';
    }

    const avContainer = document.getElementById('pAvatar');
    const shape = user.avatar_shape || 'circle';
    if (shape === 'rounded') avContainer.classList.add('shape-rounded');
    if (shape === 'square')  avContainer.classList.add('shape-square');

    const color = user.avatar_color || '#000000';
    const isLight = (() => {
      const rv = parseInt(color.slice(1,3),16), g = parseInt(color.slice(3,5),16), b = parseInt(color.slice(5,7),16);
      return (0.299*rv + 0.587*g + 0.114*b) > 128;
    })();

    if (user.avatar_url) {
      const img = document.createElement('img');
      img.src = user.avatar_url;
      img.className = 'profile-avatar-img';
      img.alt = user.display_name || user.username;
      avContainer.style.background = 'none';
      avContainer.innerHTML = '';
      avContainer.appendChild(img);
    } else {
      avContainer.style.background = color;
      avContainer.style.color = isLight ? '#000' : '#fff';
      avContainer.textContent = (user.display_name || user.username).charAt(0).toUpperCase();
    }

    if (user.cursor_url) {
      (function initCustomCursor(src) {
        document.documentElement.style.cursor = 'none';
        
        const killCursors = document.createElement('style');
        killCursors.textContent = '* { cursor: none !important; }';
        document.head.appendChild(killCursors);

        const cursorEl = document.createElement('img');
        cursorEl.src = src;
        cursorEl.alt = '';
        cursorEl.setAttribute('aria-hidden', 'true');
        cursorEl.style.cssText = `
          position: fixed; top: 0; left: 0; width: 32px; height: 32px;
          pointer-events: none; z-index: 999999; transform: translate(-2px, -2px);
          will-change: transform; image-rendering: -webkit-optimize-contrast;
        `;
        document.body.appendChild(cursorEl);

        let x = -100, y = -100;
        window.addEventListener('mousemove', (e) => {
          x = e.clientX; y = e.clientY;
          cursorEl.style.transform = `translate(${x - 2}px, ${y - 2}px)`;
        }, { passive: true });

        document.addEventListener('mouseleave', () => { cursorEl.style.opacity = '0'; });
        document.addEventListener('mouseenter', () => { cursorEl.style.opacity = '1'; });

        
        if (window.matchMedia('(pointer: coarse)').matches) {
          cursorEl.style.display = 'none';
          document.documentElement.style.cursor = '';
          killCursors.remove();
        }
      })(user.cursor_url);
    }

    if (user.audio_url) {
      _showAudioPlayer = user.show_audio_player !== false;
      const player = document.getElementById('audioPlayer');
      player.src = user.audio_url;
      player.volume = 0.8;
      player.muted = false;
      const bar = document.getElementById('audioBar');
      if (_showAudioPlayer) bar.classList.add('visible');

      try {
        const customName = user.audio_name && user.audio_name.trim();
        document.getElementById('mpTitle').textContent = customName || 'Musique';
      } catch {}

      const coverUrl = user.audio_cover_url || user.avatar_url;
      if (coverUrl) {
        document.getElementById('mpThumb').innerHTML = `<img src="${escAttr(coverUrl)}" alt="cover"/>`;
      }

      player.addEventListener('timeupdate', () => {
        if (!player.duration) return;
        const pct = (player.currentTime / player.duration) * 100;
        document.getElementById('mpFill').style.width = pct + '%';
        document.getElementById('mpCur').textContent = fmtTime(player.currentTime);
      });
      player.addEventListener('loadedmetadata', () => {
        document.getElementById('mpTotal').textContent = fmtTime(player.duration);
      });
      document.getElementById('mpProgress').addEventListener('click', (e) => {
        const rect = e.currentTarget.getBoundingClientRect();
        player.currentTime = ((e.clientX - rect.left) / rect.width) * player.duration;
      });

      _profileReady = true;
      if (_enterDone) {
        startMusicNow();
      }

    }

    const pNameEl = document.getElementById('pName');

    
    const firstLink = (user.links && user.links.length) ? user.links[0] : null;
    if (firstLink) {
      pNameEl.innerHTML = `<a class="profile-name-wrap has-link" href="${escAttr(firstLink.url)}" target="_blank" rel="noopener" onclick="trackClick(${JSON.stringify(user.username)}, ${JSON.stringify(firstLink.url)}, ${JSON.stringify(firstLink.title || '')})">${escHtml(user.display_name || user.username)}<svg class="profile-name-link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg></a>`;
      pNameEl.style.cursor = 'default';
    } else {
      pNameEl.innerHTML = escHtml(user.display_name || user.username);
    }

    // Tooltip UID flottant sur hover du pseudo
    if (user.uid) {
      let uidTip = document.getElementById('uid-floating-tooltip');
      if (!uidTip) {
        uidTip = document.createElement('div');
        uidTip.id = 'uid-floating-tooltip';
        uidTip.innerHTML = `<span class="uid-tooltip-label">UID</span><span class="uid-tooltip-value">#${user.uid.toLocaleString('fr-FR')}</span>`;
        document.body.appendChild(uidTip);
      }
      pNameEl.addEventListener('mouseenter', function() {
        const rect = pNameEl.getBoundingClientRect();
        const tipW = uidTip.offsetWidth || 120;
        uidTip.style.left = (rect.left + rect.width / 2 - tipW / 2) + 'px';
        uidTip.style.top = (rect.top - uidTip.offsetHeight - 14 + window.scrollY) + 'px';
        uidTip.classList.add('visible');
        // Recalcul après rendu pour centrer correctement
        requestAnimationFrame(() => {
          const tipW2 = uidTip.offsetWidth;
          const tipH2 = uidTip.offsetHeight;

      const discordUsername = (discordOauth && discordOauth.username) || user.discord_username || null;

          tagImg.src = user.discord_tag.badge_url;
          tagImg.alt = '';

      if (bgEffect === 'aurora') {
        let t = 0;
        const auroraColors = ['#00ffd0','#7f5af0','#2cb67d','#00b4d8','#48cae4'];
        function drawAurora() {
          t += 0.008;
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          for (let i = 0; i < 4; i++) {
            const grad = ctx.createLinearGradient(0, 0, 0, canvas.height * 0.7);
            grad.addColorStop(0, auroraColors[i % auroraColors.length] + '00');
            grad.addColorStop(0.3 + 0.1 * Math.sin(t + i), auroraColors[i % auroraColors.length] + '55');
            grad.addColorStop(0.6, auroraColors[(i+1) % auroraColors.length] + '33');
            grad.addColorStop(1, 'transparent');
            ctx.save();
            ctx.globalAlpha = 0.7;
            ctx.fillStyle = grad;
            ctx.beginPath();
            const W = canvas.width, H = canvas.height * 0.65;
            ctx.moveTo(0, H * 0.2);
            for (let x = 0; x <= W; x += W / 12) {
              const y = H * (0.2 + 0.3 * Math.sin(x / W * Math.PI * 2 + t + i * 1.2) * Math.sin(t * 0.7 + i));
              ctx.lineTo(x, y);
            }
            ctx.lineTo(W, 0); ctx.lineTo(0, 0); ctx.closePath();
            ctx.fill();
            ctx.restore();
          }
          requestAnimationFrame(drawAurora);
        }
        drawAurora();
      } else if (bgEffect === 'night') {
        const stars = Array.from({length: 180}, () => ({
          x: Math.random() * window.innerWidth,
          y: Math.random() * window.innerHeight,
          r: Math.random() * 1.8 + 0.3,
          alpha: Math.random() * 0.6 + 0.3,
          twinkleSpeed: Math.random() * 0.02 + 0.005,
          phase: Math.random() * Math.PI * 2,
        }));
        let t = 0;
        function drawNight() {
          t += 0.03;
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          stars.forEach(s => {
            const a = s.alpha * (0.5 + 0.5 * Math.sin(t * s.twinkleSpeed * 60 + s.phase));
            ctx.save();
            ctx.globalAlpha = a;
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
            ctx.fill();
            if (s.r > 1.2) {
              const g = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.r * 4);
              g.addColorStop(0, 'rgba(200,220,255,0.35)');
              g.addColorStop(1, 'transparent');
              ctx.fillStyle = g;
              ctx.beginPath();
              ctx.arc(s.x, s.y, s.r * 4, 0, Math.PI * 2);
              ctx.fill();
            }
            ctx.restore();
          });
          requestAnimationFrame(drawNight);
        }
        drawNight();
      } else if (bgEffect === 'rain') {
        const drops = Array.from({length: 120}, () => ({
          x: Math.random() * window.innerWidth,
          y: Math.random() * window.innerHeight,
          len: Math.random() * 18 + 8,
          speed: Math.random() * 6 + 8,
          alpha: Math.random() * 0.4 + 0.15,
        }));
        function drawRain() {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          drops.forEach(d => {
            ctx.save();
            ctx.globalAlpha = d.alpha;
            ctx.strokeStyle = `rgba(${rgb},1)`;
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(d.x, d.y);
            ctx.lineTo(d.x - d.len * 0.15, d.y + d.len);
            ctx.stroke();
            ctx.restore();
            d.y += d.speed;
            d.x -= d.speed * 0.15;
            if (d.y > canvas.height + 20) { d.y = -20; d.x = Math.random() * canvas.width; }
            if (d.x < -20) d.x = canvas.width + 20;
          });
          requestAnimationFrame(drawRain);
        }
        drawRain();
      } else if (bgEffect === 'snow') {
        const flakes = Array.from({length: 70}, () => ({
          x: Math.random() * window.innerWidth,
          y: Math.random() * window.innerHeight,
          r: Math.random() * 5 + 2,
          speed: Math.random() * 1.2 + 0.4,
          drift: (Math.random() - 0.5) * 0.6,
          alpha: Math.random() * 0.5 + 0.4,
          rot: Math.random() * Math.PI * 2,
          rotSpeed: (Math.random() - 0.5) * 0.02,
        }));
        function drawSnowflake(x, y, r, rot) {
          ctx.save();
          ctx.translate(x, y);
          ctx.rotate(rot);
          for (let i = 0; i < 6; i++) {
            ctx.save();
            ctx.rotate(i * Math.PI / 3);
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(0, r);
            ctx.moveTo(0, r * 0.4);
            ctx.lineTo(r * 0.22, r * 0.62);
            ctx.moveTo(0, r * 0.4);
            ctx.lineTo(-r * 0.22, r * 0.62);
            ctx.stroke();
            ctx.restore();
          }
          ctx.restore();
        }
        function drawSnow() {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          flakes.forEach(f => {
            ctx.save();
            ctx.globalAlpha = f.alpha;
            ctx.strokeStyle = `rgba(${rgb},1)`;
            ctx.lineWidth = 1;
            drawSnowflake(f.x, f.y, f.r, f.rot);
            ctx.restore();
            f.y += f.speed;
            f.x += f.drift;
            f.rot += f.rotSpeed;
            if (f.y > canvas.height + 10) { f.y = -10; f.x = Math.random() * canvas.width; }
            if (f.x > canvas.width + 10) f.x = -10;
            if (f.x < -10) f.x = canvas.width + 10;
          });
          requestAnimationFrame(drawSnow);
        }
        drawSnow();
      } else {
        const COUNT = bgEffect === 'confetti' ? 80 : 60;
        const particles = Array.from({length: COUNT}, () => ({
          x: Math.random() * window.innerWidth,
          y: Math.random() * window.innerHeight,
          r: bgEffect === 'bubbles' ? Math.random()*12+4 : Math.random()*3+1,
          vx: (Math.random()-0.5) * (bgEffect==='particles'?1.2:0.4),
          vy: bgEffect==='bubbles' ? -(Math.random()*0.8+0.3) : (Math.random()-0.5)*0.8,
          alpha: Math.random()*0.6+0.2,
          hue: Math.random()*360,
          shape: bgEffect==='confetti' ? ['rect','circle','triangle'][Math.floor(Math.random()*3)] : 'circle',
          w: Math.random()*8+4, h: Math.random()*4+2,
          rot: Math.random()*Math.PI*2, rotV: (Math.random()-0.5)*0.1,
        }));

        function draw() {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          particles.forEach(p => {
            ctx.save();
            ctx.globalAlpha = p.alpha;
            if (bgEffect === 'confetti') {
              ctx.fillStyle = `hsl(${p.hue},80%,60%)`;
              ctx.translate(p.x, p.y);
              ctx.rotate(p.rot);
              if (p.shape==='rect') ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
              else if (p.shape==='circle') { ctx.beginPath(); ctx.arc(0,0,p.r,0,Math.PI*2); ctx.fill(); }
              else { ctx.beginPath(); ctx.moveTo(0,-p.r); ctx.lineTo(p.r,p.r); ctx.lineTo(-p.r,p.r); ctx.closePath(); ctx.fill(); }
            } else if (bgEffect === 'bubbles') {
              ctx.strokeStyle = `rgba(${rgb},${p.alpha})`;
              ctx.lineWidth = 1.5;
              ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.stroke();
              ctx.fillStyle = `rgba(${rgb},0.05)`; ctx.fill();
            } else if (bgEffect === 'stars') {
              ctx.fillStyle = `rgba(${rgb},${p.alpha})`;
              ctx.beginPath();
              for(let i=0;i<5;i++){
                ctx.lineTo(Math.cos((18+i*72)*Math.PI/180)*p.r+p.x, Math.sin((18+i*72)*Math.PI/180)*p.r+p.y);
                ctx.lineTo(Math.cos((54+i*72)*Math.PI/180)*p.r*0.4+p.x, Math.sin((54+i*72)*Math.PI/180)*p.r*0.4+p.y);
              }
              ctx.closePath(); ctx.fill();
            } else {
              ctx.fillStyle = `rgba(${rgb},${p.alpha})`;
              ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
            }
            ctx.restore();

            p.x += p.vx; p.y += p.vy;
            if (bgEffect === 'confetti') p.rot += p.rotV;
            if (p.y > canvas.height + 10) p.y = -10;
            if (p.y < -10) p.y = canvas.height + 10;
            if (p.x > canvas.width + 10) p.x = -10;
            if (p.x < -10) p.x = canvas.width + 10;
          });
          requestAnimationFrame(draw);
        }
        draw();
      }
    }

    document.getElementById('profile').style.display = 'flex';

    const animEls = [
      document.getElementById('pAvatar'),
      document.getElementById('pBadges'),
      document.getElementById('pName'),
      document.getElementById('pBio'),
      document.getElementById('pHandle'),
      document.getElementById('pMemberSince'),
      document.getElementById('pViews'),
      document.getElementById('pSocials'),
      document.getElementById('discordCard'),
      document.getElementById('pLinks'),
    ];
    animEls.forEach(el => { if (el) el.classList.add('anim-fade'); });
    animEls.forEach((el, i) => {
      if (el) setTimeout(() => el.classList.add('visible'), 80 + i * 70);
    });
  } catch(e) {
    clearTimeout(slowTimer); clearTimeout(hardTimer);
    document.getElementById('loading').style.display = 'none';
    if (timedOut || e.name === 'AbortError') {
      document.getElementById('notFoundMsg').textContent = 'Le serveur met trop de temps à répondre. Réessaie dans quelques secondes.';
    }
    document.getElementById('notFound').style.display = 'flex';
  }
}

let audioPlaying = false;
let audioMuted = false;
let lastVolume = 0.7;
let _showAudioPlayer = true;

function fmtTime(s) {
  if (isNaN(s) || !isFinite(s)) return '0:00';
  const m = Math.floor(s / 60), sec = Math.floor(s % 60);
  return m + ':' + String(sec).padStart(2, '0');
}

function updateVolSlider(val) {
  const slider = document.getElementById('mpVolSlider');
  if (!slider) return;
  slider.value = val;
  const pct = val * 100;
  slider.style.background = `linear-gradient(to right, rgba(255,255,255,.8) 0%, rgba(255,255,255,.8) ${pct}%, rgba(255,255,255,.2) ${pct}%)`;
}

function setVolume(val) {
  const player = document.getElementById('audioPlayer');
  val = parseFloat(val);
  player.volume = val;
  lastVolume = val > 0 ? val : lastVolume;
  audioMuted = val === 0;
  updateVolSvg();
  updateVolSlider(val);
}

function updateVolSvg() {
  const svg = document.getElementById('mpVolSvg');
  if (!svg) return;
  if (audioMuted || parseFloat(document.getElementById('mpVolSlider').value) === 0) {
    svg.innerHTML = '<path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>';
  } else {
    svg.innerHTML = '<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>';
  }
}

function toggleMute() {
  const player = document.getElementById('audioPlayer');
  if (audioMuted || player.volume === 0) {
    const v = lastVolume || 0.7;
    player.volume = v;
    audioMuted = false;
    updateVolSlider(v);
  } else {
    lastVolume = player.volume;
    player.volume = 0;
    audioMuted = true;
    updateVolSlider(0);
  }
  updateVolSvg();
}

function _updateBgVideoIcon(muted) {
  const icon = document.getElementById('bgVideoMuteIcon');
  const slider = document.getElementById('bgVideoVolSlider');
  if (!icon) return;
  if (muted || (slider && parseFloat(slider.value) === 0)) {
    icon.innerHTML = '<path d="M3 9v6h4l5 5V4L7 9H3z"/><line x1="16" y1="9" x2="22" y2="15" stroke="currentColor" stroke-width="2"/><line x1="22" y1="9" x2="16" y2="15" stroke="currentColor" stroke-width="2"/>';
    document.getElementById('bgVideoMuteBtn').title = 'Activer le son';
  } else {
    icon.innerHTML = '<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>';
    document.getElementById('bgVideoMuteBtn').title = 'Couper le son';
  }
}

function toggleBgVideoMute() {
  const vid = document.getElementById('profileBgVideo');
  if (!vid) return;
  const slider = document.getElementById('bgVideoVolSlider');
  const vol = slider ? parseFloat(slider.value) : 0.8;

  if (vid.muted || vol === 0) {
    
    vid.muted = false;
    const newVol = vol === 0 ? 0.8 : vol;
    vid.volume = newVol;
    if (slider) slider.value = newVol;
    vid.play().catch(() => {});
    _updateBgVideoIcon(false);
  } else {
    
    vid.muted = true;
    _updateBgVideoIcon(true);
  }
}

function setBgVideoVolume(val) {
  const vid = document.getElementById('profileBgVideo');
  if (!vid) return;
  const v = parseFloat(val);
  vid.volume = v;
  if (v === 0) {
    vid.muted = true;
  } else {
    vid.muted = false;
    vid.play().catch(() => {});
  }
  _updateBgVideoIcon(v === 0);
}

function toggleAudio() {
  const player = document.getElementById('audioPlayer');
  const icon   = document.getElementById('mpPlayIcon');
  if (player.paused) {
    player.play();
    icon.innerHTML = '<path d="M6 19h4V5H6zm8-14v14h4V5z"/>';
    audioPlaying = true;
  } else {
    player.pause();
    icon.innerHTML = '<path d="M8 5v14l11-7z"/>';
    audioPlaying = false;
  }
}
function seekBack()    { const p = document.getElementById('audioPlayer'); p.currentTime = Math.max(0, p.currentTime - 10); }
function seekForward() { const p = document.getElementById('audioPlayer'); p.currentTime = Math.min(p.duration || 0, p.currentTime + 10); }

function trackClick(username, url, title) {
  fetch(API + '/api/analytics/click', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username, link_url: url, link_title: title })
  }).catch(() => {});
}

function escHtml(s)  { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s)  { return String(s).replace(/"/g,'&quot;'); }

(function initEnterOverlay() {

  const container = document.getElementById('enterParticles');
  for (let i = 0; i < 35; i++) {
    const s = document.createElement('span');
    s.style.left  = Math.random() * 100 + '%';
    s.style.bottom = '-4px';
    s.style.width  = (Math.random() * 2 + 1) + 'px';
    s.style.height = s.style.width;
    s.style.animationDuration  = (Math.random() * 8 + 6) + 's';
    s.style.animationDelay     = (Math.random() * 8) + 's';
    s.style.opacity = Math.random() * 0.5 + 0.1;
    container.appendChild(s);
  }
})();

let _profileReady = false;
let _enterDone    = false;

function enterSite() {
  const overlay = document.getElementById('enterOverlay');
  overlay.classList.add('hidden');
  _enterDone = true;

  if (_profileReady) startMusicNow();
}
window.enterSite = enterSite;
document.getElementById('enterOverlay').addEventListener('click', enterSite);
document.getElementById('enterBtn').addEventListener('click', function(e){ e.stopPropagation(); enterSite(); });

function startMusicNow() {
  const player = document.getElementById('audioPlayer');
  if (!player || !player.src) return;
  // Démarrer avec le son allumé (volume normal)
  player.volume = 0.8;
  audioMuted = false;
  updateVolSvg();
  updateVolSlider(0.8);
  // Tentative de lecture avec son — si le navigateur bloque l'autoplay avec son,
  // on retente en muet puis on démute dès la première interaction utilisateur
  player.play().then(() => {
    const icon = document.getElementById('mpPlayIcon');
    if (icon) icon.innerHTML = '<path d="M6 19h4V5H6zm8-14v14h4V5z"/>';
    audioPlaying = true;
  }).catch(() => {
    // Autoplay bloqué avec son : on passe en muet temporairement
    player.muted = true;
    player.play().then(() => {
      audioPlaying = true;
      const icon = document.getElementById('mpPlayIcon');
      if (icon) icon.innerHTML = '<path d="M6 19h4V5H6zm8-14v14h4V5z"/>';
      // Démuter dès la première interaction
      const unmute = () => {
        player.muted = false;
        player.volume = 0.8;
        audioMuted = false;
        updateVolSvg();
        updateVolSlider(0.8);
      };
      document.addEventListener('click',   unmute, { once: true });
      document.addEventListener('keydown', unmute, { once: true });
    }).catch(() => { audioPlaying = false; });
  });
  const bar = document.getElementById('audioBar');
  if (bar && !_showAudioPlayer) return;
  if (bar) {
    setTimeout(() => bar.classList.add('shown'), 600);
    setTimeout(() => initAudioBarAutoHide(bar), 600);
  }
}

function initAudioBarAutoHide(bar) {
  const HIDE_DELAY = 3000;      // temps d'inactivité avant de cacher la barre
  const PROXIMITY_PX = 140;     // distance depuis le bas de l'écran qui réaffiche la barre
  let hideTimer = null;

  function scheduleHide() {
    clearTimeout(hideTimer);
    hideTimer = setTimeout(() => bar.classList.remove('shown'), HIDE_DELAY);
  }

  function showBar() {
    clearTimeout(hideTimer);
    bar.classList.add('shown');
    scheduleHide();
  }

  // Réapparition dès que la souris s'approche du bas de l'écran
  window.addEventListener('mousemove', (e) => {
    const distFromBottom = window.innerHeight - e.clientY;
    if (distFromBottom <= PROXIMITY_PX) {
      showBar();
    }
  }, { passive: true });

  // Rester affiché tant que la souris est sur le lecteur lui-même
  bar.addEventListener('mouseenter', () => clearTimeout(hideTimer));
  bar.addEventListener('mouseleave', scheduleHide);

  // Sur tactile, pas de "souris qui s'approche" — on garde la barre visible
  if (window.matchMedia('(pointer: coarse)').matches) {
    clearTimeout(hideTimer);
    return;
  }

  scheduleHide();
}
